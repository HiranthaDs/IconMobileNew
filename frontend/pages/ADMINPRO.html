                                <div>
                                    <h1 className="text-xl font-bold text-gray-900 tracking-tight leading-tight">{isEditing ? 'Edit Inventory Group' : 'Add Product Group'}</h1>
                                    <p className="text-gray-500 font-medium text-[11px] mt-0.5">{isEditing ? `Updating SKU: ${form.IMEI}` : 'Add a product and list all its individual units.'}</p>
                                </div>
                            </div>
                            <div className="flex gap-2 w-full sm:w-auto">
                                <button type="button" onClick={handleCancel} className="pro-button secondary px-5 py-2.5 text-xs flex-1 sm:flex-none rounded-xl">Cancel</button>
                                <button type="button" onClick={handleSubmit} disabled={actionLoading} className="pro-button black-btn px-6 py-2.5 text-xs shadow-sm flex-1 sm:flex-none rounded-xl">
                                    {actionLoading ? <Icons.Loader className="text-white w-4 h-4" /> : <Icons.Check />} 
                                    {actionLoading ? 'Saving...' : 'Save Record'}
                                </button>
                            </div>
                        </div>

                        <form onSubmit={handleSubmit} className="p-6 sm:p-8 flex-1 overflow-y-auto">
                            
                            <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-5 pb-6 border-b border-gray-100">
                                <div className="lg:col-span-1"><label className="text-[10px] font-bold text-gray-500 uppercase tracking-wider block mb-1.5">Item Type</label><AutocompleteInput name="Type" value={form.Type} onChange={handleChange} options={DATASETS.Types} placeholder="e.g. Phone" className="px-4 py-2 text-sm" /></div>
                                <div className="lg:col-span-1"><label className="text-[10px] font-bold text-gray-500 uppercase tracking-wider block mb-1.5">Category</label><AutocompleteInput name="Category" value={form.Category} onChange={handleChange} options={DATASETS.Categories} placeholder="e.g. Smartphones" className="px-4 py-2 text-sm" /></div>
                                <div className="lg:col-span-1"><label className="text-[10px] font-bold text-gray-500 uppercase tracking-wider block mb-1.5">Brand *</label><AutocompleteInput name="Brand" value={form.Brand} onChange={handleChange} required options={DATASETS.Brands} placeholder="e.g. Apple" className="px-4 py-2 text-sm font-semibold" /></div>
                                <div className="lg:col-span-1"><label className="text-[10px] font-bold text-gray-500 uppercase tracking-wider block mb-1.5">Model *</label><AutocompleteInput name="Model" value={form.Model} onChange={handleChange} required options={DATASETS.Models} placeholder="e.g. iPhone 15" className="px-4 py-2 text-sm font-semibold" /></div>
                                
                                <div className="lg:col-span-2">
                                    <label className="text-[10px] font-bold text-gray-500 uppercase tracking-wider block mb-1.5">Product Group Code / SKU *</label>
                                    <div className="flex gap-2">
                                        <input name="IMEI" value={form.IMEI} onChange={handleChange} required disabled={isEditing} placeholder="Unique SKU for this group" className={`pro-input px-4 py-2 font-mono font-bold text-sm w-full ${isEditing ? 'bg-gray-100 border-gray-200 text-gray-400 cursor-not-allowed' : 'bg-white border-gray-300'}`} />
                                        {!isEditing && (
                                            <button type="button" onClick={startPeerServer} className="w-[42px] h-[42px] bg-gray-100 hover:bg-gray-200 text-gray-800 rounded-xl flex items-center justify-center shrink-0 border border-gray-300" title="Use Mobile Scanner">
                                                <Icons.Scan />
                                            </button>
                                        )}
                                    </div>
                                    <p className="text-[9px] text-gray-400 mt-1">This represents the entire group. Actual IMEIs are entered below per unit.</p>
                                </div>
                                <div className="lg:col-span-1"><label className="text-[10px] font-bold text-gray-500 uppercase tracking-wider block mb-1.5">Color</label><AutocompleteInput name="Color" value={form.Color} onChange={handleChange} options={DATASETS.Colors} placeholder="e.g. Black" className="px-4 py-2 text-sm" /></div>
                            </div>

                            <div className="flex flex-col lg:flex-row gap-8 pt-6">
                                <div className="flex-[2] flex flex-col">
                                    <div className="flex justify-between items-center mb-4">
                                        <div>
                                            <h2 className="text-sm font-black text-slate-800 uppercase tracking-widest">Stock Acquisition</h2>
                                            <p className="text-[11px] text-gray-500 font-medium">Add supplier quantity, then enter each individual unit's IMEI below.</p>
                                        </div>
                                        <button type="button" onClick={addSupplierRow} className="text-[10px] font-bold text-black bg-gray-100 border border-gray-200 hover:bg-gray-200 px-4 py-2 rounded-lg transition-colors shadow-sm">
                                            + Add Supplier Batch
                                        </button>
                                    </div>

                                    <div className="space-y-6">
                                        {form.Suppliers.map((sup, index) => (
                                            <div key={index} className="bg-gray-50 p-4 rounded-2xl border border-gray-200 shadow-sm flex flex-col gap-4 relative">
                                                {form.Suppliers.length > 1 && (
                                                    <button type="button" onClick={() => removeSupplierRow(index)} className="absolute -top-2 -right-2 bg-red-100 text-red-600 hover:bg-red-500 hover:text-white p-1.5 rounded-full transition-colors shadow-sm z-10" title="Remove Batch">
                                                        <Icons.Trash />
                                                    </button>
                                                )}
                                                
                                                <div className="flex flex-col sm:flex-row gap-4 items-start w-full">
                                                    <div className="flex-1 w-full">
                                                        <label className="text-[9px] font-bold text-gray-500 uppercase tracking-wider block mb-1">Supplier Name</label>
                                                        <AutocompleteInput value={sup.name} onChange={(e) => handleSupplierChange(index, 'name', e.target.value)} options={dynamicSuppliers} placeholder="Supplier Name" className="px-3 py-2 text-sm border-transparent focus:border-gray-400" />
                                                    </div>
                                                    <div className="w-full sm:w-32 relative">
                                                        <label className="text-[9px] font-bold text-gray-500 uppercase tracking-wider block mb-1">Unit Cost (LKR)</label>
                                                        <input type="number" value={sup.cost} onChange={(e) => handleSupplierChange(index, 'cost', e.target.value)} placeholder="0" className="pro-input px-3 py-2 text-sm border-red-100 bg-white text-red-700 font-bold w-full" />
                                                    </div>
                                                    <div className="w-full sm:w-24 relative">
                                                        <label className="text-[9px] font-bold text-gray-500 uppercase tracking-wider block mb-1">Total Qty</label>
                                                        <input type="number" value={sup.qty} onChange={(e) => handleSupplierChange(index, 'qty', e.target.value)} placeholder="Qty" className="pro-input px-3 py-2 text-sm border-blue-200 bg-blue-50 font-black w-full text-center text-blue-700" />
                                                    </div>
                                                </div>

                                                {sup.units && sup.units.length > 0 && (
                                                    <div className="bg-white p-4 rounded-xl border border-gray-200 shadow-sm mt-2">
                                                        <div className="flex justify-between items-center mb-3">
                                                            <label className="text-[10px] font-bold text-black uppercase tracking-wider">Individual Unit Identifiers (IMEI / ID)</label>
                                                            <button type="button" onClick={startPeerServer} className="text-[10px] font-bold text-gray-500 hover:text-black flex items-center gap-1"><Icons.Scan /> Auto-Scan Mode</button>
                                                        </div>
                                                        <div className="grid grid-cols-2 gap-3">
                                                            {sup.units.map((u, ui) => {
                                                                const isPartner = String(u.status).startsWith('Partner');
                                                                return (
                                                                    <div key={ui} className="relative group flex flex-col gap-1">
                                                                        <div className="flex items-center gap-2">
                                                                            <div className="w-5 h-5 bg-gray-100 rounded-md text-[9px] font-bold text-gray-400 flex items-center justify-center shrink-0">#{ui+1}</div>
                                                                            <input
                                                                                placeholder={`Unit IMEI / ID...`}
                                                                                value={u.imei}
                                                                                onChange={e => handleUnitImeiChange(index, ui, e.target.value)}
                                                                                className={`pro-input px-3 py-2 text-xs font-mono font-bold w-full ${u.status === 'Sold' ? 'bg-red-50 text-red-600 border-red-100 cursor-not-allowed' : (isPartner ? 'bg-orange-50 text-orange-700 border-orange-100 cursor-not-allowed' : 'bg-gray-50 border-gray-200 focus:bg-white focus:border-black focus:ring-2 focus:ring-black/10')}`}
                                                                                disabled={u.status === 'Sold' || isPartner}
                                                                            />
                                                                        </div>
                                                                        {u.status === 'Sold' && <span className="absolute right-2 top-1/2 -translate-y-1/2 text-[8px] font-black uppercase bg-red-500 text-white px-1.5 py-0.5 rounded">Sold</span>}
                                                                        {isPartner && <span className="absolute right-2 top-1/2 -translate-y-1/2 text-[8px] font-black uppercase bg-orange-500 text-white px-1.5 py-0.5 rounded max-w-[80px] truncate" title={u.status}>{String(u.status).replace('Partner:', 'P:')}</span>}
                                                                    </div>
                                                                );
                                                            })}
                                                        </div>
                                                        <p className="text-[9px] text-gray-400 mt-3 font-medium flex items-center gap-1">
                                                            <Icons.Scan className="w-3 h-3" /> Tip: Mobile Scanner will automatically fill the first empty box.
                                                        </p>
                                                    </div>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                <div className="flex-1 bg-gray-50 p-6 rounded-3xl border border-gray-200 flex flex-col gap-6 self-start xl:sticky xl:top-6">
                                    
                                    <div className="bg-white p-5 rounded-2xl border border-gray-100 flex flex-col justify-center items-center shadow-sm">
                                        <label className="text-[10px] font-bold text-gray-500 uppercase tracking-widest block mb-1">Total System Stock</label>
                                        <div className="text-5xl font-black text-gray-900 tracking-tighter">{form.Quantity}</div>
                                        <div className="text-[9px] font-bold uppercase tracking-wider text-black mt-2 px-2 py-0.5 bg-gray-100 rounded-full">{form.Status}</div>
                                    </div>

                                    <div className="space-y-4">
                                        <div>
                                            <label className="text-[10px] font-bold text-gray-500 uppercase tracking-wider block mb-1.5">General Selling Price (LKR) *</label>
                                            <input name="Price" type="number" required value={form.Price} onChange={handleChange} className="pro-input px-4 py-3 border-gray-300 bg-white font-black text-gray-900 text-xl shadow-inner w-full focus:border-black focus:ring-2 focus:ring-black/10" placeholder="0" />
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-bold text-gray-500 uppercase tracking-wider block mb-1.5">General Offer Price</label>
                                            <input name="OfferPrice" type="number" value={form.OfferPrice} onChange={handleChange} className="pro-input px-4 py-2.5 border-green-200 bg-green-50/50 font-bold text-green-700 text-sm w-full" placeholder="Optional Discounted Price" />
                                        </div>
                                    </div>

                                    <div className="border-t border-gray-200 pt-5 space-y-4">
                                        <label className="text-[11px] font-black text-slate-800 uppercase tracking-widest block">Hardware Specs</label>
                                        <div className="grid grid-cols-2 gap-3">
                                            <div>
                                                <label className="text-[9px] font-bold text-gray-500 uppercase tracking-wider block mb-1">RAM</label>
                                                <AutocompleteInput name="RAM" value={specs.RAM} onChange={handleSpecChange} options={DATASETS.RAMs} placeholder="e.g. 8GB" className="px-3 py-2 text-xs" />
                                            </div>
                                            <div>
                                                <label className="text-[9px] font-bold text-gray-500 uppercase tracking-wider block mb-1">Storage</label>
                                                <AutocompleteInput name="ROM" value={specs.ROM} onChange={handleSpecChange} options={DATASETS.ROMs} placeholder="e.g. 256GB" className="px-3 py-2 text-xs" />
                                            </div>
                                        </div>
                                        <div>
                                            <label className="text-[9px] font-bold text-gray-500 uppercase tracking-wider block mb-1">Other Details</label>
                                            <input name="Other" value={specs.Other} onChange={handleSpecChange} placeholder="Any other hardware details..." className="pro-input px-3 py-2 text-xs w-full" />
                                        </div>
                                    </div>

                                </div>
                            </div>
                        </form>
                    </div>

                    {/* Scanner Modal */}
                    {showQR && (
                        <div className="fixed inset-0 glass-overlay flex items-center justify-center p-4 z-[9999]">
                            <div className="bg-white w-full max-w-sm rounded-[24px] shadow-2xl flex flex-col overflow-hidden border border-gray-200 text-center">
                                <div className="px-6 py-5 border-b border-gray-100 flex justify-between items-center bg-gray-50 shrink-0">
                                    <h3 className="font-bold text-sm text-gray-900">Mobile Scanner</h3>
                                    <button type="button" onClick={() => setShowQR(false)} className="w-8 h-8 rounded-full bg-gray-200 text-gray-600 flex items-center justify-center hover:bg-gray-300">✕</button>
                                </div>
                                <div className="p-8 flex flex-col items-center">
                                    <p className="text-xs text-gray-500 mb-6 font-medium">Scan this QR code with your mobile phone to use it as a wireless barcode scanner.</p>
                                    {qrUrl ? (
                                        <img src={window.IconAPI.apiUrl(`/api/v1/qr?size=180&data=${encodeURIComponent(qrUrl)}`)} alt="QR Code" className="w-40 h-40 mb-6 border border-gray-200 rounded-2xl p-2 bg-white shadow-sm" />
                                    ) : (
                                        <div className="w-40 h-40 flex items-center justify-center mb-6"><Icons.Loader className="text-black w-8 h-8" /></div>
                                    )}
                                    <div className="text-[10px] font-bold text-gray-800 bg-gray-100 px-4 py-1.5 rounded-full animate-pulse border border-gray-200">Waiting for connection...</div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const mountNode = document.getElementById('root');
        if (!mountNode) throw new Error('Root element #root was not found.');
        if (ReactDOM.createRoot) {
            ReactDOM.createRoot(mountNode).render(<ErrorBoundary><App /></ErrorBoundary>);
        } else {
            ReactDOM.render(<ErrorBoundary><App /></ErrorBoundary>, mountNode);
        }
        document.body.classList.add('app-mounted');
    
} catch (err) {
  if (window.__ICON_BOOT_ERROR__) window.__ICON_BOOT_ERROR__(err && (err.stack || err.message) || err);
  else throw err;
}
</script>
</body>
</html>
