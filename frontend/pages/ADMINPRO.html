                                            <td style={{ width: '15%', padding: '16px 0', fontSize: '12px', fontWeight: '700', textAlign: 'right', color: '#000000', borderTop: '2px solid #000000' }}>{totals.tRev.toLocaleString(undefined, {maximumFractionDigits:0})}</td>
                                            <td style={{ width: '13%', padding: '16px 0', fontSize: '12px', fontWeight: '800', textAlign: 'right', color: totals.tProf < 0 ? '#FF3B30' : '#34C759', borderTop: '2px solid #000000' }}>{totals.tProf > 0 ? '+' : ''}{totals.tProf.toLocaleString(undefined, {maximumFractionDigits:0})}</td>
                                        </tr>
                                    </tbody>
                                </table>
                            )}

                            <div style={{ position: 'absolute', bottom: '15mm', left: 0, width: '100%', textAlign: 'center', fontSize: '8px', color: '#C7C7CC', textTransform: 'uppercase', letterSpacing: '0.2em', fontWeight: '600' }}>
                                ICON MOBILE &bull; CONFIDENTIAL
                            </div>
                        </div>
                    ))}
                </div>
            );
        };

        const ClientsView = ({ clients, contacts, setView, onLogout, onRefresh }) => {
            const [search, setSearch] = useState("");
            const [selectedClient, setSelectedClient] = useState(null);
            const [toastMsg, setToastMsg] = useState("");
            const [partnerMode, setPartnerMode] = useState(false);
            const [editingPartner, setEditingPartner] = useState(null);
            const [busy, setBusy] = useState(false);

            const [dateFilter, setDateFilter] = useState("all");
            const [typeFilter, setTypeFilter] = useState("all");
            const [customStart, setCustomStart] = useState("");
            const [customEnd, setCustomEnd] = useState("");

            const showToast = (msg) => { setToastMsg(msg); setTimeout(() => setToastMsg(""), 3000); };

            const filtered = useMemo(() => {
                let result = clients;

                if (search.trim()) {
                    const searchTerms = search.toLowerCase().trim().split(/\s+/);
                    result = result.filter(c => {
                        const imeis = (c.purchasedItems || []).map(item => item.displayImei || item["IMEI or Item Code"] || "").join(" ");
                        const combined = `${c.name} ${c.invoiceId} ${c.phone} ${c.email} ${imeis}`.toLowerCase();
                        return searchTerms.every(term => combined.includes(term));
                    });
                }

                if (typeFilter !== 'all') {
                    result = result.filter(c => {
                        const cType = c.transactionType || 'Sale';
                        if (typeFilter === 'sale') return cType === 'Sale';
                        if (typeFilter === 'issue') return cType === 'Issue';
                        if (typeFilter === 'return') return cType === 'Return';
                        return true;
                    });
                }

                if (dateFilter !== 'all') {
                    const now = new Date();
                    result = result.filter(c => {
                        if (!c.date) return false;
                        const cDate = parseSmartDate(c.date);
                        if (isNaN(cDate.getTime())) return false;

                        if (dateFilter === 'today') return cDate.toDateString() === now.toDateString();
                        if (dateFilter === 'week') { const pastWeek = new Date(now); pastWeek.setDate(pastWeek.getDate() - 7); return cDate >= pastWeek; }
                        if (dateFilter === 'month') return cDate.getMonth() === now.getMonth() && cDate.getFullYear() === now.getFullYear();
                        if (dateFilter === 'year') return cDate.getFullYear() === now.getFullYear();
                        if (dateFilter === 'custom') {
                            if (!customStart && !customEnd) return true;
                            let match = true;
                            if (customStart) { const s = new Date(customStart); s.setHours(0,0,0,0); match = match && cDate >= s; }
                            if (customEnd) { const e = new Date(customEnd); e.setHours(23,59,59,999); match = match && cDate <= e; }
                            return match;
                        }
                        return true;
                    });
                }
                return result;
            }, [clients, search, dateFilter, typeFilter, customStart, customEnd]);

            const partnerFiltered = useMemo(() => {
                const terms = search.toLowerCase().trim().split(/\s+/).filter(Boolean);
                return (contacts || []).filter(contact => contact.type === 'B2B').filter(contact => {
                    const text = `${contact.name} ${contact.phone} ${contact.email}`.toLowerCase();
                    return terms.every(term => text.includes(term));
                });
            }, [contacts, search]);

            const copyInvoiceLink = (id) => {
                const link = window.IconAPI.getShareUrl(`/invoice.html?id=${encodeURIComponent(id || '')}`);
                navigator.clipboard.writeText(link).then(() => showToast(`✅ Invoice link copied!`));
            };

            const shareWhatsApp = (clientData) => {
                let phone = clientData.phone.replace(/[^0-9+]/g, '');
                if (phone.startsWith('0') && phone.length === 10) phone = '94' + phone.substring(1);
                else if (phone.startsWith('+')) phone = phone.substring(1);
                const link = window.IconAPI.getShareUrl(`/invoice.html?id=${encodeURIComponent(clientData.invoiceId || '')}`);
                const msg = `Hello ${clientData.name},\n\nThank you for your transaction!\nView your digital document here:\n${link}`;
                window.open(`https://api.whatsapp.com/send?phone=${phone}&text=${encodeURIComponent(msg)}`, '_blank');
            };

            const deleteInvoice = async (invoiceId) => {
                if (!window.confirm(`Delete invoice ${invoiceId}?\n\nThe system will reverse its stock movement. Linked returns or payments must be deleted first.`)) return;
                setBusy(true);
                try {
                    const result = await window.IconAPI.action({ action: 'delete_transaction', invoiceId });
                    if (!result?.success) throw new Error(result?.message || 'Invoice deletion failed.');
                    setSelectedClient(null);
                    await onRefresh();
                    showToast(`Invoice ${invoiceId} deleted safely.`);
                } catch (error) { showToast(error?.message || String(error)); }
                finally { setBusy(false); }
            };

            const deleteInvoiceItem = async (invoiceId, unitCode) => {
                if (!unitCode) { showToast('This older item has no unit code and cannot be deleted separately.'); return; }
                if (!window.confirm(`Delete item ${unitCode} from invoice ${invoiceId}?\n\nStock and invoice totals will be corrected automatically.`)) return;
                setBusy(true);
                try {
                    const result = await window.IconAPI.action({ action: 'delete_transaction_item', invoiceId, unitCode });
                    if (!result?.success) throw new Error(result?.message || 'Invoice item deletion failed.');
                    setSelectedClient(result.data.transaction);
                    await onRefresh();
                    showToast(`Item ${unitCode} deleted from the invoice.`);
                } catch (error) { showToast(error?.message || String(error)); }
                finally { setBusy(false); }
            };

            const savePartner = async (event) => {
                event.preventDefault();
                if (!editingPartner?.name?.trim()) { showToast('Partner name is required.'); return; }
                setBusy(true);
                try {
                    const result = await window.IconAPI.action({
                        action: 'update_client', clientId: editingPartner.id,
                        client: { name: editingPartner.name.trim(), phone: editingPartner.phone.trim(), email: editingPartner.email.trim(), type: 'B2B' }
                    });
                    if (!result?.success) throw new Error(result?.message || 'Partner update failed.');
                    setEditingPartner(null);
                    await onRefresh();
                    showToast('Partner details updated everywhere.');
                } catch (error) { showToast(error?.message || String(error)); }
                finally { setBusy(false); }
            };

            const deletePartner = async (partner) => {
                if (!window.confirm(`Delete partner profile "${partner.name}"?\n\nHistorical invoices will remain. The profile cannot be deleted while the partner holds stock.`)) return;
                setBusy(true);
                try {
                    const result = await window.IconAPI.action({ action: 'delete_client', clientId: partner.id });
                    if (!result?.success) throw new Error(result?.message || 'Partner deletion failed.');
                    await onRefresh();
                    showToast(`Partner deleted. ${result.data.historyPreserved || 0} historical records preserved.`);
                } catch (error) { showToast(error?.message || String(error)); }
                finally { setBusy(false); }
            };

            return (
                <div className="flex flex-col h-full w-full">
                    {/* Admin Header with Navigation */}
                    <div className="bg-white border-b border-gray-200 px-4 sm:px-6 py-4 shrink-0 z-10 flex flex-col sm:flex-row gap-4 justify-between items-start sm:items-center shadow-sm">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-gray-100 text-gray-900 rounded-xl flex items-center justify-center shrink-0"><Icons.Users /></div>
                            <div><h1 className="text-lg font-bold text-gray-900 tracking-tight leading-tight">Clients &amp; Partners</h1><p className="text-[11px] font-medium text-gray-500">Manage partner profiles, invoices, and individual invoice items.</p></div>
                        </div>
                        <div className="flex flex-col sm:flex-row items-center gap-3 w-full sm:w-auto">
                            <div className="flex p-1 bg-gray-100 rounded-xl shrink-0 border border-gray-200 self-center overflow-x-auto">
                                <button onClick={() => setView('list')} className="whitespace-nowrap flex-1 sm:flex-none pro-button ghost px-4 py-1.5 text-xs rounded-lg">Inventory Data</button>
                                <button className="whitespace-nowrap flex-1 sm:flex-none pro-button ghost active px-4 py-1.5 text-xs rounded-lg">Clients</button>
                                <button onClick={() => setView('analytics')} className="whitespace-nowrap flex-1 sm:flex-none pro-button ghost px-4 py-1.5 text-xs flex items-center gap-1.5 rounded-lg"><Icons.Chart /> Analytics</button>
                            </div>
                            <button type="button" onClick={onLogout} className="pro-button secondary px-3 py-1.5 text-xs rounded-lg text-gray-600 hover:text-red-600 border-gray-200">Logout</button>
                        </div>
                    </div>

                    <div className="flex flex-col h-full w-full p-6 relative overflow-y-auto">
                        {toastMsg && (
                            <div className="absolute top-6 left-1/2 -translate-x-1/2 z-[110] toast-animate">
                                <div className="bg-gray-900 text-white px-6 py-3 rounded-full shadow-2xl font-bold text-sm flex items-center gap-2">{toastMsg}</div>
                            </div>
                        )}

                        <div className="flex flex-col xl:flex-row xl:items-center gap-4 mb-6 bg-white p-4 rounded-3xl shadow-sm border border-gray-200">
                            <div className="relative flex-1 min-w-[250px]">
                                <span className="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"><Icons.Search /></span>
                                <input type="text" placeholder={partnerMode ? "Search partner name, phone or email..." : "Smart Search Clients & Orders..."} value={search} onChange={e=>setSearch(e.target.value)} className="w-full bg-gray-50 border border-gray-200 pl-11 pr-4 py-2.5 rounded-2xl focus:outline-none focus:border-blue-500 focus:bg-white focus:ring-4 focus:ring-blue-500/10 text-sm transition-all" />
                            </div>
                            
                            {!partnerMode && <div className="flex flex-wrap items-center gap-3">
                                <div className="flex items-center bg-gray-50 p-1.5 rounded-2xl border border-gray-200">
                                    <div className="text-gray-400 pl-2 pr-1"><Icons.Filter /></div>
                                    <select className="bg-transparent text-sm font-semibold text-gray-700 outline-none py-1.5 pr-2 cursor-pointer" value={typeFilter} onChange={e=>setTypeFilter(e.target.value)}>
                                        <option value="all">All Transactions</option><option value="sale">Sales</option><option value="issue">Partner Issued</option><option value="return">Partner Returned</option>
                                    </select>
                                </div>

                                <div className="flex items-center bg-gray-50 p-1.5 rounded-2xl border border-gray-200">
                                    <div className="text-gray-400 pl-2 pr-1"><Icons.Calendar /></div>
                                    <select className="bg-transparent text-sm font-semibold text-gray-700 outline-none py-1.5 pr-2 cursor-pointer" value={dateFilter} onChange={e=>setDateFilter(e.target.value)}>
                                        <option value="all">All Time</option><option value="today">Today</option><option value="week">Past 7 Days</option><option value="month">This Month</option><option value="year">This Year</option><option value="custom">Custom Range...</option>
                                    </select>
                                </div>

                                {dateFilter === 'custom' && (
                                    <div className="flex items-center gap-2 fade-in bg-blue-50 p-1.5 rounded-2xl border border-blue-100">
                                        <input type="date" className="bg-white border border-blue-200 text-blue-700 rounded-xl py-1.5 px-3 text-xs font-bold outline-none" value={customStart} onChange={e=>setCustomStart(e.target.value)} />
                                        <span className="text-blue-400 font-bold text-[10px] uppercase">To</span>
                                        <input type="date" className="bg-white border border-blue-200 text-blue-700 rounded-xl py-1.5 px-3 text-xs font-bold outline-none" value={customEnd} onChange={e=>setCustomEnd(e.target.value)} />
                                    </div>
                                )}
                            </div>}
                        </div>
                        
                        <div className="flex justify-between items-center mb-4 px-2">
                            <h3 className="text-sm font-bold text-gray-700">Showing {partnerMode ? partnerFiltered.length : filtered.length} Records</h3>
                            <div className="flex p-1 bg-gray-100 border border-gray-200 rounded-xl">
                                <button type="button" onClick={() => setPartnerMode(false)} className={`px-3 py-1.5 rounded-lg text-xs font-bold ${!partnerMode ? 'bg-white text-black shadow-sm' : 'text-gray-500'}`}>Transactions</button>
                                <button type="button" onClick={() => setPartnerMode(true)} className={`px-3 py-1.5 rounded-lg text-xs font-bold ${partnerMode ? 'bg-white text-black shadow-sm' : 'text-gray-500'}`}>Partner Directory</button>
                            </div>
                        </div>

                        {partnerMode && <div className="flex-1 bg-white border border-gray-200 rounded-2xl overflow-hidden flex flex-col shadow-sm">
                            <div className="overflow-x-auto flex-1">
                                <table className="w-full text-left border-collapse whitespace-nowrap">
                                    <thead className="bg-gray-50 text-[11px] uppercase tracking-wider text-gray-500 font-bold sticky top-0 z-10 shadow-sm">
                                        <tr><th className="px-6 py-4 border-b">Partner</th><th className="px-6 py-4 border-b">Phone</th><th className="px-6 py-4 border-b">Email</th><th className="px-6 py-4 border-b">Last Updated</th><th className="px-6 py-4 border-b text-right">Actions</th></tr>
                                    </thead>
                                    <tbody className="divide-y divide-gray-100 text-sm">
                                        {partnerFiltered.map(partner => <tr key={partner.id} className="hover:bg-gray-50">
                                            <td className="px-6 py-4 font-bold text-gray-900">{partner.name}</td>
                                            <td className="px-6 py-4 text-gray-700">{partner.phone || '-'}</td>
                                            <td className="px-6 py-4 text-gray-500">{partner.email || '-'}</td>
                                            <td className="px-6 py-4 text-gray-500">{partner.updatedAt ? new Date(partner.updatedAt).toLocaleString() : '-'}</td>
                                            <td className="px-6 py-4 text-right space-x-2">
                                                <button type="button" disabled={busy} onClick={() => setEditingPartner({...partner, phone: partner.phone || '', email: partner.email || ''})} className="pro-button secondary px-3 py-1.5 text-xs"><Icons.Edit /> Edit</button>
                                                <button type="button" disabled={busy} onClick={() => deletePartner(partner)} className="pro-button secondary px-3 py-1.5 text-xs text-red-600 hover:bg-red-50"><Icons.Trash /> Delete</button>
                                            </td>
                                        </tr>)}
                                        {partnerFiltered.length === 0 && <tr><td colSpan="5" className="px-6 py-16 text-center text-gray-500">No partner profiles match your search.</td></tr>}
                                    </tbody>
                                </table>
                            </div>
                        </div>}

                        <div className={`${partnerMode ? 'hidden' : 'flex'} flex-1 bg-white border border-gray-200 rounded-2xl overflow-hidden flex-col shadow-sm`}>
                            <div className="overflow-x-auto flex-1">
                                <table className="w-full text-left border-collapse whitespace-nowrap">
                                    <thead className="bg-gray-50 text-[11px] uppercase tracking-wider text-gray-500 font-bold sticky top-0 z-10 shadow-sm">
                                        <tr>
                                            <th className="px-6 py-4 border-b border-gray-200">Client / Partner Name</th>
                                            <th className="px-6 py-4 border-b border-gray-200">Contact Details</th>
                                            <th className="px-6 py-4 border-b border-gray-200">Invoice Ref</th>
                                            <th className="px-6 py-4 border-b border-gray-200">Date</th>
                                            <th className="px-6 py-4 border-b border-gray-200 text-right">Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-gray-100 text-sm text-gray-700">
                                        {filtered.map((client, i) => {
                                            const isCredit = String(client.paymentMethod).toLowerCase() === 'credit';
                                            const tType = client.transactionType || 'Sale';
                                            let typeBadge = null;
                                            if (tType === 'Issue') typeBadge = <span className="ml-2 text-[9px] px-1.5 py-0.5 rounded font-bold uppercase bg-blue-100 text-blue-700 border border-blue-200">Issued</span>;
                                            else if (tType === 'Return') typeBadge = <span className="ml-2 text-[9px] px-1.5 py-0.5 rounded font-bold uppercase bg-orange-100 text-orange-700 border border-orange-200">Returned</span>;

                                            return (
                                            <tr key={i} className={`transition-colors ${isCredit ? 'bg-pink-50 hover:bg-pink-100' : 'hover:bg-gray-50'}`}>
                                                <td className="px-6 py-4"><div className="flex items-center"><span className={`font-bold ${isCredit ? 'text-pink-900' : 'text-gray-900'}`}>{client.name}</span>{typeBadge}{isCredit && <span className="ml-2 text-[9px] px-1.5 py-0.5 rounded font-bold uppercase bg-pink-200 text-pink-800 border border-pink-300">Credit</span>}</div></td>
                                                <td className="px-6 py-4"><div className={`${isCredit ? 'text-pink-900' : 'text-gray-900'} font-medium`}>{client.phone}</div>{client.email && <div className="text-xs text-gray-500">{client.email}</div>}</td>
                                                <td className="px-6 py-4 font-mono text-black bg-white/50 px-2 rounded-md font-medium border border-gray-100">{client.invoiceId}</td>
                                                <td className="px-6 py-4 text-gray-500">{client.date}</td>
                                                <td className="px-6 py-4 text-right font-bold text-gray-900">
                                                    <button type="button" onClick={() => setSelectedClient(client)} className="pro-button secondary px-3 py-1.5 text-xs"><Icons.Eye /> View Details</button>
                                                </td>
                                            </tr>
                                        )})}
                                        {filtered.length === 0 && (<tr><td colSpan="5" className="px-6 py-16 text-center text-gray-500 font-medium text-lg">No records match your filters.</td></tr>)}
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        {selectedClient && (
                            <div className="fixed inset-0 glass-overlay z-[70] flex items-center justify-center p-4">
                                <div className="bg-white w-full max-w-4xl rounded-[24px] shadow-2xl flex flex-col max-h-[85vh] overflow-hidden border border-gray-200">
                                    <div className="px-5 sm:px-8 py-5 border-b border-gray-100 flex flex-col sm:flex-row gap-3 justify-between sm:items-center bg-gray-50 shrink-0">
                                        <div className="flex items-center gap-3">
                                            <h3 className="font-bold text-lg text-gray-900">Transaction Details</h3>
                                            <span className="bg-gray-200 text-black px-2 py-0.5 rounded text-sm font-mono border border-gray-300">{selectedClient.invoiceId}</span>
                                        </div>
                                        <div className="flex flex-wrap items-center gap-2">
                                            <button type="button" onClick={() => copyInvoiceLink(selectedClient.invoiceId)} className="pro-button secondary px-3 py-1.5 text-xs text-gray-600"><Icons.Link /> Copy Link</button>
                                            <button type="button" onClick={() => shareWhatsApp(selectedClient)} className="pro-button primary px-3 py-1.5 text-xs bg-[#25D366] hover:bg-[#128C7E] border-transparent"><Icons.WhatsApp /> Share</button>
                                            <button type="button" disabled={busy} onClick={() => deleteInvoice(selectedClient.invoiceId)} className="pro-button secondary px-3 py-1.5 text-xs text-red-600 hover:bg-red-50"><Icons.Trash /> Delete Invoice</button>
                                            <button type="button" onClick={() => setSelectedClient(null)} className="w-8 h-8 rounded-full bg-gray-200 text-gray-600 flex items-center justify-center hover:bg-gray-300 ml-2">✕</button>
                                        </div>
                                    </div>
                                    
                                    <div className="p-8 overflow-y-auto flex-1 bg-gray-50/30">
                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                                            <div className="bg-white p-5 rounded-2xl border border-gray-200 shadow-sm">
                                                <p className="text-[10px] uppercase tracking-widest font-bold text-gray-400 mb-1.5">Client / Partner</p>
                                                <p className="font-bold text-gray-900 text-lg leading-tight mb-1">{selectedClient.name}</p>
                                                <p className="text-sm font-medium text-gray-600">{selectedClient.phone}</p>
                                                {selectedClient.email && <p className="text-xs text-gray-500 mt-0.5">{selectedClient.email}</p>}
                                            </div>
                                            <div className={`bg-white p-5 rounded-2xl border shadow-sm ${String(selectedClient.paymentMethod).toLowerCase() === 'credit' ? 'border-pink-300 bg-pink-50' : 'border-gray-200'}`}>
                                                <p className="text-[10px] uppercase tracking-widest font-bold text-gray-400 mb-1.5">Transaction Info</p>
                                                <p className="font-medium text-gray-900 text-sm mb-1.5"><span className="text-gray-500 w-16 inline-block">Date:</span> {selectedClient.date}</p>
                                                <p className="font-medium text-gray-900 text-sm"><span className="text-gray-500 w-16 inline-block">Method:</span> <span className={String(selectedClient.paymentMethod).toLowerCase() === 'credit' ? 'text-pink-600 font-bold' : ''}>{selectedClient.paymentMethod || 'N/A'}</span></p>
                                            </div>
                                            <div className="bg-gray-100 p-5 rounded-2xl border border-gray-200 shadow-sm flex flex-col justify-center items-end">
                                                <p className="text-[10px] uppercase tracking-widest font-bold text-gray-500 mb-1.5">Total Amount</p>
                                                <p className={`font-black text-3xl tracking-tight ${String(selectedClient.paymentMethod).toLowerCase() === 'credit' ? 'text-pink-600' : 'text-black'}`}>LKR {(selectedClient.totalPrice || selectedClient.total || 0).toLocaleString()}</p>
                                                {selectedClient.discount > 0 && <p className="text-xs text-red-500 font-bold mt-1">Discount Applied: LKR {selectedClient.discount.toLocaleString()}</p>}
                                            </div>
                                        </div>

                                        <h4 className="font-bold text-gray-900 mb-3 uppercase tracking-widest text-[10px] ml-1">Processed Items</h4>
                                        <div className="bg-white border border-gray-200 rounded-2xl overflow-hidden shadow-sm">
                                            <table className="w-full text-left text-sm">
                                                <thead className="bg-gray-50 border-b border-gray-200 text-gray-500 text-[10px] uppercase tracking-wider">
                                                    <tr><th className="px-5 py-3 font-bold w-[28%]">Item</th><th className="px-5 py-3 font-bold w-[20%]">ID</th><th className="px-5 py-3 font-bold w-[30%]">Warranty Status</th><th className="px-5 py-3 font-bold text-right w-[14%]">Price</th><th className="px-5 py-3 font-bold text-right w-[8%]">Action</th></tr>
                                                </thead>
                                                <tbody className="divide-y divide-gray-100">
                                                    {selectedClient.purchasedItems && selectedClient.purchasedItems.length > 0 ? (
                                                        selectedClient.purchasedItems.map((item, idx) => {
                                                            const itemDiscount = parseFloat(item.itemDiscount) || 0;
                                                            let basePrice = parseFloat(item.Price) || 0;
                                                            let extPrice = parseFloat(item.warranty?.extendedPrice) || 0;
                                                            let acPrice = parseFloat(item.warranty?.appleCarePrice) || 0;
                                                            let finalSellingPrice = parseFloat(item.finalPrice);
                                                            if(isNaN(finalSellingPrice)) finalSellingPrice = basePrice + extPrice + acPrice - itemDiscount;

                                                            const hasSoft = item.warranty && item.warranty.software && item.warranty.software !== 'None';
                                                            const hasGlob = item.warranty && item.warranty.global && item.warranty.global !== 'None';
                                                            const hasExt = item.warranty && item.warranty.extended && item.warranty.extended !== 'None';
                                                            const hasAc = item.warranty && item.warranty.appleCare && item.warranty.appleCare !== 'None';
                                                            const noWarrantyAtAll = !hasSoft && !hasGlob && !hasExt && !hasAc;

                                                            const formatW = (l, v, e) => (!v || v==='None' ? null : <div className="flex justify-between items-center bg-gray-50 px-3 py-2 rounded-md mb-1"><span className="font-bold text-gray-500 text-[10px] uppercase tracking-wider">{l}</span><span className={`font-semibold text-xs ${isWarrantyExpired(e||v) ? 'text-red-500' : 'text-gray-900'}`}>{e||v}</span></div>);

                                                            return (
                                                                <tr key={idx} className="hover:bg-gray-50 transition-colors">
                                                                    <td className="px-5 py-4 align-top">
                                                                        <div className={`font-bold text-[11px] leading-tight mb-1 ${item.isExchange ? 'text-green-700' : 'text-gray-900'}`}>
                                                                            {item.Brand} {item.Model}
                                                                        </div>
                                                                        {!item.isExchange && <p className="text-[11px] font-medium text-gray-500 mt-0.5">{formatSpecsDisplay(item.Specs)} • {item.Color}</p>}
                                                                    </td>
                                                                    <td className="px-5 py-4 align-top font-mono text-xs text-gray-600 break-all">{item.unitImei || item.displayImei || item["IMEI or Item Code"]}</td>
                                                                    <td className="px-5 py-4 align-top text-[11px]">
                                                                        {!item.isExchange && selectedClient.transactionType !== 'Return' ? (
                                                                            <div className="space-y-1">
                                                                                {formatW("Software Warranty", item.warranty?.software, item.warranty?.softwareEnd)}
                                                                                {formatW("General Warranty", item.warranty?.global, item.warranty?.globalEnd)}
                                                                                {hasExt && <div className="flex flex-col bg-blue-50/50 px-3 py-2 rounded-md mb-1 border border-blue-100/50"><div className="flex justify-between items-center w-full"><span className="font-bold text-blue-600 text-[10px] uppercase tracking-wider">Extended Warranty</span><span className={`font-semibold text-xs text-gray-900`}>{item.warranty?.extendedEnd || item.warranty?.extended}</span></div><div className="text-[9px] text-gray-500 text-right mt-0.5 font-medium flex justify-end gap-1"><span>{item.warranty?.extended}</span> {extPrice > 0 && <span className="text-blue-500 font-bold">(+LKR {extPrice.toLocaleString()})</span>}</div></div>}
                                                                                {formatW("Apple Care", item.warranty?.appleCare, item.warranty?.appleCareEnd)}
                                                                                {noWarrantyAtAll && <span className="text-gray-400 text-xs font-medium">No Warranty Issued</span>}
                                                                            </div>
                                                                        ) : <span className="text-gray-400 text-xs italic">N/A</span>}
                                                                    </td>
                                                                    <td className="px-5 py-4 align-top text-right font-bold text-gray-900">
                                                                        {itemDiscount > 0 ? (
                                                                            <div className="flex flex-col items-end">
                                                                                <span className="text-[10px] text-red-500 line-through">LKR {(basePrice+extPrice).toLocaleString()}</span>
                                                                                <span className="text-sm">LKR {finalSellingPrice.toLocaleString()}</span>
                                                                            </div>
                                                                        ) : (
                                                                            <span>LKR {finalSellingPrice.toLocaleString()}</span>
                                                                        )}
                                                                    </td>
                                                                    <td className="px-5 py-4 align-top text-right">
                                                                        <button type="button" disabled={busy} title="Delete this invoice item" onClick={() => deleteInvoiceItem(selectedClient.invoiceId, item.unitImei || item.displayImei || item["IMEI or Item Code"])} className="p-2 rounded-lg text-red-500 hover:bg-red-50 disabled:opacity-40"><Icons.Trash /></button>
                                                                    </td>
                                                                </tr>
                                                            );
                                                        })
                                                    ) : (
                                                        <tr><td colSpan="5" className="p-8 text-center text-gray-500">No detailed item records found for this older invoice.</td></tr>
                                                    )}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {editingPartner && (
                            <div className="fixed inset-0 glass-overlay z-[80] flex items-center justify-center p-4">
                                <form onSubmit={savePartner} className="bg-white w-full max-w-lg rounded-3xl shadow-2xl border border-gray-200 overflow-hidden">
                                    <div className="px-6 py-5 border-b border-gray-100 bg-gray-50 flex items-center justify-between">
                                        <div><h3 className="font-bold text-lg text-gray-900">Edit Partner Details</h3><p className="text-xs text-gray-500 mt-1">Changes update linked invoices and assigned stock labels.</p></div>
                                        <button type="button" onClick={() => setEditingPartner(null)} className="w-8 h-8 rounded-full bg-gray-200 text-gray-600">✕</button>
                                    </div>
                                    <div className="p-6 space-y-4">
                                        <label className="block"><span className="text-[10px] uppercase tracking-widest font-bold text-gray-500">Partner Name</span><input required value={editingPartner.name} onChange={e => setEditingPartner({...editingPartner, name: e.target.value})} className="pro-input mt-1.5 w-full px-4 py-3 border border-gray-200 rounded-xl" /></label>
                                        <label className="block"><span className="text-[10px] uppercase tracking-widest font-bold text-gray-500">Phone / WhatsApp</span><input value={editingPartner.phone} onChange={e => setEditingPartner({...editingPartner, phone: e.target.value})} className="pro-input mt-1.5 w-full px-4 py-3 border border-gray-200 rounded-xl" /></label>
                                        <label className="block"><span className="text-[10px] uppercase tracking-widest font-bold text-gray-500">Email</span><input type="email" value={editingPartner.email} onChange={e => setEditingPartner({...editingPartner, email: e.target.value})} className="pro-input mt-1.5 w-full px-4 py-3 border border-gray-200 rounded-xl" /></label>
                                    </div>
                                    <div className="px-6 py-4 border-t border-gray-100 bg-gray-50 flex justify-end gap-2">
                                        <button type="button" onClick={() => setEditingPartner(null)} className="pro-button secondary px-4 py-2 text-sm">Cancel</button>
                                        <button type="submit" disabled={busy} className="pro-button black-btn px-5 py-2 text-sm disabled:opacity-50">{busy ? 'Saving…' : 'Save Partner'}</button>
                                    </div>
                                </form>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const App = () => {
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [passwordInput, setPasswordInput] = useState("");
            const [loginAttempts, setLoginAttempts] = useState(0);
            const [lockoutTime, setLockoutTime] = useState(() => {
                const stored = localStorage.getItem('admin_icon_lockout');
                return stored ? parseInt(stored) : null;
            });
            const [timeRemaining, setTimeRemaining] = useState(0);

            const [view, setView] = useState('list'); 
            const [inventory, setInventory] = useState([]);
            const [clients, setClients] = useState([]);
            const [contacts, setContacts] = useState([]);
            const [assetSummary, setAssetSummary] = useState(null);
            const [loading, setLoading] = useState(false);
            const [loginLoading, setLoginLoading] = useState(false);
            const [actionLoading, setActionLoading] = useState(false);
            const [toastMsg, setToastMsg] = useState("");
            const [searchQuery, setSearchQuery] = useState("");
            const [detailsModalItem, setDetailsModalItem] = useState(null);
            
            const localNow = new Date();
            const initY = localNow.getFullYear();
            const initM = String(localNow.getMonth() + 1).padStart(2, '0');
            const initD = String(localNow.getDate()).padStart(2, '0');
            
            const jan4 = new Date(initY, 0, 4);
            const dow = jan4.getDay() || 7;
            const week1Start = jan4.getTime() - (dow - 1) * 86400000;
            const weekNum = Math.floor(((localNow.getTime() - week1Start) / 86400000) / 7) + 1;

            const [logFilter, setLogFilter] = useState({
                type: 'all', date: `${initY}-${initM}-${initD}`, week: `${initY}-W${String(weekNum).padStart(2, '0')}`, month: `${initY}-${initM}`, year: `${initY}`
            });

            const initialForm = { Type: "Mobile Phone", Category: "Smartphones", Brand: "", Model: "", IMEI: "", Color: "", Price: "", OfferPrice: "", Quantity: "1", Status: "Available", Notes: "", Suppliers: [{ name: "", cost: "", qty: "1", units: [{imei: '', status: 'Available'}] }] };
            const initialSpecs = { RAM: "", ROM: "", Other: "" };

            const [form, setForm] = useState(initialForm);
            const [specs, setSpecs] = useState(initialSpecs);
            const [isEditing, setIsEditing] = useState(false);

            const [showQR, setShowQR] = useState(false);
            const [qrUrl, setQrUrl] = useState("");
            const scannerRef = useRef(null);
            const viewRef = useRef(view);

            useEffect(() => { viewRef.current = view; }, [view]);

            const showToast = (msg) => { setToastMsg(msg); setTimeout(() => setToastMsg(""), 3000); };

            useEffect(() => {
                if (lockoutTime) {
                    const interval = setInterval(() => {
                        const remaining = Math.ceil((lockoutTime - Date.now()) / 1000);
                        if (remaining <= 0) {
                            setLockoutTime(null);
                            setLoginAttempts(0);
                            localStorage.removeItem('admin_icon_lockout');
                            setTimeRemaining(0);
                            clearInterval(interval);
                        } else {
                            setTimeRemaining(remaining);
                        }
                    }, 1000);
                    return () => clearInterval(interval);
                }
            }, [lockoutTime]);

            const handleLogin = async (e) => {
                e.preventDefault();
                if (loginLoading || (lockoutTime && Date.now() < lockoutTime)) return;
                if (!passwordInput) { showToast("Please enter your password."); return; }

                setLoginLoading(true);
                try {
                    const result = await window.IconAPI.login('admin', passwordInput);
                    if (!result || result.success !== true) {
                        throw new Error(result?.error || result?.message || 'Incorrect password.');
                    }
                    setIsLoggedIn(true);
                    setLoginAttempts(0);
                    localStorage.removeItem('admin_icon_lockout');
                } catch (error) {
                    const newAttempts = loginAttempts + 1;
                    setLoginAttempts(newAttempts);
                    if (newAttempts >= 3) {
                        const lockUntil = Date.now() + 5 * 60 * 1000; 
                        setLockoutTime(lockUntil);
                        localStorage.setItem('admin_icon_lockout', lockUntil.toString());
                        showToast("Too many failed attempts. Portal locked for 5 minutes.");
                    } else {
                        showToast(`${error?.message || 'Login failed.'} ${3 - newAttempts} attempts remaining.`);
                    }
                } finally {
                    setPasswordInput("");
                    setLoginLoading(false);
                }
            };

            const handleLogout = async () => {
                try { await window.IconAPI.logout(); }
                catch (error) { console.warn('Server logout failed:', error); }
                finally { setIsLoggedIn(false); }
            };

            const dynamicSuppliers = useMemo(() => {
                const suppliers = new Set();
                inventory.forEach(item => {
                    if (item.Units && item.Units.length > 0) {
                        item.Units.forEach(u => { if (u.supplier) suppliers.add(u.supplier.trim()); });
                    }
                    if (item.Suppliers) { item.Suppliers.forEach(s => { if (s.name) suppliers.add(s.name.trim()); }); } 
                    else if (item.Supplier) { suppliers.add(item.Supplier.trim()); }
                });
                return [...suppliers].sort();
            }, [inventory]);

            const fetchData = async (silent = false) => {
                if (!silent) setLoading(true);
                try {
                    const snapshot = await window.IconAPI.getSnapshot();
                    if (!snapshot || snapshot.success !== true || !snapshot.data) {
                        throw new Error(snapshot?.error || snapshot?.message || 'Local database returned an invalid snapshot.');
                    }
                    const snapshotData = snapshot.data;
                    const invData = Array.isArray(snapshotData.inventory) ? snapshotData.inventory : [];
                    const transactionData = Array.isArray(snapshotData.transactions) ? snapshotData.transactions : [];
                    const contactData = Array.isArray(snapshotData.clients) ? snapshotData.clients : [];
                    setInventory([...invData]);
                    setClients([...transactionData]);
                    setContacts([...contactData]);
                    setAssetSummary(snapshotData.assets && typeof snapshotData.assets === 'object' ? {...snapshotData.assets} : null);
                    adminSafeStorage.set(ADMIN_DATA_CACHE_KEY, JSON.stringify({ ...snapshotData, savedAt: Date.now() }));
                    if (!silent) showToast(`Local SQLite: ${invData.length} inventory records loaded.`);
                } catch (err) {
                    console.error('Local data load failed:', err);
                    try {
                        const cached = JSON.parse(adminSafeStorage.get(ADMIN_DATA_CACHE_KEY, 'null'));
                        if (!cached || !Array.isArray(cached.inventory)) throw new Error('No usable cache found.');
                        setInventory([...cached.inventory]);
                        setClients([...(Array.isArray(cached.transactions) ? cached.transactions : [])]);
                        setContacts([...(Array.isArray(cached.clients) ? cached.clients : [])]);
                        setAssetSummary(cached.assets && typeof cached.assets === 'object' ? {...cached.assets} : null);
                        if (!silent) showToast('LAN server unavailable. Showing read-only cached data.');
                    } catch (cacheErr) {
                        if (!silent) showToast(`Failed to load system data: ${err?.message || err}`);
                    }
                } finally {
                    setLoading(false);
                }
            };

            useEffect(() => { 
                if (!isLoggedIn) return undefined;
                let active = true;
                fetchData();
                const refreshSilently = () => { if (active) fetchData(true); };
                const unsubscribe = window.IconAPI.subscribe(refreshSilently);
                window.addEventListener('online', refreshSilently);
                window.addEventListener('focus', refreshSilently);
                return () => {
                    active = false;
                    if (typeof unsubscribe === 'function') unsubscribe();
                    window.removeEventListener('online', refreshSilently);
                    window.removeEventListener('focus', refreshSilently);
                    if (scannerRef.current) scannerRef.current.destroy();
                    scannerRef.current = null;
                };
            }, [isLoggedIn]);

            const analytics = useMemo(() => {
                let chartTrendsMap = {}; 
                let itemizedLogs = [];
                
                const imeiGroups = {};
                
                let logCounter = 0;
                [...clients].reverse().forEach((c) => {
                    let rawDateStr = String(c.date || c.saleDateISO || "").replace(/["']/g, "").trim();
                    let dObj = parseSmartDate(rawDateStr);
                    let saleTime = dObj.getTime();
                    let sigs = generateDateSignatures(dObj);

                    const tType = c.transactionType || 'Sale';
                    const isCredit = String(c.paymentMethod).toLowerCase() === 'credit';
                    const items = c.purchasedItems || c.items || [];
                    
                    let globalDiscount = parseFloat(c.discount) || 0;
                    let sumItemDiscounts = 0;
                    items.forEach(i => { if(!i.isExchange) sumItemDiscounts += (parseFloat(i.itemDiscount) || 0) * (parseInt(i.cartQty) || 1); });
                    let pureGlobalDiscount = Math.max(0, globalDiscount - sumItemDiscounts);
                    let validItemsCount = items.filter(i => !i.isExchange).reduce((sum, i) => sum + (parseInt(i.cartQty) || 1), 0);
                    let globalDiscPerItem = validItemsCount > 0 ? (pureGlobalDiscount / validItemsCount) : 0;

                    items.forEach(item => {
                        if (item.isExchange) return;
                        
                        let imei = item.unitImei || item.displayImei || item["IMEI or Item Code"];
                        if (!imei || imei === 'N/A') imei = 'ACC-' + Math.random().toString(36).substr(2, 9); 
                        
                        if (!imeiGroups[imei]) imeiGroups[imei] = [];
                        
                        let qty = parseInt(item.cartQty) || 1; 
                        let sData = null;
                        try { if (item["Notes (SALES)"]) sData = JSON.parse(item["Notes (SALES)"]); } catch(e) {}

                        let cost = parseFloat(item.unitCost) || sData?.Cost || parseFloat(item.Suppliers?.[0]?.cost) || parseFloat(item.PurchasedPrice) || 0;
                        let extP = parseFloat(item.warranty?.extendedPrice) || 0;
                        let acP = parseFloat(item.warranty?.appleCarePrice) || 0;
                        let itemDisc = parseFloat(item.itemDiscount) || 0;
                        
                        let finalSellingPrice = parseFloat(item.finalPrice);
                        if (sData?.SoldPrice !== undefined) finalSellingPrice = parseFloat(sData.SoldPrice);
                        if (isNaN(finalSellingPrice)) finalSellingPrice = (parseFloat(item.Price) || 0) + extP + acP - itemDisc;

                        let netRevenuePerItem = finalSellingPrice - globalDiscPerItem;
                        let totalItemRev = netRevenuePerItem * qty;
                        let totalItemCost = cost * qty;
                        let totalItemProfit = totalItemRev - totalItemCost;

                        imeiGroups[imei].push({
                            id: Math.random().toString(),
                            invoiceId: c.invoiceId || 'N/A',
                            dateStr: rawDateStr,
                            parsedDate: saleTime,
                            sigs: sigs,
                            name: `${item.Brand || ''} ${item.Model || ''}`.trim() || item.Type || 'Item',
                            imei: item.displayImei || item["IMEI or Item Code"] || 'N/A',
                            qty, cost,
                            extWarrantyRev: extP + acP,
                            netRev: netRevenuePerItem, 
                            itemProfit: totalItemProfit / qty,
                            tType: tType,
                            clientName: c.name,
                            isCredit: isCredit,
                            logOrder: logCounter++
                        });
                    });
                });

                const allValidDates = [];

                Object.values(imeiGroups).forEach(history => {
                    const latestTx = history[history.length - 1];
                    if (latestTx.tType === 'Return') return; 
                    
                    let partnerName = null;
                    history.forEach(tx => {
                        if (tx.tType === 'Issue') partnerName = tx.clientName;
                    });
                    
                    let displayClientName = '';
                    let isPartnerSale = false;
                    
                    if (latestTx.tType === 'Issue') {
                        displayClientName = latestTx.clientName;
                    } else if (latestTx.tType === 'Sale') {
                        if (partnerName) {
                            displayClientName = partnerName; 
                            isPartnerSale = true;
                        }
                    }
                    
                    latestTx.clientName = displayClientName;
                    latestTx.isPartnerSale = isPartnerSale;
                    
                    itemizedLogs.push(latestTx);
                    
                    if (!latestTx.isCredit && latestTx.tType !== 'Issue') {
                        allValidDates.push(latestTx.parsedDate);
                    }
                });

                let useMonthly = false;
                if (allValidDates.length > 0) {
                    const minDate = Math.min(...allValidDates);
                    const maxDate = Math.max(...allValidDates);
                    const daysDiff = (maxDate - minDate) / (1000 * 60 * 60 * 24);
                    useMonthly = daysDiff > 60; 
                }

                Object.values(imeiGroups).forEach(history => {
                    const latestTx = history[history.length - 1];
                    if (!latestTx.isCredit && latestTx.tType !== 'Issue' && latestTx.tType !== 'Return') {
                        let key = useMonthly ? latestTx.sigs.monthlyStr : latestTx.sigs.dailyStr;
                        if (!chartTrendsMap[key]) {
                            chartTrendsMap[key] = { rev: 0, prof: 0, cost: 0, label: key, sortKey: key };
                        }
                        chartTrendsMap[key].rev += (latestTx.netRev * latestTx.qty);
                        chartTrendsMap[key].prof += (latestTx.itemProfit * latestTx.qty);
                        chartTrendsMap[key].cost += (latestTx.cost * latestTx.qty);
                    }
                });

                const trendsArray = Object.values(chartTrendsMap).sort((a,b) => a.sortKey.localeCompare(b.sortKey));
                
                itemizedLogs.sort((a,b) => {
                    if (b.parsedDate !== a.parsedDate) return b.parsedDate - a.parsedDate;
                    return b.logOrder - a.logOrder; // secondary sort to ensure absolutely newest log is at the top
                });
                
                return { trendsArray, itemizedLogs };
            }, [clients]);

            const filteredItemizedLogs = useMemo(() => {
                let logs = analytics.itemizedLogs || [];
                if (logFilter.type === 'daily' && logFilter.date) logs = logs.filter(l => l.sigs.dailyStr === logFilter.date);
                else if (logFilter.type === 'weekly' && logFilter.week) logs = logs.filter(l => l.sigs.weeklyStr === logFilter.week);
                else if (logFilter.type === 'monthly' && logFilter.month) logs = logs.filter(l => l.sigs.monthlyStr === logFilter.month);
                else if (logFilter.type === 'yearly' && logFilter.year) logs = logs.filter(l => l.sigs.yearlyStr === logFilter.year);
                return logs;
            }, [analytics.itemizedLogs, logFilter]);

            const filteredTotals = useMemo(() => {
                let tRev=0, tCost=0, tProf=0, tExt = 0, tQty = 0;
                filteredItemizedLogs.forEach(l => {
                    if (!l.isCredit && l.tType !== 'Issue') {
                        tRev += (l.netRev * l.qty); 
                        tCost += (l.cost * l.qty); 
                        tProf += (l.itemProfit * l.qty); 
                        tExt += (l.extWarrantyRev * l.qty); 
                        tQty += l.qty;
                    }
                });
                return { tRev, tCost, tProf, tExt, tQty };
            }, [filteredItemizedLogs]);


            const stockReport = useMemo(() => {
                let totalAssetsAmount = 0, stockSellingValue = 0, availableUnits = 0, soldUnits = 0, partnerUnits = 0;
                inventory.forEach(item => {
                    const price = parseFloat(item.OfferPrice || item.Price || 0) || 0;
                    const defaultCost = parseFloat(item.PurchasedPrice || item.Cost || 0) || 0;
                    const units = Array.isArray(item.Units) ? item.Units : [];
                    if (units.length) {
                        units.forEach(u => {
                            const status = String(u.status || 'Available').toLowerCase();
                            const cost = parseFloat(u.cost || defaultCost || 0) || 0;
                            if (status === 'available' || status === 'in stock' || status === 'instock') { availableUnits++; totalAssetsAmount += cost; stockSellingValue += price; }
                            else if (status === 'sold') soldUnits++;
                            else if (status.startsWith('partner')) partnerUnits++;
                        });
                    } else {
                        const qty = parseInt(item.Quantity || 0, 10) || 0;
                        availableUnits += qty;
                        totalAssetsAmount += qty * defaultCost;
                        stockSellingValue += qty * price;
                    }
                });
                let sellingIncomeAmount = 0, soldCostAmount = 0;
                clients.forEach(c => {
                    const type = String(c.transactionType || c.recordType || '').toLowerCase();
                    if (type.includes('payment') || type.includes('return')) return;
                    const amount = parseFloat(c.total || c.totalPrice || 0) || 0;
                    sellingIncomeAmount += amount;
                    const items = Array.isArray(c.purchasedItems) ? c.purchasedItems : Array.isArray(c.items) ? c.items : [];
                    items.forEach(i => { soldCostAmount += (parseFloat(i.unitCost || i.cost || 0) || 0) * (parseInt(i.cartQty || i.quantity || 1, 10) || 1); });
                });
                const fallback = { totalAssetsAmount, stockSellingValue, sellingIncomeAmount, soldCostAmount, grossProfit: sellingIncomeAmount - soldCostAmount, availableUnits, soldUnits, partnerUnits, phoneProducts: 0, accessoryProducts: 0, otherProducts: 0, phoneUnits: 0, accessoryUnits: 0, otherUnits: 0, partnerCostValue: 0, partnerIssuedValue: 0, partnerPaymentsReceived: 0 };
                if (!assetSummary) return fallback;
                return {
                    ...fallback,
                    ...assetSummary,
                    totalAssetsAmount: Number(assetSummary.stockCostValue || 0),
                    sellingIncomeAmount: Number(assetSummary.netSalesRevenue || 0),
                    soldCostAmount: Number(assetSummary.netSalesCost || 0),
                    grossProfit: Number(assetSummary.grossProfit || 0),
                    stockSellingValue: Number(assetSummary.stockSellingValue || 0),
                    availableUnits: Number(assetSummary.availableUnits || 0),
                    soldUnits: Number(assetSummary.soldUnits || 0),
                    partnerUnits: Number(assetSummary.partnerUnits || 0)
                };
            }, [inventory, clients, assetSummary]);

            const getFilterDetails = () => {
                const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
                let title = "All Time Sales Report"; let subtitle = "Complete historical data";
                if (logFilter.type === 'daily' && logFilter.date) { const [y, m, d] = logFilter.date.split('-'); title = "Daily Report"; subtitle = `${months[parseInt(m)-1]} ${parseInt(d)}, ${y}`; }
                else if (logFilter.type === 'weekly' && logFilter.week) { const [y, w] = logFilter.week.split('-W'); title = "Weekly Report"; subtitle = `Week ${w} of ${y}`; }
                else if (logFilter.type === 'monthly' && logFilter.month) { const [y, m] = logFilter.month.split('-'); title = "Monthly Report"; subtitle = `${months[parseInt(m)-1]} ${y}`; }
                else if (logFilter.type === 'yearly' && logFilter.year) { title = "Yearly Report"; subtitle = `Fiscal Year ${logFilter.year}`; }
                return { title, subtitle };
            };

            const filteredInventory = useMemo(() => {
                let results = inventory;
                if (searchQuery) {
                    const terms = searchQuery.toLowerCase().trim().split(/\s+/);
                    results = inventory.filter(item => {
                        const allImeis = item.Units ? item.Units.map(u => u.imei).join(" ") : "";
                        const sups = item.Units ? item.Units.map(u => u.supplier).join(" ") : "";
                        const combined = `${item.Brand} ${item.Model} ${item.IMEI} ${sups} ${allImeis} ${item.Category} ${item.Status}`.toLowerCase();
                        return terms.every(t => combined.includes(t));
                    });
                }
                
                return [...results].sort((a, b) => {
                    const aSold = String(a.Status).toLowerCase().includes('sold');
                    const bSold = String(b.Status).toLowerCase().includes('sold');
                    if (aSold && !bSold) return 1;
                    if (!aSold && bSold) return -1;
                    return 0;
                });
            }, [inventory, searchQuery]);

            const handleEditClick = (item) => {
                setIsEditing(true);
                let ram = "", rom = "", other = "";
                if (item.Specs && item.Specs.startsWith('{')) {
                    try {
                        const parsedSpecs = JSON.parse(item.Specs);

                    const key = `${u.supplier}_${u.cost}`;
                    if (!supsMap[key]) supsMap[key] = { name: u.supplier, cost: u.cost, units: [] };
                    supsMap[key].units.push(u);

                let loadedSuppliers = Object.values(supsMap).map(s => ({ ...s, qty: s.units.length.toString() }));

                    Type: item.Type || "Mobile Phone", Category: item.Category || "", Brand: item.Brand || "", Model: item.Model || "", IMEI: item.IMEI || "", Color: item.Color || "", Price: item.Price || "", OfferPrice: item.OfferPrice || "", Quantity: item.Quantity || "1", Status: item.Status || "Available", Notes: item.Notes || "",

                });
                setSpecs({ RAM: ram, ROM: rom, Other: other });
                setView('form');
            };

            const handleAddNewClick = () => { setIsEditing(false); setForm(initialForm); setSpecs(initialSpecs); setView('form'); };
            const handleCancel = () => { setView('list'); setForm(initialForm); setSpecs(initialSpecs); };

            const handleChange = (e) => { setForm({ ...form, [e.target.name]: e.target.value }); };
            const handleSpecChange = (e) => setSpecs({...specs, [e.target.name]: e.target.value});

            const handleSupplierChange = (index, field, value) => {
                const newSup = [...form.Suppliers]; 
                newSup[index][field] = value;
                
                if (field === 'qty') {
                    const num = parseInt(value) || 0;
                    const currentUnits = newSup[index].units || [];
                    let newUnits = [...currentUnits];
                    if (num > currentUnits.length) {
                        for(let i=currentUnits.length; i<num; i++) newUnits.push({ imei: '', status: 'Available', dateAdded: new Date().toISOString() });
                    } else {
                        newUnits = newUnits.slice(0, num);
                    }
                    newSup[index].units = newUnits;
                }
                
                let totalQty = 0;
                newSup.forEach(s => totalQty += (parseInt(s.qty) || 0));
                
                setForm({...form, Suppliers: newSup, Quantity: totalQty.toString(), Status: totalQty > 0 ? 'Available' : 'Sold'});
            };
            
            const handleUnitImeiChange = (supIndex, unitIndex, value) => {
                const newSup = [...form.Suppliers];
                newSup[supIndex].units[unitIndex].imei = value;
                setForm({...form, Suppliers: newSup});
            };

            const addSupplierRow = () => { setForm({ ...form, Suppliers: [...form.Suppliers, { name: "", cost: "", qty: "1", units: [{imei: '', status: 'Available', dateAdded: new Date().toISOString()}] }] }); };
            const removeSupplierRow = (index) => {
                const newSuppliers = form.Suppliers.filter((_, i) => i !== index);
                let totalQty = 0;
                newSuppliers.forEach(s => totalQty += (parseInt(s.qty) || 0));
                setForm({ ...form, Suppliers: newSuppliers, Quantity: totalQty.toString(), Status: totalQty > 0 ? 'Available' : 'Sold' });
            };

            const startPeerServer = () => {
                if (scannerRef.current) { setShowQR(true); return; }
                const scanner = window.IconAPI.createScannerHost((data) => {
                        if (view === 'form') {
                            setForm(prevForm => {
                                let updatedSuppliers = [...prevForm.Suppliers];
                                let filled = false;
                                for (let sIdx = 0; sIdx < updatedSuppliers.length; sIdx++) {
                                    let sup = updatedSuppliers[sIdx];
                                    for (let uIdx = 0; uIdx < sup.units.length; uIdx++) {
                                        if (!sup.units[uIdx].imei && sup.units[uIdx].status !== 'Sold' && !String(sup.units[uIdx].status).startsWith('Partner')) {
                                            let newUnits = [...sup.units];
                                            newUnits[uIdx] = { ...newUnits[uIdx], imei: data };
                                            updatedSuppliers[sIdx] = { ...sup, units: newUnits };
                                            filled = true; break;
                                        }
                                    }
                                    if (filled) break;
                                }
                                if (filled) { showToast(`🔍 Scanned Unit IMEI: ${data}`); return { ...prevForm, Suppliers: updatedSuppliers }; } 
                                else if (!prevForm.IMEI) { showToast(`🔍 Scanned Group SKU: ${data}`); return { ...prevForm, IMEI: data }; } 
                                else { showToast(`⚠️ Scanned ${data}, but no empty unit fields available.`); return prevForm; }
                            });
                        } else {
                            setSearchQuery(data); showToast(`🔍 Searched: ${data}`);
                        }
                    }, () => { setShowQR(false); showToast("✅ Mobile Scanner Connected!"); });
                setQrUrl(scanner.url); setShowQR(true);
                scannerRef.current = scanner;
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!form.IMEI || !form.Brand || !form.Model || !form.Price) { showToast("❌ Group Code (SKU), Brand, Model, and Price required."); return; }
                
                let missingImei = false;
                form.Suppliers.forEach(s => { s.units.forEach(u => { if (!u.imei) missingImei = true; }) });
                if (missingImei) { showToast("❌ Please fill out all Individual Unit IMEIs."); return; }
                
                setActionLoading(true);

                const specsObj = {};
                if (specs.RAM && specs.RAM.trim().toLowerCase() !== "none") specsObj.RAM = specs.RAM.trim();
                if (specs.ROM && specs.ROM.trim().toLowerCase() !== "none") specsObj.ROM = specs.ROM.trim();
                if (specs.Other && specs.Other.trim() !== "") specsObj.Other = specs.Other.trim();

                const unitsToSave = [];
                form.Suppliers.forEach(sup => {
                    sup.units.forEach(u => {
                        unitsToSave.push({ imei: u.imei, supplier: sup.name, cost: parseFloat(sup.cost) || 0, dateAdded: u.dateAdded || new Date().toISOString(), status: u.status || 'Available' });
                    });
                });

                const dataJsonObj = { Brand: form.Brand, Model: form.Model, Category: form.Category, Color: form.Color, Price: form.Price, OfferPrice: form.OfferPrice, Specs: Object.keys(specsObj).length > 0 ? JSON.stringify(specsObj) : "", Units: unitsToSave };
                const finalItem = { "Select Phone or item": form.Type, "IMEI or Item Code": form.IMEI, "Status": form.Status, "Quantity": form.Quantity, "Notes": form.Notes, "DATA (JSON)": JSON.stringify(dataJsonObj) };

                try {
                    const action = isEditing ? 'update_item' : 'add_item';

                    if (!res || res.success !== true) throw new Error(res?.error || res?.message || 'Inventory save failed.');
                    showToast(`Successfully ${isEditing ? 'updated' : 'added'}!`);

            const handleDeleteInventory = async (item) => {

                setActionLoading(true);
                try {
                    const result = await window.IconAPI.action({ action: 'delete_item', imei: code });
                    if (!result?.success) throw new Error(result?.message || 'Inventory deletion failed.');
                    await fetchData(true);
                    showToast(`Inventory product ${code} deleted.`);
                } catch (error) { showToast(error?.message || String(error)); }
                finally { setActionLoading(false); }

                                        <div className="flex items-center gap-2"><span className="w-3 h-1 rounded bg-green-500"></span><span className="text-[10px] font-bold uppercase tracking-wide text-gray-600">Net Profit</span></div>
                                    </div>
                                </div>
                                <div className="bg-white p-6 sm:p-8 rounded-3xl border border-gray-200 shadow-sm flex flex-col">

                                        <div><h3 className="text-sm font-black uppercase tracking-widest text-gray-800 mb-1">Itemized Profit & Loss Log ({filterDetails.subtitle})</h3><p className="text-xs text-gray-500">Filter data securely and instantly save reports directly to a fully-formatted PDF.</p></div>
                                        <div className="flex flex-col sm:flex-row items-center gap-3 w-full md:w-auto">
                                            <div className="flex items-center gap-2 bg-gray-50 p-1.5 rounded-xl border border-gray-200 w-full sm:w-auto">

                                                    <option value="all">All Time</option><option value="daily">Daily</option><option value="weekly">Weekly</option><option value="monthly">Monthly</option><option value="yearly">Annually</option>
