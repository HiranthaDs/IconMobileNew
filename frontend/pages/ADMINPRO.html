      };
      window.addEventListener('error', function(e){
        if (!document.body.classList.contains('app-mounted')) window.__ICON_BOOT_ERROR__(e.message || 'Startup script error');
      });
      window.addEventListener('unhandledrejection', function(e){
        if (!document.body.classList.contains('app-mounted')) window.__ICON_BOOT_ERROR__((e.reason && (e.reason.stack || e.reason.message || e.reason)) || 'Startup promise error');
      });
      setTimeout(function(){
        if (!document.body.classList.contains('app-mounted')) {
          var root = document.getElementById('root');
          if (root && /Loading/i.test(root.textContent || '')) window.__ICON_BOOT_ERROR__('The app is taking too long to start. Check the Python server and local browser assets.');
        }
      }, 18000);
    })();

        const AutocompleteInput = ({ name, value, onChange, options = [], placeholder, type = "text", required = false, disabled = false, className = "" }) => {
            const [show, setShow] = useState(false);
            const [focus, setFocus] = useState(false);

            const filtered = options.filter(o => o.toLowerCase().includes((value||'').toLowerCase()));
            const exactMatch = filtered.length === 1 && filtered[0].toLowerCase() === (value||'').toLowerCase();

            return (
                <div className="relative w-full">
                    <input 
                        name={name} value={value||''} onChange={onChange}
                        onFocus={() => { setFocus(true); setShow(true); }}
                        onBlur={() => setTimeout(() => setFocus(false), 200)}
                        placeholder={placeholder} type={type} required={required} disabled={disabled}
                        className={`pro-input ${className} ${disabled ? 'bg-gray-100 text-gray-400 cursor-not-allowed border-gray-200 shadow-inner' : ''}`} autoComplete="off"
                    />
                    {focus && show && filtered.length > 0 && !exactMatch && !disabled && (
                        <ul className="absolute z-50 w-full bg-white border border-gray-200 rounded-lg shadow-lg max-h-48 overflow-y-auto mt-1 fade-in py-1">

        class ErrorBoundary extends React.Component {
            constructor(props) { super(props); this.state = { hasError: false, error: null }; }
            static getDerivedStateFromError(error) { return { hasError: true, error }; }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="min-h-screen bg-[#f2f2f7] flex items-center justify-center p-6">

                }
                return this.props.children;
            }
        }

        const formatSpecsDisplay = (specsStr) => {
            if (!specsStr) return "";
            if (specsStr.startsWith('{')) {
                try {
                    const parsed = JSON.parse(specsStr);
                    let display = [];
                    if (parsed.RAM && parsed.RAM.trim() !== "" && parsed.RAM.trim().toLowerCase() !== "none") display.push(`${parsed.RAM} RAM`);
                    if (parsed.ROM && parsed.ROM.trim() !== "" && parsed.ROM.trim().toLowerCase() !== "none") display.push(`${parsed.ROM} ROM`);
                    if (parsed.Other && parsed.Other.trim() !== "") display.push(parsed.Other);
                    return display.join(' • ');
                } catch (e) { return specsStr; }
            }
            return specsStr;
        };

        const isWarrantyExpired = (endDateStr) => {
            if (!endDateStr || endDateStr === 'None' || endDateStr === 'N/A') return false;
            const end = new Date(endDateStr);
            if (isNaN(end)) return false; 
            return end < new Date();
        };

        const parseSmartDate = (dateStr) => {
            if (!dateStr) return new Date();
            let clean = dateStr.replace(/["']/g, "").replace(/\s+at\s+/i, ' ').trim();
            
            const ymdMatch = clean.match(/^(\d{4})[-/](\d{1,2})[-/](\d{1,2})/);
            if (ymdMatch) {
                const y = parseInt(ymdMatch[1], 10);
                const m = parseInt(ymdMatch[2], 10) - 1;
                const d = parseInt(ymdMatch[3], 10);
                const tempDate = new Date(y, m, d);
                if (!isNaN(tempDate.getTime())) return tempDate;
            }

            const dmyMatch = clean.match(/^(\d{1,2})[-/](\d{1,2})[-/](\d{4})/);
            if (dmyMatch) {
                const p1 = parseInt(dmyMatch[1], 10);
                const p2 = parseInt(dmyMatch[2], 10);
                const y = parseInt(dmyMatch[3], 10);
                let tempDate;
                if (p1 > 12) { tempDate = new Date(y, p2 - 1, p1); } 
                else if (p2 > 12) { tempDate = new Date(y, p1 - 1, p2); } 
                else { tempDate = new Date(y, p2 - 1, p1); }
                if (!isNaN(tempDate.getTime())) return tempDate;
            }

            let parsed = new Date(clean);
            if (!isNaN(parsed.getTime())) return parsed;
            
            return new Date(); 
        };

        const generateDateSignatures = (d) => {
            const y = d.getFullYear();
            const m = d.getMonth() + 1;
            const day = d.getDate();
            
            const jan4 = new Date(y, 0, 4);
            const dow = jan4.getDay() || 7;
            const week1Start = jan4.getTime() - (dow - 1) * 86400000;
            const weekNum = Math.floor(((d.getTime() - week1Start) / 86400000) / 7) + 1;
            
            return {
                dailyStr: `${y}-${m.toString().padStart(2,'0')}-${day.toString().padStart(2,'0')}`,
                monthlyStr: `${y}-${m.toString().padStart(2,'0')}`,
                yearlyStr: `${y}`,
                weeklyStr: `${y}-W${weekNum.toString().padStart(2,'0')}`
            };
        };

        const LineChart = ({ data }) => {
            if (!data || data.length === 0) return <div className="text-gray-400 text-xs font-medium w-full h-full flex items-center justify-center min-h-[160px]">No sales data available.</div>;

            const maxVal = Math.max(...data.flatMap(d => [d.rev, d.cost, d.prof]), 100);
            const minVal = Math.min(...data.flatMap(d => [d.rev, d.cost, d.prof, 0])); 
            const range = maxVal - minVal || 1;
            
            const width = 800; const height = 260; const pLeft = 60; const pRight = 20; const pTop = 20; const pBottom = 45;
            const graphWidth = width - pLeft - pRight; const graphHeight = height - pTop - pBottom;
            
            const getX = (index) => data.length === 1 ? width / 2 : pLeft + (index * graphWidth / (data.length - 1));
            const getY = (val) => height - pBottom - (((val - minVal) / range) * graphHeight);

            const makePath = (key) => {
                if (data.length <= 1) return ``; // Circles will show for single item
                return data.map((d, i) => `${i === 0 ? 'M' : 'L'} ${getX(i)} ${getY(d[key])}`).join(' ');
            };

            const [hoverIdx, setHoverIdx] = useState(null);

            return (
                <div className="relative w-full pb-2">
                    <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-auto overflow-visible">
                        <text transform={`rotate(-90) translate(-${height/2}, 14)`} textAnchor="middle" fontSize="10" fill="#8e8e93" className="font-sans font-bold uppercase tracking-widest">Amount (LKR)</text>
                        <text x={pLeft + graphWidth/2} y={height - 4} textAnchor="middle" fontSize="10" fill="#8e8e93" className="font-sans font-bold uppercase tracking-widest">Time Period</text>

                        {[0, 0.5, 1].map(pct => {
                            const yPos = height - pBottom - (graphHeight * pct);
                            return (
                                <g key={pct}>
                                    <line x1={pLeft} y1={yPos} x2={width - pRight} y2={yPos} stroke="#e5e5ea" strokeDasharray="none" strokeWidth="1" />
                                    <text x={pLeft - 8} y={yPos + 4} textAnchor="end" fontSize="10" fill="#9ca3af" className="font-sans font-medium">
                                        {(minVal + range * pct).toLocaleString(undefined, {notation:'compact'})}
                                    </text>
                                </g>
                            )
                        })}

                        {minVal < 0 && <line x1={pLeft} y1={getY(0)} x2={width - pRight} y2={getY(0)} stroke="#ff3b30" strokeWidth="1.5" strokeDasharray="4" />}

                        {data.length > 1 && (
                            <>
                                <path d={makePath('rev')} fill="none" stroke="#000000" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className="transition-all duration-300" />
                                <path d={makePath('cost')} fill="none" stroke="#8e8e93" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className="transition-all duration-300" />
                                <path d={makePath('prof')} fill="none" stroke="#34c759" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className="transition-all duration-300" />
                            </>
                        )}
                        
                        {data.map((d, i) => (
                            <g key={i}>
                                <text x={getX(i)} y={height - pBottom + 20} textAnchor="middle" fontSize="10" fill="#8e8e93" className="font-sans font-medium">{d.label}</text>
                                <rect x={data.length === 1 ? 0 : getX(i) - (graphWidth / Math.max(data.length, 1)) / 2} y={0} width={data.length === 1 ? width : graphWidth / Math.max(data.length, 1)} height={height} fill="transparent"
                                    onMouseEnter={() => setHoverIdx(i)} onMouseLeave={() => setHoverIdx(null)} className="cursor-pointer outline-none z-50 relative" />
                                
                                <circle cx={getX(i)} cy={getY(d.rev)} r="4" fill="#000000" stroke="#fff" strokeWidth="1.5" />
                                <circle cx={getX(i)} cy={getY(d.cost)} r="4" fill="#8e8e93" stroke="#fff" strokeWidth="1.5" />
                                <circle cx={getX(i)} cy={getY(d.prof)} r="4" fill="#34c759" stroke="#fff" strokeWidth="1.5" />

                                {hoverIdx === i && (
                                    <g>
                                        <line x1={getX(i)} y1={pTop} x2={getX(i)} y2={height - pBottom} stroke="#c7c7cc" strokeWidth="1" strokeDasharray="4" />
                                        <circle cx={getX(i)} cy={getY(d.rev)} r="6" fill="#000000" stroke="#fff" strokeWidth="2" />
                                        <circle cx={getX(i)} cy={getY(d.cost)} r="6" fill="#8e8e93" stroke="#fff" strokeWidth="2" />
                                        <circle cx={getX(i)} cy={getY(d.prof)} r="6" fill="#34c759" stroke="#fff" strokeWidth="2" />
                                    </g>
                                )}
                            </g>
                        ))}
                    </svg>
                    {hoverIdx !== null && (
                        <div className="absolute bg-white/95 backdrop-blur-xl text-black p-3 rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.12)] pointer-events-none text-xs transform -translate-x-1/2 z-50 border border-gray-200 w-52" 
                             style={{ left: `${(getX(hoverIdx) / width) * 100}%`, top: `${(getY(data[hoverIdx].rev) / height) * 100}%`, marginTop: '-60px' }}>
                            <div className="font-bold mb-2 border-b border-gray-100 pb-1.5 text-gray-900 text-center tracking-tight">{data[hoverIdx].label}</div>
                            <div className="flex justify-between items-center mb-1"><span className="text-gray-500 font-medium">Revenue</span> <span className="font-semibold text-gray-900">LKR {data[hoverIdx].rev.toLocaleString()}</span></div>
                            <div className="flex justify-between items-center mb-1"><span className="text-gray-500 font-medium">Costs</span> <span className="font-semibold text-gray-600">LKR {data[hoverIdx].cost.toLocaleString()}</span></div>
                            <div className="flex justify-between items-center border-t border-gray-100 mt-1.5 pt-1.5"><span className="text-gray-900 font-bold">Net Profit</span> <span className={`font-bold ${data[hoverIdx].prof < 0 ? 'text-red-500' : 'text-green-500'}`}>LKR {data[hoverIdx].prof.toLocaleString()}</span></div>
                        </div>
                    )}
                </div>
            )
        };

        const BarChart = ({ data }) => {
            if (!data || data.length === 0) return <div className="text-gray-400 text-xs font-medium w-full h-full flex items-center justify-center min-h-[160px]">No sales data available.</div>;

            const maxVal = Math.max(...data.flatMap(d => [d.rev, d.cost, Math.max(0, d.prof)]), 100);
            const minVal = Math.min(...data.flatMap(d => [d.prof]), 0); 
            const range = (maxVal - minVal) || 1;
            
            const width = 800; const height = 260; const pLeft = 60; const pRight = 20; const pTop = 20; const pBottom = 45;
            const graphWidth = width - pLeft - pRight; const graphHeight = height - pTop - pBottom;
            
            const getY = (val) => height - pBottom - (((val - minVal) / range) * graphHeight);
            const zeroY = getY(0);

            const groupWidth = graphWidth / Math.max(data.length, 1);
            const barWidth = Math.min(groupWidth / 4, 16); const gap = 3;
            const getX = (index) => pLeft + (index * groupWidth) + groupWidth/2;

            const [hoverIdx, setHoverIdx] = useState(null);

            return (
                <div className="relative w-full pb-2">
                    <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-auto overflow-visible">
                        <text transform={`rotate(-90) translate(-${height/2}, 14)`} textAnchor="middle" fontSize="10" fill="#8e8e93" className="font-sans font-bold uppercase tracking-widest">Amount (LKR)</text>
                        <text x={pLeft + graphWidth/2} y={height - 4} textAnchor="middle" fontSize="10" fill="#8e8e93" className="font-sans font-bold uppercase tracking-widest">Time Period</text>

                        {[0, 0.5, 1].map(pct => {
                            const yPos = height - pBottom - (graphHeight * pct);
                            return (<g key={pct}><line x1={pLeft} y1={yPos} x2={width - pRight} y2={yPos} stroke="#e5e5ea" strokeDasharray="none" strokeWidth="1" /></g>);
                        })}

                        <line x1={pLeft} y1={zeroY} x2={width - pRight} y2={zeroY} stroke="#c7c7cc" strokeWidth="1.5" />

                        {data.map((d, i) => {
                            const cx = getX(i);
                            const revH = (Math.abs(d.rev) / range) * graphHeight; const costH = (Math.abs(d.cost) / range) * graphHeight; const profH = (Math.abs(d.prof) / range) * graphHeight;
                            const rY = d.rev >= 0 ? zeroY - revH : zeroY; const cY = d.cost >= 0 ? zeroY - costH : zeroY; const pY = d.prof >= 0 ? zeroY - profH : zeroY;

                            return (
                                <g key={i}>
                                    <rect x={cx - barWidth*1.5 - gap} y={rY} width={barWidth} height={revH} fill="#000000" rx="3" className="transition-all duration-300" />
                                    <rect x={cx - barWidth/2} y={cY} width={barWidth} height={costH} fill="#8e8e93" rx="3" className="transition-all duration-300" />
                                    <rect x={cx + barWidth/2 + gap} y={pY} width={barWidth} height={profH} fill={d.prof >= 0 ? "#34c759" : "#ff3b30"} rx="3" className="transition-all duration-300" />
                                    <text x={cx} y={height - pBottom + 20} textAnchor="middle" fontSize="10" fill="#8e8e93" className="font-sans font-medium">{d.label}</text>
                                    <rect x={cx - groupWidth/2} y={0} width={groupWidth} height={height} fill="transparent"
                                        onMouseEnter={() => setHoverIdx(i)} onMouseLeave={() => setHoverIdx(null)} className="cursor-pointer outline-none" />
                                </g>
                            )
                        })}
                    </svg>

                    {hoverIdx !== null && (
                        <div className="absolute bg-white/95 backdrop-blur-xl text-black p-3 rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.12)] pointer-events-none text-xs transform -translate-x-1/2 z-50 border border-gray-200 w-52" 
                             style={{ left: `${(getX(hoverIdx) / width) * 100}%`, top: `60px`, marginTop: '0' }}>
                            <div className="font-bold mb-2 border-b border-gray-100 pb-1.5 text-gray-900 text-center tracking-tight">{data[hoverIdx].label}</div>
                            <div className="flex justify-between items-center mb-1"><span className="text-gray-500 font-medium">Revenue</span> <span className="font-semibold text-gray-900">LKR {data[hoverIdx].rev.toLocaleString()}</span></div>
                            <div className="flex justify-between items-center mb-1"><span className="text-gray-500 font-medium">Costs</span> <span className="font-semibold text-gray-600">LKR {data[hoverIdx].cost.toLocaleString()}</span></div>
                            <div className="flex justify-between items-center border-t border-gray-100 mt-1.5 pt-1.5"><span className="text-gray-900 font-bold">Net Profit</span> <span className={`font-bold ${data[hoverIdx].prof < 0 ? 'text-red-500' : 'text-green-500'}`}>LKR {data[hoverIdx].prof.toLocaleString()}</span></div>
                        </div>
                    )}
                </div>
            )
        };

        const PrintableAnalyticsReport = ({ logs, totals, filterTitle, filterSubtitle }) => {

            const chunks = [];
            for (let i = 0; i < logs.length; i += ITEMS_PER_PAGE) {

                                    <h1 style={{ fontSize: '32px', fontWeight: '800', letterSpacing: '-1px', margin: '0 0 4px 0', color: '#000000' }}>ICON MOBILE</h1>
                                    <h2 style={{ fontSize: '11px', fontWeight: '600', color: '#8E8E93', margin: '0', letterSpacing: '0.8px', textTransform: 'uppercase' }}>Financial Intelligence Report</h2>
                                </div>
                                <div style={{ textAlign: 'right' }}>
                                    <div style={{ fontSize: '11px', fontWeight: '700', color: '#000000', textTransform: 'uppercase', marginBottom: '4px', letterSpacing: '0.5px' }}>
                                        {filterTitle} {chunks.length > 1 ? `(Page ${pageIndex + 1}/${chunks.length})` : ''}
                                    </div>
                                    <p style={{ fontSize: '10px', color: '#8E8E93', margin: '0 0 2px 0', fontWeight: '500' }}>{filterSubtitle}</p>
                                    <p style={{ fontSize: '9px', color: '#C7C7CC', margin: '0', fontWeight: '500' }}>Generated: {new Date().toLocaleString()}</p>
                                </div>
                            </div>

                            {pageIndex === 0 && (
                                <div style={{ display: 'flex', gap: '20px', marginBottom: '30px' }}>
                                    <div style={{ flex: 1, padding: '12px 0', borderTop: '1px solid #E5E5EA', borderBottom: '1px solid #E5E5EA', display: 'flex', flexDirection: 'column', gap: '6px' }}>
                                        <span style={{ fontSize: '9px', fontWeight: '600', color: '#8E8E93', textTransform: 'uppercase', letterSpacing: '0.5px' }}>Total Income</span>
                                        <span style={{ fontSize: '20px', fontWeight: '700', color: '#000000', letterSpacing: '-0.5px' }}>LKR {totals.tRev.toLocaleString(undefined, {maximumFractionDigits:0})}</span>
                                    </div>
                                    <div style={{ flex: 1, padding: '12px 0', borderTop: '1px solid #E5E5EA', borderBottom: '1px solid #E5E5EA', display: 'flex', flexDirection: 'column', gap: '6px' }}>
                                        <span style={{ fontSize: '9px', fontWeight: '600', color: '#8E8E93', textTransform: 'uppercase', letterSpacing: '0.5px' }}>Total Spend (COGS)</span>
                                        <span style={{ fontSize: '20px', fontWeight: '700', color: '#000000', letterSpacing: '-0.5px' }}>LKR {totals.tCost.toLocaleString(undefined, {maximumFractionDigits:0})}</span>
                                    </div>
                                    <div style={{ flex: 1, padding: '12px 0', borderTop: '1px solid #E5E5EA', borderBottom: '1px solid #E5E5EA', display: 'flex', flexDirection: 'column', gap: '6px' }}>
                                        <span style={{ fontSize: '9px', fontWeight: '600', color: '#8E8E93', textTransform: 'uppercase', letterSpacing: '0.5px' }}>Warranty Add-ons</span>
                                        <span style={{ fontSize: '20px', fontWeight: '700', color: '#000000', letterSpacing: '-0.5px' }}>LKR {totals.tExt.toLocaleString(undefined, {maximumFractionDigits:0})}</span>
                                    </div>
                                    <div style={{ flex: 1, padding: '12px 0', borderTop: '2px solid #000000', borderBottom: '2px solid #000000', display: 'flex', flexDirection: 'column', gap: '6px' }}>
                                        <span style={{ fontSize: '9px', fontWeight: '600', color: totals.tProf < 0 ? '#FF3B30' : '#000000', textTransform: 'uppercase', letterSpacing: '0.5px' }}>Net Profit</span>
                                        <span style={{ fontSize: '20px', fontWeight: '800', letterSpacing: '-0.5px', color: totals.tProf < 0 ? '#FF3B30' : '#34C759' }}>LKR {totals.tProf.toLocaleString(undefined, {maximumFractionDigits:0})}</span>
                                    </div>
                                </div>
                            )}

                            <div style={{ flex: 1 }}>
                                {pageIndex === 0 && <h3 style={{ fontSize: '12px', fontWeight: '700', textTransform: 'uppercase', letterSpacing: '0.5px', marginBottom: '12px', color: '#000000', borderBottom: '1px solid #000000', paddingBottom: '6px' }}>Sales Breakdown</h3>}
                                <table style={{ width: '100%', tableLayout: 'fixed', borderCollapse: 'collapse', textAlign: 'left', border: 'none' }}>

                                        <tr>

                                            <th style={{ width: '28%', padding: '6px 0', fontSize: '8px', textTransform: 'uppercase', color: '#8E8E93', fontWeight: '600', borderBottom: '1px solid #E5E5EA', borderTop: 'none', letterSpacing: '0.5px' }}>Product / IMEI</th>
                                            <th style={{ width: '5%', padding: '6px 0', fontSize: '8px', textTransform: 'uppercase', color: '#8E8E93', fontWeight: '600', borderBottom: '1px solid #E5E5EA', borderTop: 'none', textAlign: 'center', letterSpacing: '0.5px' }}>Qty</th>
                                            <th style={{ width: '12%', padding: '6px 0', fontSize: '8px', textTransform: 'uppercase', color: '#8E8E93', fontWeight: '600', borderBottom: '1px solid #E5E5EA', borderTop: 'none', textAlign: 'right', letterSpacing: '0.5px' }}>Avg Cost</th>
                                            <th style={{ width: '12%', padding: '6px 0', fontSize: '8px', textTransform: 'uppercase', color: '#8E8E93', fontWeight: '600', borderBottom: '1px solid #E5E5EA', borderTop: 'none', textAlign: 'right', letterSpacing: '0.5px' }}>Warranty</th>

                                            <th style={{ width: '13%', padding: '6px 0', fontSize: '8px', textTransform: 'uppercase', color: '#8E8E93', fontWeight: '600', borderBottom: '1px solid #E5E5EA', borderTop: 'none', textAlign: 'right', letterSpacing: '0.5px' }}>Profit</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {chunk.length === 0 ? (
                                            <tr><td colSpan="7" style={{ padding: '30px 0', textAlign: 'center', fontSize: '11px', fontStyle: 'italic', color: '#8E8E93' }}>No sales data found for the selected period.</td></tr>
                                        ) : (
                                            chunk.map((log, i) => {
                                                const isCredit = log.isCredit;
                                                const isIssue = log.tType === 'Issue';
                                                
                                                let rowBg = 'transparent';

                                                        <td style={{ padding: '10px 4px', borderBottom: '1px solid #F2F2F7', fontSize: '10px', verticalAlign: 'top', wordWrap: 'break-word' }}>
                                                            <div style={{ fontWeight: '600', color: mainText }}>
                                                                {log.name}

                                                            <div style={{ color: subText, fontSize: '8px', fontFamily: 'monospace', marginTop: '2px' }}>{log.imei}</div>
                                                        </td>
                                                        <td style={{ padding: '10px 4px', borderBottom: '1px solid #F2F2F7', fontSize: '10px', textAlign: 'center', fontWeight: '600', color: mainText, verticalAlign: 'top' }}>{log.qty}</td>
                                                        <td style={{ padding: '10px 4px', borderBottom: '1px solid #F2F2F7', fontSize: '10px', textAlign: 'right', color: subText, verticalAlign: 'top' }}>{log.cost === 0 ? '0' : log.cost.toLocaleString(undefined, {maximumFractionDigits:0})}</td>

                                                        <td style={{ padding: '10px 4px', borderBottom: '1px solid #F2F2F7', fontSize: '10px', textAlign: 'right', fontWeight: '700', color: isCredit ? '#BE185D' : (log.itemProfit > 0 ? '#34C759' : (log.itemProfit < 0 ? '#FF3B30' : '#000000')), verticalAlign: 'top' }}>
                                                            {log.itemProfit > 0 && !isCredit ? '+' : ''}{log.itemProfit === 0 ? '0' : (log.itemProfit * log.qty).toLocaleString(undefined, {maximumFractionDigits:0})}
                                                        </td>
                                                    </tr>
                                                );
                                            })
                                        )}
                                    </tbody>
                                </table>
                            </div>

                                            <td style={{ width: '5%', padding: '16px 0', fontSize: '12px', fontWeight: '700', textAlign: 'center', color: '#000000', borderTop: '2px solid #000000' }}>{totals.tQty}</td>
