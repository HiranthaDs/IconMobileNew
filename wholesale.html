function parseDate(value) {

    const d = new Date(raw);
    return Number.isNaN(d.getTime()) ? new Date(0) : d;
}

const isDateInRange = (dateStr, type, from, to) => {
    if (type === 'all') return true;
    const d = parseDate(dateStr);
    if (!d || isNaN(d.getTime())) return false;
    const now = new Date();
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    
    if (type === 'today') return d >= today;
    if (type === 'week') { const lw = new Date(today); lw.setDate(today.getDate() - 7); return d >= lw; }
    if (type === 'month') return d.getMonth() === today.getMonth() && d.getFullYear() === today.getFullYear();
    if (type === 'last_month') { const lm = new Date(today.getFullYear(), today.getMonth() - 1, 1); const tm = new Date(today.getFullYear(), today.getMonth(), 1); return d >= lm && d < tm; }

};

function Dashboard({ data, setView }) {
    const metrics = useMemo(() => {
        const ledger = data.ledger || [];
        const receivable = ledger.reduce((s, p) => s + Math.max(0, n(p.globalBalance)), 0);
        const issued = ledger.reduce((s, p) => s + Math.max(0, n(p.totalDebt)), 0);
        const collected = ledger.reduce((s, p) => s + Math.max(0, n(p.totalPaid)), 0);
        const profit = (data.profitRows || []).reduce((s, r) => s + n(r.profit), 0);
        const risky = ledger.filter(p => n(p.globalBalance) > 0).length;
        const lowStock = (data.inventory || []).filter(i => n(i.Quantity) <= 1 && !clean(i.Status).toLowerCase().includes("sold")).length;
        return { receivable, issued, collected, profit, risky, lowStock, partners: ledger.length, stock: (data.inventory || []).length };
    }, [data]);
    const topDebtors = [...(data.ledger || [])].filter(p => n(p.globalBalance) > 0).slice(0, 6);

    return (
        <div className="space-y-5 fade-in h-full overflow-y-auto pr-2">

                <StatCard label="Collected" value={`LKR ${money(metrics.collected)}`} sub="Paid amounts" tone="green" />
                <StatCard label="Net Profit" value={`LKR ${money(metrics.profit)}`} sub="Itemized P&L Tracker" tone={metrics.profit >= 0 ? "green" : "red"} />
                <StatCard label="Inventory" value={money(metrics.stock)} sub={`${metrics.lowStock} items low stock`} tone={metrics.lowStock ? "amber" : "slate"} />
            </div>
            <div className="grid grid-cols-1 xl:grid-cols-3 gap-5">
                <div className="xl:col-span-2 bg-white rounded-[24px] border border-slate-200 shadow-sm overflow-hidden flex flex-col">

                                <div>
                                    <p className="font-black text-slate-900 text-sm">{p.name}</p>
                                    <p className="text-[11px] text-slate-500 mono mt-0.5 font-semibold">{p.phone || "No phone"}</p>
                                </div>
                                <div className="text-right">
                                    <p className="font-black text-red-600 text-base tracking-tight">LKR {money(p.globalBalance)}</p>
                                    <p className="text-[9px] uppercase font-black text-slate-400 mt-0.5">{p.risk}</p>

                    </div>
                </div>
                <div className="bg-gradient-to-br from-slate-900 to-slate-800 text-white rounded-[24px] p-6 shadow-[0_20px_40px_rgba(15,23,42,0.3)] flex flex-col relative overflow-hidden">

function UnitPickerModal({ product, onClose, onAdd }) {
    const [query, setQuery] = useState("");

    const filtered = units.filter(u => { return `${u.imei} ${u.supplier} ${u.status}`.toLowerCase().includes(query.toLowerCase()); });
    const toggle = (unit) => {

        setSelected(prev => prev.some(x => x.imei === unit.imei) ? prev.filter(x => x.imei !== unit.imei) : prev.concat(unit));

    return (
        <Modal title={`Select ID/Unit - ${product.Brand} ${product.Model}`} onClose={onClose} width="max-w-5xl">
            <div className="p-6 flex flex-col gap-5 h-full min-h-[50vh]">

                    </div>
                    <div className="rounded-[16px] border border-blue-200 bg-blue-50/50 p-3 shadow-sm flex flex-col justify-center">

                        <p className="font-black text-blue-800 text-lg tracking-tight">LKR {money(n(product.OfferPrice) > 0 ? product.OfferPrice : product.Price)}</p>
                    </div>
                    <div className="rounded-[16px] border border-slate-200 bg-white p-3 shadow-sm flex flex-col justify-center">
                        <p className="text-[9px] uppercase tracking-widest font-black text-slate-500 mb-0.5">Selected</p>
                        <p className="font-black text-slate-900 text-lg tracking-tight">{selected.length} unit(s)</p>
                    </div>
                </div>
                <div className="border border-slate-200 rounded-[20px] overflow-hidden flex-1 flex flex-col shadow-sm bg-white">
                    <div className="overflow-auto flex-1 p-1">
                        <table className="w-full text-left text-xs whitespace-nowrap">
                            <thead className="bg-white sticky top-0 z-10 text-[9px] uppercase tracking-widest text-slate-400 font-black shadow-sm">
                                <tr>
                                    <th className="px-5 py-3 w-12 text-center">Select</th><th className="px-5 py-3">IMEI / ID</th><th className="px-5 py-3">Supplier</th><th className="px-5 py-3 text-right">Cost</th><th className="px-5 py-3">Status</th>

                                            <td className="px-5 py-3 text-center"><input type="checkbox" checked={active} disabled={locked} onChange={() => toggle(unit)} className="w-4 h-4 text-blue-600 rounded border-slate-300 focus:ring-blue-500 cursor-pointer shadow-sm" /></td>
                                            <td className="px-5 py-3 mono font-black text-slate-800 text-sm">{unit.imei}</td>
                                            <td className="px-5 py-3 text-slate-600 font-bold">{unit.supplier || "-"}</td>

                        </table>
                    </div>
                </div>
                <div className="flex justify-end gap-3 shrink-0 pt-3">

}

function POSView({ data, onCheckout, actionLoading, showToast }) {
    const [search, setSearch] = useState(""); const [cart, setCart] = useState([]);
    const [globalDiscount, setGlobalDiscount] = useState("0");
    const [unitPickerProduct, setUnitPickerProduct] = useState(null); const [editItem, setEditItem] = useState(null);
    const [checkoutOpen, setCheckoutOpen] = useState(false); const [discountOpen, setDiscountOpen] = useState(false);
    const [discountDraft, setDiscountDraft] = useState("0"); const [discountMode, setDiscountMode] = useState("fixed");
    const [isConfirmingClear, setIsConfirmingClear] = useState(false);

    useEffect(() => {
        try { const saved = JSON.parse(safeStorage.get(POS_DRAFT_KEY) || "{}"); if (saved && saved.version === 8) { setCart(Array.isArray(saved.cart) ? saved.cart : []); setGlobalDiscount(saved.globalDiscount || "0"); } } catch (e) { }
    }, []);
    useEffect(() => { safeStorage.set(POS_DRAFT_KEY, JSON.stringify({ version: 8, cart, globalDiscount })); }, [cart, globalDiscount]);

    const availableItems = useMemo(() => {
        const terms = search.toLowerCase().trim().split(/\s+/).filter(Boolean);
        if (!terms.length) return [];
        return (data.inventory || []).filter(i => {
            const status = clean(i.Status).toLowerCase(); const hasUnits = i.Units && i.Units.length > 0;
            const saleUnits = hasUnits ? i.Units.filter(u => clean(u.status || "Available") === "Available") : [];
            const qty = hasUnits ? saleUnits.length : n(i.Quantity);
            if (status.includes("sold") || status.startsWith("partner") || qty <= 0) return false;
            const unitImeis = hasUnits ? saleUnits.map(u => `${u.imei} ${u.supplier}`).join(" ") : "";
            const hay = `${i.IMEI} ${i.Brand} ${i.Model} ${i.Color} ${i.RAM} ${i.ROM} ${i.Specs} ${unitImeis}`.toLowerCase();
            return terms.every(t => hay.includes(t));
        }).slice(0, 18);
    }, [data.inventory, search]);

    const findAvailableUnitFromSearch = () => {
        const q = clean(search).toLowerCase();
        const digits = q.replace(/\D/g, "");
        if (!q || digits.length < 5) return null;
        const hits = [];
        (data.inventory || []).forEach(item => {
            (item.Units || []).filter(u => clean(u.status || "Available") === "Available").forEach(unit => {
                const imeiDigits = clean(unit.imei).replace(/\D/g, "");
                if (imeiDigits.endsWith(digits.slice(-5))) hits.push({ item, unit });
            });
        });
        return hits.length === 1 ? hits[0] : null;
    };
    const handleSearchKeyDown = (e) => {
        if (e.key !== "Enter") return;
        const hit = findAvailableUnitFromSearch();
        if (hit) { e.preventDefault(); addToCart(hit.item, hit.unit); }
    };

    const addToCart = (item, unit = null) => {
        const sell = n(item.OfferPrice) > 0 ? item.OfferPrice : item.Price; const unitId = unit ? unit.imei : item.IMEI;
        if (cart.some(x => x.cartId === unitId)) return showToast("This unit is already in the order cart.", "warn");
        const cost = unit ? unit.cost : (item.PurchasedPrice || item.Cost || item.unitCost || 0);
        const newItem = {
            ...item, cartId: unitId, groupCode: item.IMEI,
            unitImei: unit ? unit.imei : "", unitStatus: unit ? clean(unit.status || "Available") : "Available", unitSupplier: unit ? clean(unit.supplier || "") : "",
            displayImei: unit ? unit.imei : item.IMEI, IMEI: unit ? unit.imei : item.IMEI,
            unitCost: cost, sellPrice: sell, Price: sell, originalPrice: item.Price,
            itemDiscount: "0", cartQty: unit ? 1 : 1, availableQty: unit ? 1 : Math.max(1, n(item.Quantity)),
            warrantyAdded: false, warrantyText: "", condition: "", note: ""
        };
        setCart(prev => prev.concat(newItem)); setSearch("");
    };

    const addCustomItem = () => {
        const id = uid("CUSTOM");
        setCart(prev => prev.concat({ cartId: id, groupCode: id, unitImei: "", unitStatus: "Manual", unitSupplier: "Manual Entry", displayImei: "", IMEI: "", Brand: "", Model: "Custom Item", Color: "", Specs: "", cartQty: 1, availableQty: 9999, unitCost: "0", sellPrice: "0", Price: "0", itemDiscount: "0", warrantyAdded: false, warrantyText: "", condition: "", note: "", custom: true }));
    };

    const updateCartItem = (updated) => setCart(prev => prev.map(x => x.cartId === updated.cartId ? { ...x, ...updated, warrantyAdded: clean(updated.warrantyText) ? true : updated.warrantyAdded === true, Price: updated.sellPrice ?? updated.Price } : x));
    const updateCartPatch = (id, patch) => setCart(prev => prev.map(x => x.cartId === id ? { ...x, ...patch } : x));
    const removeCartItem = (id) => setCart(prev => prev.filter(x => x.cartId !== id));
    
    const clearDraft = () => { setCart([]); setGlobalDiscount("0"); safeStorage.remove(POS_DRAFT_KEY); setIsConfirmingClear(false); showToast("Cart cleared", "success"); };

    const subTotal = cart.reduce((s, i) => s + n(i.sellPrice) * safeQty(i.cartQty), 0);
    const itemDiscount = cart.reduce((s, i) => s + n(i.itemDiscount) * safeQty(i.cartQty), 0);
    const discount = itemDiscount + n(globalDiscount);
    const total = Math.max(0, subTotal - discount);
    const cost = cart.reduce((s, i) => s + n(i.unitCost) * safeQty(i.cartQty), 0);
    const profit = total - cost;
    const totalQty = cart.reduce((s, i) => s + safeQty(i.cartQty), 0);

    const openDiscountModal = () => { setDiscountDraft(globalDiscount || "0"); setDiscountMode("fixed"); setDiscountOpen(true); };
    const applyGlobalDiscount = () => { const raw = n(discountDraft); const value = discountMode === "percent" ? Math.round((subTotal * raw) / 100) : raw; setGlobalDiscount(String(Math.max(0, value))); setDiscountOpen(false); };

    const confirmInvoice = async (checkout) => {
        const invoiceId = uid("B2B");
        const payloadItems = cart.map(i => {
            const warrantyText = itemWarrantyText(i);
            const itemPayload = {
                groupCode: i.groupCode || i.IMEI || i.displayImei,
                "Original IMEI": i.groupCode || i.IMEI || i.displayImei,
                "IMEI or Item Code": i.displayImei || i.unitImei || i.IMEI || i.groupCode,
                IMEI: i.displayImei || i.unitImei || i.IMEI || i.groupCode,
                displayImei: i.displayImei || i.unitImei || i.IMEI,
                unitImei: i.unitImei || "", Brand: i.Brand || "", Model: i.Model || "", Color: i.Color || "", Category: i.Category || "", Type: i.Type || "",
                cartQty: safeQty(i.cartQty), Price: n(i.sellPrice),
                finalPrice: Math.max(0, n(i.sellPrice) - n(i.itemDiscount)), itemDiscount: n(i.itemDiscount), unitCost: n(i.unitCost)
            };
            if (warrantyText) { itemPayload.warrantyText = warrantyText; itemPayload.warranty = { text: warrantyText }; }
            if (clean(i.note)) itemPayload.note = clean(i.note); else delete itemPayload.note;
            if (clean(i.condition)) itemPayload.condition = clean(i.condition); else delete itemPayload.condition;
            return itemPayload;
        });
        
        const canonical = {
            schema: "icon-mobile.erp.transaction.invoice.v4", recordType: "partner_invoice", sourceSystem: "ICON_MOBILE_B2B_SUPER_ADMIN_ERP", transactionType: "B2B_Issue",
            invoiceId, createdAtISO: new Date().toISOString(), currency: "LKR",
            partner: { type: "B2B_PARTNER", name: checkout.partnerName, phone: checkout.partnerPhone, whatsapp: checkout.partnerPhone },
            financials: { subTotal, discount, total, paymentNow: checkout.paymentAmount, balanceGenerated: total - checkout.paymentAmount, totalCost: cost, netProfit: profit },
            items: payloadItems.map(i => {
                const obj = { brand: i.Brand, model: i.Model, id: i.displayImei, cost: i.unitCost, price: i.finalPrice, qty: i.cartQty };
                if (clean(i.warrantyText)) obj.warranty = clean(i.warrantyText);
                return obj;
            }),
            payment: { method: checkout.paymentMethod, amount: checkout.paymentAmount }, sharing: { message: checkout.message }
        };

        const payload = {
            action: "checkout", transactionType: "Issue", invoiceId, items: payloadItems,
            schemaVersion: "ICON_MOBILE_ERP_V4", recordType: "partner_invoice", sourceSystem: "ICON_MOBILE_B2B_SUPER_ADMIN_ERP", currency: "LKR",
            client: { partnerType: "B2B_PARTNER", isPartner: true, name: checkout.partnerName, phone: checkout.partnerPhone, whatsapp: checkout.partnerPhone, paymentMethod: checkout.paymentMethod, paymentAmount: checkout.paymentAmount, invoiceNote: checkout.invoiceNote, note: checkout.invoiceNote, message: checkout.message, canonical },
            partner: canonical.partner, paymentMethod: checkout.paymentMethod, subTotal, discount, total, totalQty, canonical
        };

        const ok = await onCheckout(payload);
        if (ok) { setCart([]); setGlobalDiscount("0"); setCheckoutOpen(false); safeStorage.remove(POS_DRAFT_KEY); }
    };

    return (
        <div className="flex h-full w-full relative fade-in">
            <div className="flex-1 flex flex-col border-r border-slate-200 bg-[#f8fafc] min-w-[50%]">
                <div className="p-5 pb-3 no-print shrink-0">
                    <div className="flex gap-4">
                        <div className="relative shadow-[0_2px_10px_rgba(0,0,0,0.04)] rounded-[16px] bg-white flex-1 border border-slate-200 focus-within:border-blue-500 focus-within:ring-4 focus-within:ring-blue-500/15 transition-all">
                            <div className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"><Icons.Search /></div>

function DeviceTable({ invoices, returns, showToast }) {
    const [query, setQuery] = useState(""); const [statusFilter, setStatusFilter] = useState("all");
    const deviceData = useMemo(() => {
        const returnedByCode = new Map();
        (returns || []).forEach(ret => { (ret.items || []).forEach(item => { const code = clean(item.unitImei || item.displayImei || item["IMEI or Item Code"] || item.IMEI || item.code); if (code) returnedByCode.set(code, { returnId: ret.returnId || ret.id || "Return", date: ret.date || "", value: n(ret.value) }); }); });
        const rows = [];
        (invoices || []).forEach(inv => {
            let paidBudget = Math.max(0, n(inv.paid));
            (inv.items || []).forEach((item, idx) => {
                const qty = safeQty(item.cartQty); const unitPrice = n(item.finalPrice || item.Price || item.sellPrice || item.wholesalePrice || item.OfferPrice); const linePrice = Math.max(0, unitPrice * qty);
                const id = clean(item.unitImei || item.displayImei || item["IMEI or Item Code"] || item.IMEI || item.code || `${inv.invoiceId || 'INV'}-${idx + 1}`);
                const returnedInfo = returnedByCode.get(id); const isReturned = !!returnedInfo;
                const paidApplied = isReturned ? 0 : Math.min(linePrice, paidBudget);
                if (!isReturned) paidBudget = Math.max(0, paidBudget - paidApplied);
                const balance = isReturned ? 0 : Math.max(0, linePrice - paidApplied);
                let paymentStatus = "Unpaid"; if (isReturned) paymentStatus = "Returned"; else if (balance <= 0 && linePrice > 0) paymentStatus = "Paid"; else if (paidApplied > 0) paymentStatus = "Partial";
                rows.push({ key: `${inv.invoiceId || 'INV'}-${id}-${idx}`, product: `${clean(item.Brand)} ${clean(item.Model)}`.trim() || clean(item.product || item.name || item.Model) || "Item", category: clean(item.Category || item.Type || item["Select Phone or item"] || ""), color: clean(item.Color || ""), specs: formatSpecs(item.Specs) || [item.RAM, item.ROM].filter(Boolean).join(" • "), id, invoiceId: inv.invoiceId || inv.id || "", date: inv.date || "", qty, unitPrice, linePrice, paidApplied, balance, invoiceStatus: inv.status || "", paymentStatus, returnId: returnedInfo && returnedInfo.returnId, returnDate: returnedInfo && returnedInfo.date });
            });
        });
        return rows.sort((a, b) => parseDate(b.date) - parseDate(a.date) || clean(a.invoiceId).localeCompare(clean(b.invoiceId)));
    }, [invoices, returns]);

    const filtered = useMemo(() => {
        const q = query.toLowerCase().trim();
        return deviceData.filter(d => { const statusOk = statusFilter === "all" || d.paymentStatus.toLowerCase() === statusFilter; if (!statusOk) return false; if (!q) return true; const hay = `${d.product} ${d.id} ${d.invoiceId} ${d.date} ${d.paymentStatus} ${d.color} ${d.specs} ${d.category}`.toLowerCase(); return q.split(/\s+/).every(term => hay.includes(term)); });
    }, [deviceData, query, statusFilter]);

    const summary = useMemo(() => ({ total: deviceData.length, paid: deviceData.filter(d => d.paymentStatus === "Paid").length, partial: deviceData.filter(d => d.paymentStatus === "Partial").length, unpaid: deviceData.filter(d => d.paymentStatus === "Unpaid").length, returned: deviceData.filter(d => d.paymentStatus === "Returned").length, value: deviceData.reduce((s, d) => s + n(d.linePrice), 0), balance: deviceData.reduce((s, d) => s + n(d.balance), 0) }), [deviceData]);
    const statusClass = (status) => status === "Paid" ? "bg-emerald-50 text-emerald-700 border-emerald-200" : status === "Returned" ? "bg-orange-50 text-orange-700 border-orange-200" : status === "Partial" ? "bg-blue-50 text-blue-700 border-blue-200" : "bg-red-50 text-red-700 border-red-200";

    const DeviceLedgerCard = ({ d }) => (
        <div className={`bg-white border border-slate-200 rounded-[20px] p-4 shadow-sm overflow-hidden ${d.paymentStatus === "Returned" ? "ring-1 ring-orange-100 bg-orange-50/30" : ""}`}>
            <div className="flex items-start justify-between gap-2 min-w-0">
                <div className="min-w-0 flex-1">
                    <p className="font-black text-slate-900 leading-tight break-words text-sm">{d.product}</p>
                    <div className="mt-1.5 flex flex-wrap gap-1.5">
                        {[d.color, d.specs, d.category].filter(Boolean).slice(0, 3).map((meta, i) => <span key={i} className="text-[8px] font-black uppercase tracking-widest text-slate-500 bg-slate-50 border border-slate-100 rounded-full px-2 py-0.5 break-words">{meta}</span>)}
                    </div>
                </div>
                <span className={`shrink-0 inline-flex justify-center px-2.5 py-1 rounded-full text-[8px] uppercase font-black tracking-widest border ${statusClass(d.paymentStatus)}`}>{d.paymentStatus}</span>
            </div>
            <div className="mt-3 rounded-[12px] bg-slate-50 border border-slate-100 p-2.5 min-w-0">
                <p className="text-[8px] uppercase tracking-widest text-slate-400 font-black mb-0.5">IMEI / Device ID</p>
                <p onClick={() => copyToClipboard(d.id, () => showToast("Copied ID!", "success"))} className="clickable-mono text-[11px] font-black text-blue-700 break-all leading-relaxed flex items-center gap-1.5" title="Click to copy">{d.id || "-"} <Icons.Copy /></p>
            </div>
            <div className="grid grid-cols-2 xl:grid-cols-4 gap-2 mt-2 text-[10px] font-bold">
                <div className="rounded-xl p-2 border border-slate-100 bg-white min-w-0"><p className="text-[8px] uppercase tracking-widest text-slate-400 font-black">Invoice</p><p className="mono text-blue-700 mt-0.5 break-all">{d.invoiceId || "-"}</p></div>
                <div className="rounded-xl p-2 border border-slate-100 bg-white min-w-0"><p className="text-[8px] uppercase tracking-widest text-slate-400 font-black">Date</p><p className="text-slate-700 mt-0.5 break-words">{d.date ? d.date.split(',')[0] : "-"}</p></div>
                <div className="rounded-xl p-2 border border-slate-100 bg-white min-w-0"><p className="text-[8px] uppercase tracking-widest text-slate-400 font-black">Line Value</p><p className="text-slate-900 mt-0.5 whitespace-nowrap">LKR {money(d.linePrice)}</p></div>
                <div className="rounded-xl p-2 border border-slate-100 bg-white min-w-0"><p className="text-[8px] uppercase tracking-widest text-slate-400 font-black">Balance</p><p className={`${d.balance > 0 ? "text-red-600" : "text-emerald-600"} mt-0.5 whitespace-nowrap`}>LKR {money(d.balance)}</p></div>
            </div>
        </div>
    );

    const SummaryMini = ({ label, value, tone = "slate" }) => {
        const tones = { slate: "bg-white border-slate-200 text-slate-900", green: "bg-emerald-50 border-emerald-100 text-emerald-700", blue: "bg-blue-50 border-blue-100 text-blue-700", red: "bg-red-50 border-red-100 text-red-700", orange: "bg-orange-50 border-orange-100 text-orange-700", dark: "bg-slate-900 border-slate-900 text-white" };
        return <div className={`${tones[tone]} border rounded-[14px] p-3 shadow-sm min-w-0`}><p className="text-[8px] font-black uppercase tracking-widest opacity-65 truncate">{label}</p><p className="text-sm xl:text-base font-black mt-1 truncate">{value}</p></div>;
    };

    return (
        <div className="space-y-4 max-w-full overflow-hidden">
            <div className="grid grid-cols-2 sm:grid-cols-3 xl:grid-cols-6 gap-2">
                <SummaryMini label="Devices" value={summary.total} />
                <SummaryMini label="Paid" value={summary.paid} tone="green" />
                <SummaryMini label="Partial" value={summary.partial} tone="blue" />
                <SummaryMini label="Unpaid" value={summary.unpaid} tone="red" />
                <SummaryMini label="Returned" value={summary.returned} tone="orange" />
                <SummaryMini label="Need Collect" value={`LKR ${money(summary.balance)}`} tone="dark" />
            </div>
            <div className="bg-white border border-slate-200 rounded-[20px] p-3 shadow-sm flex flex-col md:flex-row gap-3 md:items-center md:justify-between">
                <div className="relative flex-1 min-w-0">
                    <span className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"><Icons.Search /></span>
                    <input value={query} onChange={e => setQuery(e.target.value)} className="input pl-10 py-2.5 rounded-[14px] bg-slate-50 shadow-inner text-xs" placeholder="Search device, IMEI, status..." />
                </div>
                <div className="flex items-center gap-2">
                    <button type="button" onClick={() => {setQuery(''); setStatusFilter('all');}} className="btn px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-600 text-[9px] uppercase tracking-widest font-black shrink-0">Clear</button>
                    <select value={statusFilter} onChange={e => setStatusFilter(e.target.value)} className="input py-2.5 rounded-[14px] bg-slate-50 md:w-[150px] font-black text-[10px] uppercase tracking-widest">
                        <option value="all">All Status</option><option value="paid">Paid</option><option value="partial">Partial</option><option value="unpaid">Unpaid</option><option value="returned">Returned</option>
                    </select>
                </div>
            </div>
            <div className="xl:hidden grid grid-cols-1 lg:grid-cols-2 gap-3">
                {filtered.map(d => <DeviceLedgerCard key={d.key} d={d} />)}
                {filtered.length === 0 && <div className="lg:col-span-2 p-8 rounded-[20px] bg-white border border-slate-200 text-center text-slate-400 font-black text-xs">No devices match this filter.</div>}
            </div>
            <div className="hidden xl:block 2xl:hidden grid grid-cols-1 gap-3">
                {filtered.map(d => <DeviceLedgerCard key={d.key} d={d} />)}
            </div>
            <div className="hidden 2xl:block border border-slate-200 rounded-[24px] bg-white shadow-sm overflow-hidden max-w-full">
                <div className="overflow-x-auto">
                    <table className="w-full min-w-[1000px] text-xs text-left table-fixed">
                        <thead className="bg-slate-50 text-[9px] uppercase tracking-widest text-slate-500 font-black border-b border-slate-200">
                            <tr><th className="px-5 py-3 w-[25%]">Device / Item</th><th className="px-5 py-3 w-[22%]">IMEI / ID</th><th className="px-5 py-3 w-[15%]">Invoice</th><th className="px-4 py-3 w-[7%] text-center">Qty</th><th className="px-5 py-3 w-[11%] text-right">Value</th><th className="px-5 py-3 w-[11%] text-right">Balance</th><th className="px-5 py-3 w-[9%] text-center">Status</th></tr>
                        </thead>
                        <tbody className="divide-y divide-slate-100">
                            {filtered.map(d => (
                                <tr key={d.key} className={`transition-colors ${d.paymentStatus === "Returned" ? "bg-orange-50/40" : "hover:bg-slate-50/50"}`}>
                                    <td className="px-5 py-3 align-top min-w-0">
                                        <p className="font-black text-slate-900 leading-tight break-words">{d.product}</p>
                                        <p className="text-[9px] font-bold text-slate-400 mt-1 break-words">{[d.color, d.specs].filter(Boolean).join(" • ") || d.category || "-"}</p>
                                    </td>
                                    <td className="px-5 py-3 align-top"><span onClick={() => copyToClipboard(d.id, () => showToast("Copied ID!", "success"))} className="clickable-mono text-[10px] text-slate-700 font-black break-all flex items-center gap-1.5 bg-slate-50 border border-slate-100 rounded-lg px-2 py-1.5" title="Click to copy">{d.id || "-"} <Icons.Copy /></span></td>
                                    <td className="px-5 py-3 align-top"><span className="mono text-[10px] text-blue-700 font-black break-all block leading-relaxed">{d.invoiceId || "-"}</span></td>
                                    <td className="px-4 py-3 align-top text-center font-black text-slate-700">{d.qty}</td>
                                    <td className="px-5 py-3 align-top text-right font-black text-slate-900 whitespace-nowrap">LKR {money(d.linePrice)}</td>
                                    <td className={`px-5 py-3 align-top text-right font-black whitespace-nowrap ${d.balance > 0 ? "text-red-600" : "text-emerald-600"}`}>LKR {money(d.balance)}</td>
                                    <td className="px-5 py-3 align-top text-center"><span className={`inline-flex justify-center min-w-[70px] px-2 py-1.5 rounded-full text-[8px] uppercase font-black tracking-widest border shadow-sm ${statusClass(d.paymentStatus)}`}>{d.paymentStatus}</span></td>
                                </tr>
                            ))}
                            {filtered.length === 0 && <tr><td colSpan="7" className="p-12 text-center text-slate-400 font-black text-sm bg-slate-50/30">No devices match.</td></tr>}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    );
}

function PartnerDetailModal({ partner, onClose, onPayment, onReturn, actionLoading, showToast }) {
    const [tab, setTab] = useState("invoices"); const [paymentTarget, setPaymentTarget] = useState(null); const [returnTarget, setReturnTarget] = useState(null);
    const [payFilter, setPayFilter] = useState("all"); const [payDateFrom, setPayDateFrom] = useState(""); const [payDateTo, setPayDateTo] = useState("");
    
    if (!partner) return null;

    const upfrontPayments = useMemo(() => {
        return (partner.invoicesList || []).filter(inv => n(inv.upfront) > 0).map(inv => ({
            date: inv.date, id: inv.invoiceId, paymentId: `${inv.invoiceId}-INIT`, linkedInvoiceId: inv.invoiceId,
            method: inv.paymentMethod || 'Initial Checkout', note: 'Upfront payment upon invoice creation', amount: inv.upfront
        }));
    }, [partner.invoicesList]);

    const allPayments = [...(partner.payments || []), ...upfrontPayments].sort((a, b) => parseDate(b.date) - parseDate(a.date));
    const allReturns = partner.returns || [];

    const filteredPayments = useMemo(() => {
        return allPayments.filter(p => isDateInRange(p.date, payFilter, payDateFrom, payDateTo));
    }, [allPayments, payFilter, payDateFrom, payDateTo]);

    const sendPaymentReport = () => {
        if (!filteredPayments.length) return showToast("No payments to report in this date range.", "warn");
        let msg = `🏢 *ICON MOBILE B2B*\n*Payment History Report*\nPartner: *${partner.name}*\nPeriod: *${payFilter.toUpperCase()}*\n━━━━━━━━━━━━━━━━━━━━\n`;
        let total = 0;
        filteredPayments.forEach(p => {
            msg += `📅 ${p.date.split(',')[0]} | ${p.method || 'Transfer'} | LKR ${money(p.amount)}\n`;
            total += n(p.amount);
        });
        msg += `━━━━━━━━━━━━━━━━━━━━\n💰 *Total Paid in Period:* LKR ${money(total)}\n\nThank you for your business!`;
        openWhatsApp(partner.phone || partner.whatsapp, msg);
    };

    return (
        <Modal title={`Ledger Profile - ${partner.name}`} onClose={onClose} width="max-w-[96vw] xl:max-w-[1280px]">
            <div className="p-5 xl:p-6 flex flex-col h-full min-h-[60vh] space-y-5">
                <div className="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-5 gap-3 shrink-0">
                    <StatCard label="Issued" value={`LKR ${money(partner.totalDebt)}`} tone="blue" /> 
                    <StatCard label="Paid" value={`LKR ${money(partner.totalPaid)}`} tone="green" /> 
                    <StatCard label="Returned" value={`LKR ${money(partner.totalReturned)}`} tone="amber" />
                    <div className="md:col-span-2"><StatCard label="Balance" value={`LKR ${money(partner.globalBalance)}`} sub={partner.advanceCredit > 0 ? `Credit: LKR ${money(partner.advanceCredit)}` : partner.risk} tone={partner.globalBalance > 0 ? "red" : "green"} /></div>
                </div>
                
                <div className="flex flex-col xl:flex-row gap-3 items-stretch xl:items-center justify-between border-b border-slate-200 pb-4 shrink-0">
                    <div className="flex gap-2 p-1.5 bg-slate-100 rounded-[16px] shadow-inner overflow-x-auto">
                        {["invoices", "payments", "returns", "devices"].map(x => (
                            <button key={x} onClick={() => setTab(x)} className={`shrink-0 py-2 px-4 rounded-[12px] text-[10px] font-black transition-all duration-200 uppercase tracking-widest ${tab === x ? "bg-white text-blue-700 shadow-sm border border-slate-200" : "text-slate-500 hover:text-slate-900"}`}>{x}</button>
                        ))}
                    </div>
                    <div className="flex flex-wrap gap-2 justify-start xl:justify-end">
                        <button type="button" onClick={() => setPaymentTarget({ invoice: null })} className="btn px-5 py-2.5 bg-emerald-600 hover:bg-emerald-700 text-white text-[10px] shadow-md uppercase tracking-widest font-black">+ Global Payment</button>
                        <button type="button" onClick={() => openStatementWindow(partner.name)} className="btn px-4 py-2.5 bg-slate-900 hover:bg-black text-white text-[10px] shadow-md uppercase tracking-widest font-black"><Icons.Eye /> Open B2B Link</button>
                        <button type="button" onClick={() => openWhatsApp(partner.phone || partner.whatsapp, `Hello ${partner.name},

Your ICON MOBILE B2B statement has been updated.
Total Issued: LKR ${money(partner.totalDebt)}
Paid: LKR ${money(partner.totalPaid)}
Returned: LKR ${money(partner.totalReturned)}
Remaining Balance: LKR ${money(partner.globalBalance)}

Statement: ${getPartnerStatementLink(partner.name)}

Thank you,
ICON MOBILE`)} className="btn px-4 py-2.5 bg-[#25D366] hover:bg-[#128C7E] text-white text-[10px] shadow-md uppercase tracking-widest font-black"><Icons.WhatsApp /> Send Statement</button>
                    </div>
                </div>

                <div className="flex-1 overflow-y-auto">
                    {tab === "invoices" && (
                        <div className="grid grid-cols-1 gap-5">
                            {partner.invoicesList.map(inv => (
                                <div key={inv.invoiceId} className="border border-slate-200 rounded-[24px] overflow-hidden bg-white shadow-sm flex flex-col xl:flex-row">
                                    <div className="p-6 xl:w-[65%] flex flex-col">
                                        <div className="flex justify-between items-center mb-5 pb-4 border-b border-slate-100">
                                            <div><p className="mono font-black text-blue-700 text-lg tracking-tight">{inv.invoiceId}</p><p className="text-[10px] font-semibold text-slate-400 mt-1 uppercase tracking-widest">{inv.date}</p></div>
                                            <span className={`px-4 py-1.5 rounded-full text-[9px] font-black uppercase tracking-widest border shadow-sm ${inv.status === "Paid" ? "bg-green-50 text-green-700 border-green-200" : inv.status === "Partial" ? "bg-amber-50 text-amber-700 border-amber-200" : "bg-red-50 text-red-700 border-red-200"}`}>{inv.status}</span>
                                        </div>
                                        <div className="overflow-x-auto">
                                            <table className="w-full text-xs">
                                                <thead className="text-[9px] uppercase tracking-widest text-slate-400 font-black border-b border-slate-100">
                                                    <tr><th className="text-left py-3">Detail</th><th className="text-center py-3">Qty</th><th className="text-right py-3">Price</th></tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-50">
                                                    {(inv.items || []).map((item, i) => (
                                                        <tr key={i}>
                                                            <td className="py-3"><p className="font-black text-slate-900 text-sm">{item.Brand} {item.Model}</p><p onClick={() => copyToClipboard(item.unitImei || item.displayImei || item["IMEI or Item Code"], () => showToast("Copied!", "success"))} className="clickable-mono text-[10px] font-bold text-slate-500 mt-1 bg-white border border-slate-200 px-2 py-0.5 rounded shadow-sm inline-flex items-center gap-1">{item.unitImei || item.displayImei || item["IMEI or Item Code"]} <Icons.Copy /></p></td>
                                                            <td className="py-3 text-center font-black text-slate-700 text-base">{item.cartQty || 1}</td>
                                                            <td className="py-3 text-right font-black text-slate-900 text-base tracking-tight">LKR {money(n(item.finalPrice || item.Price || item.sellPrice) * safeQty(item.cartQty))}</td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                    <div className="bg-slate-50/80 p-6 xl:w-[35%] flex flex-col border-t xl:border-t-0 xl:border-l border-slate-200">
                                        <h4 className="text-[9px] font-black uppercase tracking-widest text-slate-400 mb-4">Summary</h4>
                                        <div className="space-y-3 text-xs font-bold text-slate-600">
                                            <div className="flex justify-between"><span>Billed</span><span className="text-slate-900 font-black">LKR {money(inv.total)}</span></div>
                                            <div className="flex justify-between text-emerald-600"><span>Paid</span><span className="font-black">- LKR {money(inv.paid)}</span></div>
                                            <div className="flex justify-between text-orange-600"><span>Return</span><span className="font-black">- LKR {money(inv.returned)}</span></div>
                                            <div className="flex justify-between border-t border-slate-200 pt-3 mt-2 text-lg">
                                                <span className="uppercase tracking-widest text-[10px] font-black self-end mb-1 text-slate-500">Balance</span>
                                                <span className={`font-black tracking-tighter ${inv.balance > 0 ? "text-red-600" : "text-emerald-600"}`}>LKR {money(inv.balance)}</span>
                                            </div>
                                        </div>
                                        <div className="mt-auto pt-6 grid grid-cols-3 gap-2">
                                            <button onClick={() => setPaymentTarget({ invoice: inv })} className="btn py-3 bg-emerald-600 hover:bg-emerald-700 text-white text-[10px] uppercase tracking-widest shadow-sm font-black">Pay</button>
                                            <button onClick={() => setReturnTarget({ invoice: inv })} className="btn py-3 bg-white hover:bg-orange-50 text-orange-600 text-[10px] uppercase tracking-widest border border-orange-200 shadow-sm font-black">Return</button>
                                            <button onClick={() => openStatementWindow(partner.name, inv.invoiceId)} className="btn py-3 bg-slate-900 hover:bg-black text-white text-[10px] uppercase tracking-widest shadow-sm font-black">Open</button>
                                        </div>
                                    </div>
                                </div>
                            ))}
                            {partner.invoicesList.length === 0 && <div className="p-16 text-center text-slate-400 font-black text-sm bg-white rounded-[24px] border border-slate-200 border-dashed">No invoices generated.</div>}
                        </div>
                    )}
                    {tab === "payments" && (
                        <div className="flex flex-col gap-4">
                            <div className="bg-slate-50 border border-slate-200 p-3 rounded-[16px] flex flex-wrap gap-3 items-center justify-between">
                                <div className="flex flex-wrap gap-3 items-center">
                                    <span className="text-[10px] font-black uppercase text-slate-500 tracking-widest mr-1">Filter</span>
                                    <select value={payFilter} onChange={e => setPayFilter(e.target.value)} className="input py-2 text-[10px] font-black uppercase tracking-widest w-auto">
                                        <option value="all">All Time</option><option value="today">Today</option><option value="week">This Week</option><option value="month">This Month</option><option value="last_month">Last Month</option><option value="year">This Year</option><option value="custom">Custom Date Range</option>
                                    </select>
                                    {payFilter === 'custom' && (
                                        <div className="flex gap-2 items-center bg-white px-2 py-1 rounded-[12px] border border-slate-200">
                                            <input type="date" value={payDateFrom} onChange={e => setPayDateFrom(e.target.value)} className="bg-transparent text-[10px] font-bold text-slate-800 outline-none cursor-pointer" />
                                            <span className="text-slate-300 px-1 font-bold">-</span>
                                            <input type="date" value={payDateTo} onChange={e => setPayDateTo(e.target.value)} className="bg-transparent text-[10px] font-bold text-slate-800 outline-none cursor-pointer" />
                                        </div>
                                    )}
                                </div>
                                <button type="button" onClick={sendPaymentReport} className="btn px-4 py-2 bg-[#25D366] hover:bg-[#128C7E] text-white text-[9px] shadow-sm uppercase tracking-widest font-black shrink-0"><Icons.WhatsApp /> Report</button>
                            </div>
                            <HistoryTable rows={filteredPayments} type="payment" />
                        </div>
                    )}
                    {tab === "returns" && <HistoryTable rows={allReturns} type="return" />}
                    {tab === "devices" && <DeviceTable invoices={partner.invoicesList} returns={allReturns} showToast={showToast} />}
                </div>
            </div>
            {paymentTarget && <PaymentModal partner={partner} invoice={paymentTarget.invoice} onClose={() => setPaymentTarget(null)} onPayment={onPayment} actionLoading={actionLoading} showToast={showToast} />}
            {returnTarget && <ReturnModal partner={partner} invoice={returnTarget.invoice} onClose={() => setReturnTarget(null)} onReturn={onReturn} actionLoading={actionLoading} />}
        </Modal>
    );
}

function ProfitLossView({ data, showToast }) {
    const [query, setQuery] = useState(""); 
    const [quickFilter, setQuickFilter] = useState("all");
    const [dateFrom, setDateFrom] = useState(""); 
    const [dateTo, setDateTo] = useState("");

    const rows = useMemo(() => {
        let r = (data.profitRows || []).filter(row => `${row.invoiceId} ${row.partnerName} ${row.product} ${row.code}`.toLowerCase().includes(query.toLowerCase()));
        
        const now = new Date();
        const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        
        let df = null;
        let dt = null;

        if (quickFilter !== "custom" && quickFilter !== "all") {
            if (quickFilter === 'today') { df = today.getTime(); dt = today.getTime() + 86399999; }
            if (quickFilter === 'week') { const lw = new Date(today); lw.setDate(today.getDate() - 7); df = lw.getTime(); dt = today.getTime() + 86399999; }
            if (quickFilter === 'month') { const fd = new Date(today.getFullYear(), today.getMonth(), 1); df = fd.getTime(); dt = today.getTime() + 86399999; }
        } else if (quickFilter === "custom") {
            if (dateFrom) df = new Date(dateFrom).getTime();
            if (dateTo) dt = new Date(dateTo).getTime() + 86399999;
        }

        if (df !== null) r = r.filter(row => parseDate(row.date).getTime() >= df);
        if (dt !== null) r = r.filter(row => parseDate(row.date).getTime() <= dt);
        
        return r;
    }, [data.profitRows, query, quickFilter, dateFrom, dateTo]);
    
    const totals = rows.reduce((acc, r) => { acc.revenue += n(r.revenue); acc.cost += n(r.cost); acc.profit += n(r.profit); acc.collectDue += n(r.collectDue); return acc; }, { revenue: 0, cost: 0, profit: 0, collectDue: 0 });

    return (
        <div className="h-full flex flex-col gap-5 fade-in">
            <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                <StatCard label="Total Revenue" value={`LKR ${money(totals.revenue)}`} tone="blue" />
                <StatCard label="Need To Collect" value={`LKR ${money(totals.collectDue)}`} sub="Unpaid items" tone={totals.collectDue > 0 ? "red" : "green"} />
                <StatCard label="Actual Cost" value={`LKR ${money(totals.cost)}`} tone="slate" />
                <StatCard label="Net Profit" value={`LKR ${money(totals.profit)}`} sub={`${rows.length} strict movements`} tone={totals.profit >= 0 ? "green" : "red"} />
            </div>
            <div className="bg-white rounded-[24px] border border-slate-200 shadow-sm p-4 flex flex-col xl:flex-row gap-3 shrink-0">
                <div className="relative flex-1 min-w-0">
                    <span className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"><Icons.Search /></span>
                    <input value={query} onChange={e => setQuery(e.target.value)} className="w-full bg-slate-50 border border-slate-200 text-slate-900 font-bold pl-12 pr-4 py-3.5 rounded-[16px] text-sm focus:border-blue-500 shadow-inner" placeholder="Search sales & returns..." />
                </div>
                <div className="flex gap-2 shrink-0 items-center bg-slate-50 border border-slate-200 p-1.5 rounded-[16px] shadow-inner">
                    <select value={quickFilter} onChange={e => setQuickFilter(e.target.value)} className="input py-2 rounded-[12px] bg-white font-black text-[9px] uppercase tracking-widest w-auto border-none shadow-sm">
                        <option value="all">All Time</option><option value="today">Today</option><option value="week">This Week</option><option value="month">This Month</option><option value="custom">Custom Range</option>
                    </select>
                    {quickFilter === "custom" && (
                        <div className="flex items-center">
                            <div className="w-[1px] h-6 bg-slate-200 mx-2" />
                            <div className="flex flex-col px-1"><span className="text-[8px] font-black uppercase text-slate-400 tracking-widest mb-0.5">From</span><input type="date" className="bg-transparent text-[10px] font-bold text-slate-800 outline-none cursor-pointer" value={dateFrom} onChange={e => setDateFrom(e.target.value)} /></div>
                            <div className="flex flex-col px-1"><span className="text-[8px] font-black uppercase text-slate-400 tracking-widest mb-0.5">To</span><input type="date" className="bg-transparent text-[10px] font-bold text-slate-800 outline-none cursor-pointer" value={dateTo} onChange={e => setDateTo(e.target.value)} /></div>
                        </div>
                    )}
                </div>
                <button type="button" onClick={() => downloadCsv("itemized_profit_loss.csv", [["Type", "Date", "Invoice", "Partner", "Code", "Product", "Qty", "Sell Unit", "Cost Unit", "Revenue", "Need To Collect", "Cost", "Profit", "Warranty", "Note"], ...rows.map(r => [r.type, r.date, r.invoiceId, r.partnerName, r.code, r.product, r.qty, r.sellUnit, r.costUnit, r.revenue, r.collectDue, r.cost, r.profit, r.warranty, r.note])])} className="btn px-6 py-3.5 bg-slate-900 text-white text-[10px] uppercase tracking-widest font-black shadow-md rounded-[16px]"><Icons.Download /> CSV</button>
            </div>
            <div className="bg-white rounded-[24px] border border-slate-200 shadow-sm overflow-hidden flex-1 flex flex-col">
                <div className="overflow-auto flex-1 p-1">
                    <table className="w-full text-xs text-left whitespace-nowrap">
                        <thead className="bg-white sticky top-0 z-10 text-[9px] uppercase tracking-widest text-slate-400 font-black border-b border-slate-200 shadow-sm">
                            <tr><th className="px-5 py-4">Action</th><th className="px-5 py-4">Date & Ref</th><th className="px-5 py-4">Partner</th><th className="px-5 py-4">Detail</th><th className="px-5 py-4 text-center">Qty</th><th className="px-5 py-4 text-right">Revenue</th><th className="px-5 py-4 text-right">Need Collect</th><th className="px-5 py-4 text-right">Cost</th><th className="px-5 py-4 text-right">Profit</th></tr>
                        </thead>
                        <tbody className="divide-y divide-slate-100">

                                        <p onClick={() => copyToClipboard(r.code, () => showToast("Copied Code!", "success"))} className="clickable-mono text-[9px] text-slate-500 mt-1 bg-white border border-slate-200 px-2 py-0.5 rounded shadow-sm inline-flex items-center gap-1">{r.code} <Icons.Copy /></p>
                                    </td>
                                    <td className="px-5 py-3 text-center font-black text-slate-800 text-base">{r.qty}</td>
                                    <td className="px-5 py-3 text-right font-black text-blue-700 text-base tracking-tight">LKR {money(r.revenue)}</td>
                                    <td className={`px-5 py-3 text-right font-black text-sm tracking-tight ${n(r.collectDue) > 0 ? "text-red-600" : "text-emerald-600"}`}>LKR {money(r.collectDue)}</td>
                                    <td className="px-5 py-3 text-right font-bold text-slate-500 text-sm">LKR {money(r.cost)}</td>
                                    <td className={`px-5 py-3 text-right font-black text-base tracking-tighter ${r.profit >= 0 ? "text-emerald-600" : "text-red-600"}`}>LKR {money(r.profit)}</td>
                                </tr>
                            ))}

                    </table>

            </div>
        </div>
