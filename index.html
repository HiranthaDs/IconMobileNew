            const recordType = cleanText(record.recordType || c.recordType || "").toLowerCase();
            const sourceSystem = cleanText(record.sourceSystem || c.sourceSystem || "").toLowerCase();
            const partnerType = cleanText(record.partnerType || c.partnerType || record.customerType || c.customerType || record.clientType || c.clientType || "").toLowerCase();
            const canonical = record.canonical || c.canonical || {};
            const canonicalType = cleanText(canonical.partnerType || canonical.customerType || canonical.recordType || "").toLowerCase();

            if (record.isPartner === true || c.isPartner === true || canonical.isPartner === true) return true;
            if (type === "Payment" && (record.linkedInvoiceId || c.linkedInvoiceId || record.invoiceRef || c.invoiceRef || record.partnerName || c.partnerName || record.shopName || c.shopName || partnerType.includes("partner") || recordType.includes("partner") || recordType.includes("b2b") || sourceSystem.includes("wholesale"))) return true;
            if (["Issue", "Return", "B2B_Issue", "B2B_Return", "B2B_Payment", "WholesaleIssue", "WholesaleReturn", "WholesalePayment", "PartnerPayment", "Partner_Profile", "WholesalePartner"].includes(type)) return true;
            if (recordType.includes("partner") || recordType.includes("b2b") || recordType.includes("wholesale")) return true;
            if (sourceSystem.includes("b2b") || sourceSystem.includes("wholesale")) return true;
            if (partnerType.includes("partner") || partnerType.includes("b2b") || partnerType.includes("wholesale")) return true;
            if (canonicalType.includes("partner") || canonicalType.includes("b2b") || canonicalType.includes("wholesale")) return true;
            return false;
        };
        const isRetailCustomerRecord = (record = {}) => {
            if (!record) return false;
            if (isPartnerTransaction(record)) return false;
            const type = cleanText(record.transactionType || record.client?.transactionType || "Sale");
            return type === "" || type === "Sale" || type === "POS_Sale" || type === "RetailSale";
        };
        const normalizePhoneNumber = (phone) => {
            let p = cleanText(phone).replace(/[^0-9+]/g, "");
            if (p.startsWith("0") && p.length === 10) p = "94" + p.slice(1);
            if (p.startsWith("+")) p = p.slice(1);
            return p;
        };
        const moneyFmt = (value) => safeNumber(value).toLocaleString("en-US", { maximumFractionDigits: 0 });

        const normalizeInventoryItem = (rowObj = {}) => {
            const dataJson = parseMaybeJSON(rowObj["DATA (JSON)"] || rowObj["DATA"] || rowObj["data"] || rowObj["data (json)"], {});
            const merged = { ...rowObj, ...(dataJson && typeof dataJson === "object" ? dataJson : {}) };
            const code = cleanText(pickValue(merged, ["IMEI or Item Code", "IMEI", "imei", "Code", "code", "SKU", "sku", "ID", "id"]));
            let rawUnits = Array.isArray(merged.Units) ? merged.Units : parseMaybeJSON(merged.Units, []);
            if (!Array.isArray(rawUnits)) rawUnits = [];
            let rawSuppliers = Array.isArray(merged.Suppliers) ? merged.Suppliers : parseMaybeJSON(merged.Suppliers, []);
            if (!Array.isArray(rawSuppliers)) rawSuppliers = [];

            let units = rawUnits.map((u, idx) => ({
                imei: cleanText(u.imei || u.IMEI || u.id || u.code || `${code}-${idx + 1}`),
                supplier: cleanText(u.supplier || u.Supplier || u.name || ""),
                cost: safeNumber(u.cost || u.Cost || u.buyPrice || u.PurchasedPrice || merged.PurchasedPrice || merged.Cost),
                dateAdded: cleanText(u.dateAdded || u.date || ""),
                status: cleanText(u.status || u.Status || "Available")
            })).filter(u => u.imei);

            if (!units.length) {
                const qty = Math.max(1, parseInt(merged.Quantity || merged.quantity || merged.Qty || 1, 10) || 1);
                const cost = safeNumber(merged.PurchasedPrice || merged["Purchased Price"] || merged.Cost || merged.cost || 0);
                units = Array.from({ length: qty }).map((_, idx) => ({
                    imei: qty === 1 ? code : `${code}-${idx + 1}`,
                    supplier: cleanText(merged.Supplier || merged.supplier || ""),
                    cost,
                    dateAdded: "",
                    status: cleanText(merged.Status || merged.status || "Available")
                }));
            }

            const availableQty = units.length ? units.filter(u => normalizeRecordTypeText(u.status) === "available").length : safeNumber(merged.Quantity || 0);
            const finalQty = merged.Quantity !== undefined && cleanText(merged.Quantity) !== "" ? cleanText(merged.Quantity) : String(availableQty);

            return {
                ...merged,
                "IMEI or Item Code": code,
                IMEI: code,
                code,
                "Select Phone or item": cleanText(pickValue(merged, ["Select Phone or item", "Type", "type"], "Mobile Phone")),
                Category: cleanText(pickValue(merged, ["Category", "category"], "")),
                Brand: cleanText(pickValue(merged, ["Brand", "brand"], "")),
                Model: cleanText(pickValue(merged, ["Model", "model"], "")),
                Color: cleanText(pickValue(merged, ["Color", "color"], "")),
                Price: cleanText(pickValue(merged, ["Price", "price", "Selling Price", "selling price"], "0")),
                OfferPrice: cleanText(pickValue(merged, ["OfferPrice", "Offer Price", "offerPrice", "offer price"], "")),
                PurchasedPrice: cleanText(pickValue(merged, ["PurchasedPrice", "Purchased Price", "Cost", "cost", "unitCost"], "0")),
                Specs: pickValue(merged, ["Specs", "specs"], ""),
                Quantity: finalQty,
                Status: cleanText(pickValue(merged, ["Status", "status"], availableQty <= 0 ? "Sold" : "Available")),
                Notes: cleanText(pickValue(merged, ["Notes", "notes", "Note", "note"], "")),
                Suppliers: rawSuppliers,
                Units: units
            };
        };

        const normalizeTransaction = (raw = {}) => {
            const c = raw.client || raw.customer || {};
            const canonical = raw.canonical || c.canonical || {};
            const invoiceId = cleanText(raw.invoiceId || c.invoiceId || raw.id || raw.ref || canonical.invoiceId || "");
            const items = Array.isArray(raw.purchasedItems) ? raw.purchasedItems : Array.isArray(raw.items) ? raw.items : Array.isArray(c.purchasedItems) ? c.purchasedItems : [];
            const name = cleanText(raw.name || c.name || raw.customerName || raw.partnerName || c.partnerName || c.shopName || canonical.name || canonical.partnerName || canonical.customerName || "");
            const phone = cleanText(raw.phone || c.phone || raw.whatsapp || c.whatsapp || canonical.phone || canonical.whatsapp || "");
            const totalPrice = safeNumber(raw.totalPrice || raw.total || c.totalPrice || c.total || canonical.total || 0);
            const transactionType = cleanText(raw.transactionType || c.transactionType || canonical.transactionType || "Sale") || "Sale";

            return {
                ...raw,
                client: { ...c, name: cleanText(c.name || name), phone: cleanText(c.phone || phone) },
                name,
                phone,
                email: cleanText(raw.email || c.email || canonical.email || ""),
                invoiceId,
                date: cleanText(raw.date || c.date || raw.createdAt || raw.timestamp || canonical.date || ""),
                paymentMethod: cleanText(raw.paymentMethod || c.paymentMethod || canonical.paymentMethod || ""),
                purchasedItems: items,
                items,
                totalPrice,
                total: safeNumber(raw.total || raw.totalPrice || c.total || c.totalPrice || 0),
                subTotal: safeNumber(raw.subTotal || c.subTotal || canonical.subTotal || 0),
                discount: safeNumber(raw.discount || c.discount || canonical.discount || 0),
                totalQuantity: safeNumber(raw.totalQuantity || raw.totalQty || c.totalQuantity || c.totalQty || items.reduce((s, item) => s + (parseInt(item.cartQty || item.Quantity || 1, 10) || 1), 0)),
                transactionType,
                recordType: cleanText(raw.recordType || c.recordType || canonical.recordType || ""),
                sourceSystem: cleanText(raw.sourceSystem || c.sourceSystem || canonical.sourceSystem || ""),
                partnerType: cleanText(raw.partnerType || c.partnerType || canonical.partnerType || "")
            };
        };

        const hydrateApiData = (inventoryRows = [], transactionRows = []) => {
            const inventory = (Array.isArray(inventoryRows) ? inventoryRows : []).map(normalizeInventoryItem);
            const transactions = (Array.isArray(transactionRows) ? transactionRows : []).map(normalizeTransaction);
            const customers = transactions.filter(isRetailCustomerRecord);
            const partners = buildPartnerProfiles(transactions, inventory);
            return { inventory, transactions, customers, partners };
        };

        const getPartnerNameFromTransaction = (tx = {}) => {
            const c = tx.client || tx.customer || {};
            const canonical = tx.canonical || c.canonical || {};
            return cleanText(tx.partnerName || tx.shopName || tx.name || c.partnerName || c.shopName || c.name || canonical.partnerName || canonical.shopName || canonical.name || "Unknown Partner");
        };
        const getLinkedInvoiceId = (tx = {}) => cleanText(tx.linkedInvoiceId || tx.invoiceRef || tx.client?.linkedInvoiceId || tx.client?.invoiceRef || tx.canonical?.linkedInvoiceId || "");
        const getPaymentAmount = (tx = {}) => safeNumber(tx.paymentAmount || tx.client?.paymentAmount || tx.paidAmount || tx.amount || tx.totalPrice || tx.total || tx.client?.amount || 0);
        const getRefundAmount = (tx = {}) => safeNumber(tx.refundValue || tx.refundAmount || tx.client?.refundValue || tx.client?.refundAmount || tx.totalPrice || tx.total || 0);
        const txDate = (tx = {}) => cleanText(tx.date || tx.client?.date || tx.createdAt || tx.timestamp || "");
        const txType = (tx = {}) => cleanText(tx.transactionType || tx.client?.transactionType || "Sale");
        const partnerKey = (name = "") => (cleanText(name) || "Unknown Partner").toLowerCase().replace(/[^a-z0-9]/g, "") || "unknownpartner";
        const getInvoiceIdFromTx = (tx = {}) => cleanText(tx.invoiceId || tx.client?.invoiceId || tx.id || tx.ref || tx.canonical?.invoiceId || "");
        const getItemsFromTx = (tx = {}) => Array.isArray(tx.purchasedItems) ? tx.purchasedItems : Array.isArray(tx.items) ? tx.items : Array.isArray(tx.returnedItems) ? tx.returnedItems : Array.isArray(tx.client?.items) ? tx.client.items : [];
        const itemQty = (item = {}) => Math.max(1, parseInt(item.cartQty || item.Quantity || item.qty || 1, 10) || 1);
        const itemUnitId = (item = {}) => cleanText(item.unitImei || item.displayImei || item.IMEI || item.imei || item["IMEI or Item Code"] || item["Original IMEI"] || item.code || item.sku || "");
        const itemProductName = (item = {}) => `${cleanText(item.Brand || item.brand)} ${cleanText(item.Model || item.model)}`.trim() || cleanText(item.product || item.name || "Item");
        const transactionAmount = (tx = {}) => {
            if (isPartnerPaymentTx(tx)) return getPaymentAmount(tx);
            if (isPartnerReturnTx(tx)) return getRefundAmount(tx);
            return safeNumber(tx.totalPrice || tx.total || tx.client?.totalPrice || tx.client?.total || 0);
        };
        const parseAllocations = (tx = {}) => {
            const raw = tx.allocations || tx.paymentAllocations || tx.allocationBreakdown || tx.client?.allocations || tx.client?.paymentAllocations || "";
            const parsed = Array.isArray(raw) ? raw : parseMaybeJSON(raw, []);
            return Array.isArray(parsed) ? parsed.map(a => ({
                invoiceId: cleanText(a.invoiceId || a.id || a.linkedInvoiceId || a.invoiceRef),
                amount: safeNumber(a.amount || a.appliedAmount || a.paidAmount),
                before: safeNumber(a.before || a.balanceBefore || 0),
                after: safeNumber(a.after || a.balanceAfter || 0),
                status: cleanText(a.status || "")
            })).filter(a => a.invoiceId && a.amount > 0) : [];
        };

        const PARTNER_INVOICE_TYPES = new Set(["Issue", "B2B_Issue", "WholesaleIssue", "B2B_Invoice", "PartnerInvoice"]);
        const PARTNER_PAYMENT_TYPES = new Set(["B2B_Payment", "WholesalePayment", "Payment", "PartnerPayment", "Partner_Payment"]);
        const PARTNER_RETURN_TYPES = new Set(["Return", "B2B_Return", "WholesaleReturn", "PartnerReturn", "Partner_Return"]);
        const PARTNER_PROFILE_TYPES = new Set(["B2B_Profile", "Partner", "Partner_Profile", "WholesalePartner"]);
        const isPartnerInvoiceTx = (tx = {}) => PARTNER_INVOICE_TYPES.has(txType(tx));
        const isPartnerPaymentTx = (tx = {}) => PARTNER_PAYMENT_TYPES.has(txType(tx));
        const isPartnerReturnTx = (tx = {}) => PARTNER_RETURN_TYPES.has(txType(tx));
        const isPartnerProfileTx = (tx = {}) => PARTNER_PROFILE_TYPES.has(txType(tx));

        const addUniqueUnit = (arr, unit) => {
            const key = cleanText(unit.imei || unit.unitImei || unit.id || unit.code || unit.sku || "") || `${cleanText(unit.product)}-${arr.length}`;
            const normalized = { ...unit, imei: cleanText(unit.imei || unit.unitImei || unit.id || unit.code || unit.sku || key) };
            const idx = arr.findIndex(x => (cleanText(x.imei || x.unitImei || x.id || x.code || x.sku || "") || cleanText(x.product)) === key);
            if (idx >= 0) arr[idx] = { ...arr[idx], ...normalized };
            else arr.push(normalized);
        };

        const paymentAllocationLabel = (pay = {}) => {
            const source = cleanText(pay.source).toLowerCase();
            const allocation = cleanText(pay.allocationType).toLowerCase();
            if (source === "upfront") return "First Upfront Payment";
            if (allocation === "fifo-global") return "Global Ledger Payment - FIFO";
            if (allocation === "saved-allocation") return "Global Ledger Payment - Saved Allocation";
            if (allocation === "direct") return "Direct Linked Ledger Payment";
            if (safeNumber(pay.advanceCredit) > 0 && safeNumber(pay.applied || pay.amount) <= 0) return "Advance / Unallocated Credit";
            return "Partner Ledger Payment";
        };

        const paymentRowKey = (pay = {}, idx = 0) => cleanText(pay.paymentId || pay.id || pay.invoiceId || pay.linkedInvoiceId || `PAY-${idx}`);


        const createInvoiceLedger = (tx = {}) => {
            const invoiceId = getInvoiceIdFromTx(tx) || generateInvoiceId();
            const items = getItemsFromTx(tx);
            const total = safeNumber(tx.totalPrice || tx.total || tx.client?.totalPrice || tx.client?.total || items.reduce((s, item) => s + (safeNumber(item.finalPrice || item.Price || item.sellPrice || item.wholesalePrice || item.OfferPrice) * itemQty(item)), 0));
            const upfront = safeNumber(tx.paymentAmount || tx.client?.paymentAmount || tx.paidAmount || 0);
            return {
                id: invoiceId,
                invoiceId,
                ref: invoiceId,
                transaction: tx,
                type: txType(tx),
                date: txDate(tx),
                method: cleanText(tx.paymentMethod || tx.client?.paymentMethod || "Credit"),
                note: cleanText(tx.note || tx.invoiceNote || tx.client?.note || tx.client?.invoiceNote || ""),
                items,
                total,
                subTotal: safeNumber(tx.subTotal || tx.client?.subTotal || total),
                discount: safeNumber(tx.discount || tx.client?.discount || 0),
                upfront,
                payments: [],
                returns: [],
                paymentTimeline: [],
                returnTimeline: [],
                returned: 0,
                paid: 0,
                balance: total,
                adjustedTotal: total,
                status: "Open",
                paidDate: "",
                returnedUnits: [],
                issuedUnits: items.map(item => ({
                    imei: itemUnitId(item),
                    product: itemProductName(item),
                    qty: itemQty(item),
                    price: safeNumber(item.finalPrice || item.Price || item.sellPrice || item.wholesalePrice || item.OfferPrice),
                    cost: safeNumber(item.unitCost || item.PurchasedPrice || item.Cost || 0),
                    warranty: item.warranty || {},
                    invoiceId
                }))
            };
        };

        const finalizeInvoiceLedger = (inv = {}) => {
            const returns = Array.isArray(inv.returns) ? inv.returns : [];
            const returned = returns.reduce((s, r) => s + safeNumber(r.value), 0);
            const adjustedTotal = Math.max(0, safeNumber(inv.total) - returned);
            const rawPayments = [];
            if (safeNumber(inv.upfront) > 0) rawPayments.push({
                id: `${inv.invoiceId}-UPFRONT`,
                paymentId: `${inv.invoiceId}-UPFRONT`,
                date: inv.date,
                amount: safeNumber(inv.upfront),
                method: inv.method || "Upfront",
                note: "Invoice upfront payment",
                source: "upfront",
                linkedInvoiceId: inv.invoiceId
            });
            (inv.payments || []).forEach(pay => rawPayments.push({ ...pay, amount: safeNumber(pay.amount) }));
            rawPayments.sort((a, b) => parseSmartDate(a.date) - parseSmartDate(b.date));

            let remaining = adjustedTotal;
            let paid = 0;
            let paidDate = "";
            const paymentTimeline = rawPayments.map(pay => {
                const before = Math.max(0, remaining);
                const applied = Math.min(before, safeNumber(pay.amount));
                const extra = Math.max(0, safeNumber(pay.amount) - applied);
                remaining = Math.max(0, remaining - applied);
                paid += applied;
                if (!paidDate && adjustedTotal > 0 && remaining <= 0) paidDate = pay.date || inv.date || "";
                return {
                    ...pay,
                    paymentKind: pay.paymentKind || paymentAllocationLabel(pay),
                    sourceAmount: safeNumber(pay.sourceAmount || pay.originalAmount || pay.receivedAmount || pay.amount),
                    applied,
                    extra,
                    before,
                    after: remaining,
                    completedInvoice: adjustedTotal > 0 && remaining <= 0,
                    statusAfter: remaining <= 0 ? "Paid" : applied > 0 ? "Partial" : "Open"
                };
            });

            const returnTimeline = returns.map(ret => ({
                ...ret,
                items: ret.items || [],
                units: (ret.items || []).map(item => ({ imei: itemUnitId(item), product: itemProductName(item), qty: itemQty(item), invoiceId: inv.invoiceId }))
            }));
            const returnedUnits = returnTimeline.flatMap(r => r.units || []);
            const balance = Math.max(0, adjustedTotal - paid);
            const status = balance <= 0 ? "Paid" : paid > 0 || returned > 0 ? "Partial" : "Open";
            return {
                ...inv,
                returns,
                returned,
                adjustedTotal,
                paymentTimeline,
                returnTimeline,
                paid,
                totalPaid: paid,
                balance,
                status,
                paidDate,
                returnedUnits
            };
        };

        const buildPartnerProfiles = (transactions = [], inventory = []) => {
            const map = {};
            const ensure = (name, phone = "") => {
                const safeName = cleanText(name) || "Unknown Partner";
                const key = partnerKey(safeName);
                if (!map[key]) {
                    map[key] = {
                        key,
                        name: safeName,
                        phone: cleanText(phone),
                        invoices: [],
                        invoiceMap: {},
                        payments: [],
                        returns: [],
                        profiles: [],
                        activeUnits: [],
                        returnedUnits: [],
                        paidUnits: [],
                        openUnits: [],
                        unpaidUnits: [],
                        paymentRows: [],
                        transactions: [],
                        totalIssued: 0,
                        totalPaid: 0,
                        totalReturned: 0,
                        totalUpfrontPaid: 0,
                        totalDirectLedgerPaid: 0,
                        totalGlobalLedgerPaid: 0,
                        balance: 0,
                        advanceCredit: 0,
                        lastDate: "",
                        risk: "Clear"
                    };
                }
                if (phone && !map[key].phone) map[key].phone = cleanText(phone);
                return map[key];
            };

            transactions.filter(isPartnerTransaction).forEach(tx => {
                const name = getPartnerNameFromTransaction(tx);
                const p = ensure(name, tx.phone || tx.client?.phone || tx.whatsapp || tx.client?.whatsapp || "");
                p.transactions.push(tx);
                p.lastDate = txDate(tx) || p.lastDate;
                if (isPartnerProfileTx(tx)) p.profiles.push(tx);
                if (isPartnerInvoiceTx(tx)) {
                    const inv = createInvoiceLedger(tx);
                    if (!p.invoiceMap[inv.invoiceId]) {
                        p.invoiceMap[inv.invoiceId] = inv;
                        p.invoices.push(inv);
                    }
                } else if (isPartnerPaymentTx(tx)) {
                    p.payments.push({
                        id: getInvoiceIdFromTx(tx) || `PAY-${Date.now()}-${p.payments.length}`,
                        paymentId: getInvoiceIdFromTx(tx) || `PAY-${Date.now()}-${p.payments.length}`,
                        transaction: tx,
                        date: txDate(tx),
                        amount: getPaymentAmount(tx),
                        method: cleanText(tx.paymentMethod || tx.client?.paymentMethod || tx.method || ""),
                        note: cleanText(tx.note || tx.paymentNote || tx.client?.note || tx.client?.paymentNote || ""),
                        linkedInvoiceId: getLinkedInvoiceId(tx),
                        allocations: parseAllocations(tx),
                        advanceCredit: safeNumber(tx.advanceCredit || tx.client?.advanceCredit || 0)
                    });
                } else if (isPartnerReturnTx(tx)) {
                    const items = getItemsFromTx(tx);
                    const returnId = getInvoiceIdFromTx(tx) || generateReturnId();
                    p.returns.push({
                        id: returnId,
                        returnId,
                        transaction: tx,
                        date: txDate(tx),
                        value: getRefundAmount(tx),
                        linkedInvoiceId: getLinkedInvoiceId(tx),
                        method: cleanText(tx.paymentMethod || tx.client?.paymentMethod || ""),
                        note: cleanText(tx.note || tx.returnNote || tx.client?.note || tx.client?.returnNote || ""),
                        items,
                        units: items.map(item => ({ imei: itemUnitId(item), product: itemProductName(item), qty: itemQty(item), invoiceId: getLinkedInvoiceId(tx), returnId: getInvoiceIdFromTx(tx) }))
                    });
                }
            });

            inventory.forEach(item => {
                (item.Units || []).forEach(unit => {
                    const st = cleanText(unit.status);
                    if (st.toLowerCase().startsWith("partner")) {
                        const partnerName = cleanText(st.replace(/^partner\s*:/i, ""));
                        const p = ensure(partnerName || "Unknown Partner");
                        addUniqueUnit(p.activeUnits, {
                            imei: unit.imei,
                            product: `${cleanText(item.Brand)} ${cleanText(item.Model)}`.trim() || "Item",
                            sku: item["IMEI or Item Code"],
                            cost: unit.cost,
                            status: st,
                            source: "Inventory Status",
                            date: unit.dateAdded || ""
                        });
                    }
                });
            });

            return Object.values(map).map(p => {
                // Attach returns first so payment allocation uses adjusted invoice balances.
                p.returns.forEach(ret => {
                    const linked = cleanText(ret.linkedInvoiceId);
                    if (linked && p.invoiceMap[linked]) p.invoiceMap[linked].returns.push(ret);
                });

                let workingInvoices = p.invoices.map(inv => finalizeInvoiceLedger(inv)).sort((a, b) => parseSmartDate(a.date) - parseSmartDate(b.date));
                const getWorking = (invoiceId) => workingInvoices.find(inv => cleanText(inv.invoiceId) === cleanText(invoiceId));
                const syncWorking = (inv) => {
                    const idx = workingInvoices.findIndex(x => cleanText(x.invoiceId) === cleanText(inv.invoiceId));
                    if (idx >= 0) workingInvoices[idx] = finalizeInvoiceLedger(inv);
                };

                // Direct payments and saved payment allocations.
                p.payments.sort((a, b) => parseSmartDate(a.date) - parseSmartDate(b.date)).forEach(pay => {
                    let remaining = safeNumber(pay.amount);
                    const direct = cleanText(pay.linkedInvoiceId);
                    if (direct && getWorking(direct)) {
                        const inv = getWorking(direct);
                        const before = safeNumber(inv.balance);
                        const applied = Math.min(before, remaining);
                        if (applied > 0) {
                            inv.payments.push({ ...pay, sourceAmount: safeNumber(pay.amount), amount: applied, before, after: Math.max(0, before - applied), allocationType: "direct", paymentKind: "Direct Linked Ledger Payment" });
                            remaining -= applied;
                            syncWorking(inv);
                        }
                    }
                    const savedAllocations = Array.isArray(pay.allocations) ? pay.allocations : [];
                    if (!direct && savedAllocations.length) {
                        savedAllocations.forEach(allocation => {
                            if (remaining <= 0) return;
                            const inv = getWorking(allocation.invoiceId);
                            if (!inv) return;
                            const before = safeNumber(inv.balance);
                            const applied = Math.min(before, remaining, safeNumber(allocation.amount));
                            if (applied > 0) {
                                inv.payments.push({ ...pay, sourceAmount: safeNumber(pay.amount), amount: applied, before, after: Math.max(0, before - applied), allocationType: "saved-allocation", paymentKind: "Global Ledger Payment - Saved Allocation" });
                                remaining -= applied;
                                syncWorking(inv);
                            }
                        });
                    }
                    if (!direct && !savedAllocations.length) {
                        [...workingInvoices].filter(inv => safeNumber(inv.balance) > 0).sort((a, b) => parseSmartDate(a.date) - parseSmartDate(b.date) || cleanText(a.invoiceId).localeCompare(cleanText(b.invoiceId))).forEach(inv => {
                            if (remaining <= 0) return;
                            const before = safeNumber(inv.balance);
                            const applied = Math.min(before, remaining);
                            if (applied > 0) {
                                inv.payments.push({ ...pay, sourceAmount: safeNumber(pay.amount), amount: applied, before, after: Math.max(0, before - applied), allocationType: "fifo-global", paymentKind: "Global Ledger Payment - FIFO" });
                                remaining -= applied;
                                syncWorking(inv);
                            }
                        });
                    }
                    pay.allocatedAmount = safeNumber(pay.amount) - Math.max(0, remaining);
                    pay.advanceCredit = Math.max(safeNumber(pay.advanceCredit), Math.max(0, remaining));
                });

                p.invoices = workingInvoices.map(finalizeInvoiceLedger).sort((a, b) => parseSmartDate(b.date) - parseSmartDate(a.date));
                p.paymentRows = p.invoices.flatMap(inv => (inv.paymentTimeline || []).map((pay, idx) => ({
                    ...pay,
                    rowId: `${inv.invoiceId}-${paymentRowKey(pay, idx)}-${idx}`,
                    paymentRef: paymentRowKey(pay, idx),
                    invoiceId: inv.invoiceId,
                    invoiceDate: inv.date,
                    invoiceStatus: inv.status,
                    paymentKind: pay.paymentKind || paymentAllocationLabel(pay),
                    receivedAmount: safeNumber(pay.sourceAmount || pay.receivedAmount || pay.amount),
                    appliedAmount: safeNumber(pay.applied || pay.amount),
                    completedDate: pay.completedInvoice ? (pay.date || inv.paidDate || "") : ""
                })));
                p.payments.forEach((pay, idx) => {
                    if (safeNumber(pay.advanceCredit) > 0 || safeNumber(pay.allocatedAmount) <= 0) {
                        p.paymentRows.push({
                            ...pay,
                            rowId: `${pay.paymentId || pay.id || 'PAY'}-ADVANCE-${idx}`,
                            paymentRef: pay.paymentId || pay.id || `PAY-${idx + 1}`,
                            invoiceId: pay.linkedInvoiceId || "Advance Credit",
                            paymentKind: "Advance / Unallocated Credit",
                            receivedAmount: safeNumber(pay.amount),
                            appliedAmount: Math.max(0, safeNumber(pay.advanceCredit) || (safeNumber(pay.allocatedAmount) <= 0 ? safeNumber(pay.amount) : 0)),
                            before: 0,
                            after: 0,
                            completedDate: ""
                        });
                    }
                });
                p.paymentRows.sort((a, b) => parseSmartDate(b.date) - parseSmartDate(a.date));
                p.totalIssued = p.invoices.reduce((s, inv) => s + safeNumber(inv.total), 0);
                p.totalPaid = p.invoices.reduce((s, inv) => s + safeNumber(inv.paid), 0) + p.payments.reduce((s, pay) => s + Math.max(0, safeNumber(pay.advanceCredit)), 0);
                p.totalReturned = p.returns.reduce((s, ret) => s + safeNumber(ret.value), 0);
                p.totalUpfrontPaid = p.paymentRows.filter(row => cleanText(row.source).toLowerCase() === "upfront").reduce((s, row) => s + safeNumber(row.appliedAmount || row.applied || row.amount), 0);
                p.totalDirectLedgerPaid = p.paymentRows.filter(row => cleanText(row.allocationType).toLowerCase() === "direct").reduce((s, row) => s + safeNumber(row.appliedAmount || row.applied || row.amount), 0);
                p.totalGlobalLedgerPaid = p.paymentRows.filter(row => ["fifo-global", "saved-allocation"].includes(cleanText(row.allocationType).toLowerCase())).reduce((s, row) => s + safeNumber(row.appliedAmount || row.applied || row.amount), 0);
                p.balance = Math.max(0, p.invoices.reduce((s, inv) => s + safeNumber(inv.balance), 0));
                p.advanceCredit = p.payments.reduce((s, pay) => s + Math.max(0, safeNumber(pay.advanceCredit)), 0);
                p.lastDate = p.transactions.map(t => txDate(t)).filter(Boolean).sort((a, b) => parseSmartDate(b) - parseSmartDate(a))[0] || p.lastDate;
                p.risk = p.balance > 100000 ? "High Risk" : p.balance > 0 ? "Has Balance" : "Clear";

                const returnedIds = new Set();
                p.returns.forEach(ret => (ret.units || []).forEach(unit => {
                    returnedIds.add(cleanText(unit.imei));
                    addUniqueUnit(p.returnedUnits, { ...unit, date: ret.date, returnId: ret.returnId, value: ret.value, status: "Returned", paymentState: "Returned" });
                }));

                p.invoices.forEach(inv => {
                    (inv.issuedUnits || []).forEach(unit => {
                        const unitKey = cleanText(unit.imei);
                        const normalized = {
                            ...unit,
                            invoiceId: inv.invoiceId,
                            invoiceDate: inv.date,
                            paidDate: inv.paidDate,
                            status: inv.status,
                            balance: inv.balance,
                            invoiceTotal: inv.total,
                            invoicePaid: inv.paid,
                            invoiceReturned: inv.returned,
                            paymentState: inv.status === "Paid" ? "Paid" : "Unpaid",
                            source: inv.status === "Paid" ? "Paid Invoice Ledger" : "Open Invoice Ledger"
                        };
                        if (returnedIds.has(unitKey)) return;
                        addUniqueUnit(p.activeUnits, normalized);
                        if (inv.status === "Paid") addUniqueUnit(p.paidUnits, normalized);
                        else {
                            addUniqueUnit(p.openUnits, normalized);
                            addUniqueUnit(p.unpaidUnits, normalized);
                        }
                    });
                });

                // Active Units now means every non-returned unit still assigned to the partner, paid + unpaid.
                p.activeUnits = (p.activeUnits || []).filter(unit => !returnedIds.has(cleanText(unit.imei)));

                p.ledgerEvents = p.transactions.map(tx => ({
                    tx,
                    type: txType(tx),
                    date: txDate(tx),
                    invoiceId: getInvoiceIdFromTx(tx),
                    linkedInvoiceId: getLinkedInvoiceId(tx),
                    amount: transactionAmount(tx),
                    items: getItemsFromTx(tx),
                    kind: isPartnerInvoiceTx(tx) ? "invoice" : isPartnerPaymentTx(tx) ? "payment" : isPartnerReturnTx(tx) ? "return" : "profile"
                })).sort((a, b) => parseSmartDate(b.date) - parseSmartDate(a.date));

                return p;
            }).sort((a, b) => b.balance - a.balance || a.name.localeCompare(b.name));

                    if (parsed.Other && parsed.Other.trim() !== "") display.push(parsed.Other);
                    return display.join(' • ');
                } catch (e) { return specsStr; }
            }
            return specsStr;
        };

        const generateDocumentId = (prefix) => {
            const timePart = Date.now().toString(36).toUpperCase();
            let randomPart = "";
            if (window.crypto && window.crypto.getRandomValues) {
                const bytes = new Uint8Array(8);
                window.crypto.getRandomValues(bytes);
                randomPart = Array.from(bytes, value => value.toString(16).padStart(2, "0")).join("").toUpperCase();
            } else {
                randomPart = `${Math.random().toString(36).slice(2)}${Math.random().toString(36).slice(2)}`.slice(0, 16).toUpperCase();
            }
            return `${prefix}-${timePart}-${randomPart}`;

        const calculateEndDate = (durationString) => {
            if (!durationString || durationString === "None" || durationString === "Custom") return "";
            const parts = durationString.split(' ');
            const num = parseInt(parts[0]);
            if (isNaN(num)) return durationString;
            const date = new Date();
            const unit = parts[1] || "";
            if (unit.includes('Day')) date.setDate(date.getDate() + num);
            else if (unit.includes('Week')) date.setDate(date.getDate() + (num * 7));
            else if (unit.includes('Month')) date.setMonth(date.getMonth() + num);
            else if (unit.includes('Year')) date.setFullYear(date.getFullYear() + num);
            date.setDate(date.getDate() - 1);
            return date.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
        };

                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'sine'; osc.frequency.setValueAtTime(1200, ctx.currentTime); 
                gain.gain.setValueAtTime(0.1, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.15);

        const parseSmartDate = (dateStr) => {
            if (!dateStr) return new Date();
            let clean = dateStr.replace(/["']/g, "").replace(/\s+at\s+/i, ' ').trim();
            const ymdMatch = clean.match(/^(\d{4})[-/](\d{1,2})[-/](\d{1,2})/);
            if (ymdMatch) return new Date(ymdMatch[1], ymdMatch[2] - 1, ymdMatch[3]);
            const dmyMatch = clean.match(/^(\d{1,2})[-/](\d{1,2})[-/](\d{4})/);
            if (dmyMatch) {
                let p1 = parseInt(dmyMatch[1], 10), p2 = parseInt(dmyMatch[2], 10), y = parseInt(dmyMatch[3], 10);
                if (p1 > 12) return new Date(y, p2 - 1, p1);
                return new Date(y, p1 - 1, p2);
            }
            let parsed = new Date(clean);
            if (!isNaN(parsed.getTime())) return parsed;
            return new Date();

                        if (dateFilter === 'today') {
                            return cDate.toDateString() === now.toDateString();
                        }
                        if (dateFilter === 'week') {
                            const pastWeek = new Date(now);
                            pastWeek.setDate(pastWeek.getDate() - 7);
                            return cDate >= pastWeek;
                        }
                        if (dateFilter === 'month') {
                            return cDate.getMonth() === now.getMonth() && cDate.getFullYear() === now.getFullYear();
                        }
                        if (dateFilter === 'year') {
                            return cDate.getFullYear() === now.getFullYear();
                        }
                        if (dateFilter === 'custom') {
                            if (!customStart && !customEnd) return true;
                            let match = true;
                            if (customStart) {
                                const s = new Date(customStart);
                                s.setHours(0,0,0,0);
                                match = match && cDate >= s;
                            }
                            if (customEnd) {
                                const e = new Date(customEnd);
                                e.setHours(23,59,59,999);
                                match = match && cDate <= e;

                                        </div>
                                        <div className="bg-blue-50 p-5 rounded-2xl border border-blue-100 shadow-sm flex flex-col justify-center items-end">

                                                                    {!item.isExchange && <p className="text-[11px] font-medium text-gray-500 mt-0.5">{formatSpecsDisplay(item.Specs)} • {item.Color}</p>}

                                                                <td className="px-5 py-4 align-top font-mono text-xs text-gray-600 break-all">{item.unitImei || item.displayImei || item["IMEI or Item Code"]}</td>
                                                                <td className="px-5 py-4 align-top text-[11px]">
                                                                    {!item.isExchange && selectedClient.transactionType !== 'Return' ? (
                                                                        <div className="space-y-1">
                                                                            {renderWarrantyRow("Software Warranty", item.warranty.software, item.warranty.softwareEnd)}
                                                                            {renderWarrantyRow("Device to Device Warranty", item.warranty.device, item.warranty.deviceEnd)}
                                                                            {renderWarrantyRow("General Warranty", item.warranty.global, item.warranty.globalEnd)}
                                                                            {renderPricedWarrantyRow("Extended Warranty", item.warranty.extended, item.warranty.extendedEnd, item.warranty.extendedPrice)}
                                                                            {renderWarrantyRow("Apple Care", item.warranty.appleCare, item.warranty.appleCareEnd)}
                                                                            {noWarrantyAtAll && <span className="text-gray-400 text-xs font-medium">No Warranty Issued</span>}
                                                                        </div>
                                                                    ) : <span className="text-gray-400 text-xs italic">N/A</span>}
                                                                </td>
                                                                <td className="px-5 py-4 align-top text-right font-bold text-gray-900">
                                                                    {itemDiscount > 0 ? (
                                                                        <div className="flex flex-col items-end">
                                                                            <span className="text-[10px] text-red-500 line-through">LKR {(basePrice+extPrice).toLocaleString()}</span>
                                                                            <span className="text-sm">LKR {finalSellingPrice.toLocaleString()}</span>
                                                                        </div>
                                                                    ) : (
                                                                        <span>LKR {finalSellingPrice.toLocaleString()}</span>
                                                                    )}
                                                                </td>
                                                            </tr>
                                                        );
                                                    })
                                                ) : (
                                                    <tr><td colSpan="4" className="p-8 text-center text-gray-500">No detailed item records found for this older invoice.</td></tr>
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        
        const PartnersView = ({ partners = [], onOpenWholesale }) => {
            const [search, setSearch] = useState("");
            const [selectedPartner, setSelectedPartner] = useState(null);
            const [ledgerFilter, setLedgerFilter] = useState("overview");
            const [detailSearch, setDetailSearch] = useState("");
            const [selectedInvoice, setSelectedInvoice] = useState(null);

            const currentPartner = useMemo(() => {
                if (!selectedPartner) return null;
                return partners.find(p => p.key === selectedPartner.key) || selectedPartner;
            }, [partners, selectedPartner]);

            const filtered = useMemo(() => {
                const terms = search.toLowerCase().trim().split(/\s+/).filter(Boolean);
                if (!terms.length) return partners;
                return partners.filter(p => {
                    const invoiceIds = (p.invoices || []).map(inv => inv.invoiceId || inv.id || "").join(" ");
                    const unitIds = [...(p.activeUnits || []), ...(p.paidUnits || []), ...(p.returnedUnits || [])].map(u => `${u.imei} ${u.product}`).join(" ");
                    const eventText = (p.ledgerEvents || []).map(e => `${e.type} ${e.invoiceId} ${e.linkedInvoiceId}`).join(" ");
                    const combined = `${p.name} ${p.phone} ${p.risk} ${invoiceIds} ${unitIds} ${eventText}`.toLowerCase();
                    return terms.every(term => combined.includes(term));
                });
            }, [partners, search]);

            const metrics = useMemo(() => ({
                partners: partners.length,
                activeUnits: partners.reduce((s, p) => s + (p.activeUnits || []).length, 0),
                paidUnits: partners.reduce((s, p) => s + (p.paidUnits || []).length, 0),
                returnedUnits: partners.reduce((s, p) => s + (p.returnedUnits || []).length, 0),
                issued: partners.reduce((s, p) => s + safeNumber(p.totalIssued), 0),
                paid: partners.reduce((s, p) => s + safeNumber(p.totalPaid), 0),
                balance: partners.reduce((s, p) => s + safeNumber(p.balance), 0)
            }), [partners]);

            const openInvoiceWindow = (invoiceId) => {
                if (!invoiceId) return;
                window.open(getInvoiceLink(invoiceId), "_blank", "noopener,noreferrer");
            };

            const eventBadgeClass = (kind) => {
                if (kind === "invoice") return "bg-blue-50 text-blue-700 border-blue-100";
                if (kind === "payment") return "bg-green-50 text-green-700 border-green-100";
                if (kind === "return") return "bg-purple-50 text-purple-700 border-purple-100";
                return "bg-gray-50 text-gray-600 border-gray-100";
            };

            const detailTerms = detailSearch.toLowerCase().trim().split(/\s+/).filter(Boolean);
            const matchesDetail = (text) => !detailTerms.length || detailTerms.every(term => String(text || "").toLowerCase().includes(term));
            const partnerInvoices = currentPartner ? (currentPartner.invoices || []).filter(inv => {
                if (ledgerFilter === "open" && inv.status === "Paid") return false;
                if (ledgerFilter === "paid" && inv.status !== "Paid") return false;
                const itemText = (inv.issuedUnits || inv.items || []).map(u => `${u.imei || itemUnitId(u)} ${u.product || itemProductName(u)}`).join(" ");
                const payText = (inv.paymentTimeline || []).map(p => `${p.paymentId || p.id} ${p.date} ${p.method}`).join(" ");
                return matchesDetail(`${inv.invoiceId} ${inv.date} ${inv.status} ${itemText} ${payText}`);
            }) : [];
            const partnerPayments = currentPartner ? (currentPartner.paymentRows || []).filter(pay => matchesDetail(`${pay.paymentRef || pay.paymentId || pay.id} ${pay.invoiceId || pay.linkedInvoiceId} ${pay.date} ${pay.method} ${pay.note} ${pay.paymentKind} ${pay.allocationType}`)) : [];
            const partnerReturns = currentPartner ? (currentPartner.returns || []).filter(ret => matchesDetail(`${ret.returnId || ret.id} ${ret.linkedInvoiceId} ${ret.date} ${ret.note} ${(ret.units || []).map(u => u.imei).join(" ")}`)) : [];
            const partnerEvents = currentPartner ? (currentPartner.ledgerEvents || []).filter(ev => matchesDetail(`${ev.type} ${ev.invoiceId} ${ev.linkedInvoiceId} ${ev.date} ${(ev.items || []).map(itemUnitId).join(" ")}`)) : [];
            const filterButtons = [
                ["overview", "Overview"], ["invoices", "All Invoices"], ["open", "Open"], ["paid", "Paid"], ["payments", "Payments"], ["returns", "Returns"], ["units", "Active Units (Paid + Unpaid)"], ["paidUnits", "Paid Units"], ["returnedUnits", "Returned Units"], ["events", "Events"]
            ];

            const renderUnitTable = (title, units = [], tone = "orange") => {
                const visibleUnits = (units || []).filter(u => matchesDetail(`${u.product || ''} ${u.imei || ''} ${u.invoiceId || ''} ${u.returnId || ''} ${u.paymentState || ''} ${u.status || ''} ${u.paidDate || ''} ${u.invoiceDate || ''}`));
                return (
                <div className="bg-white border border-gray-200 rounded-2xl overflow-hidden shadow-sm mb-6">
                    <div className="px-5 py-4 border-b border-gray-100 bg-gray-50 flex justify-between items-center">

                        <span className={`text-[10px] font-black px-2.5 py-1 rounded-full ${tone === 'green' ? 'bg-green-100 text-green-700' : tone === 'purple' ? 'bg-purple-100 text-purple-700' : 'bg-orange-100 text-orange-700'}`}>{visibleUnits.length} units</span>

                            <thead className="bg-white border-b border-gray-100 text-gray-500 text-[10px] uppercase tracking-wider">
                                <tr><th className="px-5 py-3">Product</th><th className="px-5 py-3">IMEI / Serial</th><th className="px-5 py-3">Payment State</th><th className="px-5 py-3">Invoice / Return</th><th className="px-5 py-3">Date</th><th className="px-5 py-3 text-right">Value / Cost</th></tr>
                            </thead>
                            <tbody className="divide-y divide-gray-100">
                                {visibleUnits.map((u, i) => (
                                    <tr key={`${u.imei}-${i}`} className="hover:bg-gray-50">
                                        <td className="px-5 py-3"><div className="font-bold text-gray-900">{u.product || "Item"}</div><div className="text-[10px] text-gray-400 font-bold mt-0.5">{u.source || u.status || "Ledger"}</div></td>
                                        <td className="px-5 py-3 font-mono text-xs text-gray-700">{u.imei}</td>
                                        <td className="px-5 py-3"><span className={`inline-flex px-2 py-1 rounded-full text-[10px] font-black ${u.paymentState === 'Paid' ? 'bg-green-100 text-green-700' : u.paymentState === 'Returned' ? 'bg-purple-100 text-purple-700' : 'bg-amber-100 text-amber-700'}`}>{u.paymentState || (u.balance > 0 ? 'Unpaid' : 'Active')}</span>{u.paidDate && <div className="text-[10px] text-green-600 font-bold mt-1">Paid: {u.paidDate}</div>}</td>
                                        <td className="px-5 py-3 font-mono text-xs text-gray-500">{u.invoiceId || u.returnId || u.sku || "—"}</td>
                                        <td className="px-5 py-3 text-xs text-gray-500">{u.invoiceDate || u.date || "—"}</td>
                                        <td className="px-5 py-3 text-right"><div className="font-bold">LKR {moneyFmt(u.price || u.value || u.cost || 0)}</div>{safeNumber(u.balance) > 0 && <div className="text-[10px] text-red-600 font-bold">Bal: {moneyFmt(u.balance)}</div>}</td>
                                    </tr>
                                ))}
                                {visibleUnits.length === 0 && <tr><td colSpan="6" className="p-8 text-center text-gray-500">No units found for this section.</td></tr>}
                            </tbody>
                        </table>
                    </div>
                </div>

                    <div className="bg-white border border-gray-200 rounded-3xl shadow-sm p-4 mb-5 flex flex-col lg:flex-row gap-4 lg:items-center">

                            <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search partners by shop name, phone, invoice, payment, return, or IMEI..." className="w-full bg-gray-50 border border-gray-200 pl-11 pr-4 py-3 rounded-2xl focus:outline-none focus:border-blue-500 focus:bg-white focus:ring-4 focus:ring-blue-500/10 text-sm transition-all font-semibold" />
                        </div>
                        <button type="button" onClick={onOpenWholesale} className="pro-button primary bg-slate-900 hover:bg-black border-none text-white px-5 py-3 text-xs shadow-md"><Icons.Link /> Open Wholesale Portal</button>
                    </div>

                    <div className="flex-1 bg-white border border-gray-200 rounded-3xl overflow-hidden flex flex-col shadow-sm">
                        <div className="overflow-auto flex-1">
                            <table className="w-full text-left border-collapse whitespace-nowrap">
                                <thead className="bg-gray-50 text-[11px] uppercase tracking-wider text-gray-500 font-bold sticky top-0 z-10 shadow-sm">
                                    <tr><th className="px-6 py-4 border-b border-gray-200">Partner / Shop</th><th className="px-6 py-4 border-b border-gray-200">Invoices</th><th className="px-6 py-4 border-b border-gray-200">Units</th><th className="px-6 py-4 border-b border-gray-200">Issued</th><th className="px-6 py-4 border-b border-gray-200">Paid / Returned</th><th className="px-6 py-4 border-b border-gray-200">Balance</th><th className="px-6 py-4 border-b border-gray-200">Last Activity</th><th className="px-6 py-4 border-b border-gray-200 text-right">Actions</th></tr>
                                </thead>
                                <tbody className="divide-y divide-gray-100 text-sm">
                                    {filtered.map((p) => (
                                        <tr key={p.key} className="hover:bg-gray-50 transition-colors">
                                            <td className="px-6 py-4"><div className="font-black text-gray-900">{p.name}</div><div className="text-xs text-gray-500 font-mono mt-1">{p.phone || "No phone saved"}</div><div className={`inline-flex mt-2 px-2 py-0.5 rounded-full text-[10px] font-black ${safeNumber(p.balance) > 0 ? 'bg-red-50 text-red-600' : 'bg-green-50 text-green-600'}`}>{p.risk}</div></td>
                                            <td className="px-6 py-4"><div className="font-black text-gray-900">{(p.invoices || []).length}</div><div className="text-[11px] text-gray-400 font-bold">{(p.invoices || []).filter(i => i.status !== 'Paid').length} open</div></td>
                                            <td className="px-6 py-4"><div className="flex flex-col gap-1"><span className="inline-flex w-fit px-2.5 py-1 rounded-full text-xs font-black bg-orange-100 text-orange-700">Active {(p.activeUnits || []).length}</span><span className="inline-flex w-fit px-2.5 py-1 rounded-full text-xs font-black bg-green-100 text-green-700">Paid {(p.paidUnits || []).length}</span><span className="inline-flex w-fit px-2.5 py-1 rounded-full text-xs font-black bg-purple-100 text-purple-700">Returned {(p.returnedUnits || []).length}</span></div></td>
                                            <td className="px-6 py-4 font-bold text-blue-600">LKR {moneyFmt(p.totalIssued)}</td>
                                            <td className="px-6 py-4"><div className="text-green-600 font-bold">Paid: LKR {moneyFmt(p.totalPaid)}</div><div className="text-purple-600 text-xs font-bold mt-1">Returned: LKR {moneyFmt(p.totalReturned)}</div>{safeNumber(p.advanceCredit) > 0 && <div className="text-[11px] text-blue-600 font-bold mt-1">Advance: LKR {moneyFmt(p.advanceCredit)}</div>}</td>
                                            <td className="px-6 py-4"><span className={`font-black ${safeNumber(p.balance) > 0 ? "text-red-600" : "text-green-600"}`}>LKR {moneyFmt(p.balance)}</span></td>
                                            <td className="px-6 py-4 text-gray-500">{p.lastDate || "—"}</td>
                                            <td className="px-6 py-4 text-right"><button type="button" onClick={() => { setSelectedPartner(p); setLedgerFilter('overview'); setDetailSearch(''); setSelectedInvoice(null); }} className="pro-button secondary py-1.5 px-3 rounded-lg text-xs font-semibold inline-flex items-center gap-1.5"><Icons.Eye /> Open Ledger</button></td>
                                        </tr>
                                    ))}
                                    {filtered.length === 0 && <tr><td colSpan="8" className="px-6 py-16 text-center text-gray-500 font-medium">No partner records found in the local database.</td></tr>}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {currentPartner && (
                        <div className="fixed inset-0 glass-overlay z-[80] flex items-center justify-center p-4">
                            <div className="bg-white w-full max-w-7xl rounded-[28px] shadow-[0_20px_60px_rgba(0,0,0,0.15)] flex flex-col max-h-[92vh] overflow-hidden border border-gray-200">
                                <div className="px-8 py-5 border-b border-gray-100 flex flex-col lg:flex-row lg:justify-between lg:items-center gap-4 bg-gray-50 shrink-0">
                                    <div><h3 className="font-black text-xl text-gray-900">{currentPartner.name}</h3><p className="text-xs font-mono text-gray-500 mt-1">{currentPartner.phone || "No phone number"} • {(currentPartner.ledgerEvents || []).length} ledger events • {(currentPartner.invoices || []).length} invoices</p></div>
                                    <div className="flex gap-2"><button type="button" onClick={onOpenWholesale} className="pro-button primary px-4 py-2 text-xs bg-slate-900 hover:bg-black border-none text-white"><Icons.Link /> Wholesale Portal</button><button type="button" onClick={() => { setSelectedPartner(null); setSelectedInvoice(null); }} className="w-9 h-9 rounded-full bg-gray-200 text-gray-600 flex items-center justify-center hover:bg-gray-300">✕</button></div>
                                </div>

                                <div className="p-6 overflow-y-auto bg-gray-50/50">
                                    <div className="grid grid-cols-2 md:grid-cols-6 gap-3 mb-5">
                                        <div className="bg-white rounded-2xl border border-gray-200 p-4"><p className="text-[10px] uppercase tracking-widest font-black text-gray-400 mb-1">Issued</p><p className="font-black text-blue-600 text-lg">LKR {moneyFmt(currentPartner.totalIssued)}</p></div>
                                        <div className="bg-white rounded-2xl border border-gray-200 p-4"><p className="text-[10px] uppercase tracking-widest font-black text-gray-400 mb-1">Paid</p><p className="font-black text-green-600 text-lg">LKR {moneyFmt(currentPartner.totalPaid)}</p></div>
                                        <div className="bg-white rounded-2xl border border-gray-200 p-4"><p className="text-[10px] uppercase tracking-widest font-black text-gray-400 mb-1">Returned</p><p className="font-black text-purple-600 text-lg">LKR {moneyFmt(currentPartner.totalReturned)}</p></div>
                                        <div className="bg-white rounded-2xl border border-gray-200 p-4"><p className="text-[10px] uppercase tracking-widest font-black text-gray-400 mb-1">Balance</p><p className={`font-black text-lg ${safeNumber(currentPartner.balance) > 0 ? "text-red-600" : "text-green-600"}`}>LKR {moneyFmt(currentPartner.balance)}</p></div>
                                        <div className="bg-white rounded-2xl border border-gray-200 p-4"><p className="text-[10px] uppercase tracking-widest font-black text-gray-400 mb-1">Active Units</p><p className="font-black text-orange-600 text-lg">{(currentPartner.activeUnits || []).length}</p></div>
                                        <div className="bg-white rounded-2xl border border-gray-200 p-4"><p className="text-[10px] uppercase tracking-widest font-black text-gray-400 mb-1">Paid Units</p><p className="font-black text-green-600 text-lg">{(currentPartner.paidUnits || []).length}</p></div>
                                    </div>

                                    <div className="bg-white rounded-2xl border border-gray-200 p-3 mb-5 flex flex-col xl:flex-row gap-3 xl:items-center">
                                        <div className="flex flex-wrap gap-2 flex-1">
                                            {filterButtons.map(([key, label]) => (<button key={key} type="button" onClick={() => setLedgerFilter(key)} className={`px-3 py-2 rounded-xl text-[11px] font-black transition-all ${ledgerFilter === key ? 'bg-slate-900 text-white shadow-md' : 'bg-gray-50 text-gray-600 hover:bg-gray-100 border border-gray-100'}`}>{label}</button>))}
                                        </div>
                                        <div className="relative w-full xl:w-80"><span className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"><Icons.Search /></span><input value={detailSearch} onChange={e => setDetailSearch(e.target.value)} placeholder="Filter inside ledger..." className="w-full bg-gray-50 border border-gray-200 pl-9 pr-3 py-2.5 rounded-xl focus:outline-none focus:border-blue-500 text-xs font-semibold" /></div>
                                    </div>

                                    {(ledgerFilter === "overview" || ledgerFilter === "units") && renderUnitTable("Active Units With Partner (Paid + Unpaid)", currentPartner.activeUnits || [], "orange")}
                                    {(ledgerFilter === "paidUnits") && renderUnitTable("Paid Units", currentPartner.paidUnits || [], "green")}
                                    {(ledgerFilter === "returnedUnits") && renderUnitTable("Returned Units", currentPartner.returnedUnits || [], "purple")}

                                    {(ledgerFilter === "overview" || ledgerFilter === "invoices" || ledgerFilter === "open" || ledgerFilter === "paid") && (
                                        <div className="mb-6">
                                            <h4 className="font-black text-gray-900 mb-3 uppercase tracking-widest text-[10px]">Invoices From Local SQLite</h4>
                                            <div className="grid grid-cols-1 xl:grid-cols-2 gap-4">
                                                {partnerInvoices.map(inv => (
                                                    <div key={inv.invoiceId} className="bg-white border border-gray-200 rounded-2xl p-5 shadow-sm hover:shadow-md transition-all">
                                                        <div className="flex justify-between gap-4 items-start mb-4">
                                                            <div><div className="flex flex-wrap items-center gap-2"><span className="font-black text-gray-900">{inv.invoiceId}</span><span className={`text-[10px] font-black px-2 py-0.5 rounded-full ${inv.status === 'Paid' ? 'bg-green-100 text-green-700' : inv.status === 'Partial' ? 'bg-amber-100 text-amber-700' : 'bg-red-100 text-red-700'}`}>{inv.status}</span></div><p className="text-xs text-gray-500 mt-1">{inv.date || "No date"} • {(inv.issuedUnits || []).length} unit(s)</p>{inv.paidDate && <p className="text-[11px] text-green-600 font-bold mt-1">Completed: {inv.paidDate}</p>}</div>
                                                            <div className="text-right"><p className="text-xs text-gray-400 font-bold uppercase">Balance</p><p className={`font-black ${safeNumber(inv.balance) > 0 ? 'text-red-600' : 'text-green-600'}`}>LKR {moneyFmt(inv.balance)}</p></div>
                                                        </div>
                                                        <div className="grid grid-cols-3 gap-2 mb-4 text-center"><div className="bg-blue-50 rounded-xl p-2"><p className="text-[9px] font-black text-blue-500 uppercase">Total</p><p className="font-black text-blue-700 text-sm">{moneyFmt(inv.total)}</p></div><div className="bg-green-50 rounded-xl p-2"><p className="text-[9px] font-black text-green-500 uppercase">Paid</p><p className="font-black text-green-700 text-sm">{moneyFmt(inv.paid)}</p></div><div className="bg-purple-50 rounded-xl p-2"><p className="text-[9px] font-black text-purple-500 uppercase">Returns</p><p className="font-black text-purple-700 text-sm">{moneyFmt(inv.returned)}</p></div></div>

                                                            {(inv.issuedUnits || []).slice(0, 5).map((unit, idx) => <div key={idx} className="flex justify-between text-xs bg-gray-50 rounded-lg px-3 py-2"><span className="font-bold text-gray-800 truncate">{unit.product}</span><span className="font-mono text-gray-500 ml-2">{unit.imei || '—'}</span></div>)}

                                                        <div className="flex flex-wrap gap-2"><button type="button" onClick={() => setSelectedInvoice(inv)} className="pro-button secondary px-3 py-2 text-xs"><Icons.Eye /> Details</button><button type="button" onClick={() => openInvoiceWindow(inv.invoiceId)} className="pro-button primary bg-blue-600 hover:bg-blue-700 border-none text-white px-3 py-2 text-xs"><Icons.Link /> Open Invoice</button></div>

                                                <li>Damage due to external factors such as fire, natural disasters, or normal wear and tear (e.g., scratches or damage to screen, buttons, back cover, or accessories) is not covered.</li>
