        const AddGroupModal = ({ isOpen, onClose, executeBackend, refreshLiveInventory, startPeerServer }) => {
            const initialForm = {
                Type: "Mobile Phone",
                Category: "Smartphones",
                Brand: "",
                Model: "",
                IMEI: "",
                Color: "",
                Price: "",
                OfferPrice: "",
                Quantity: "1",
                Status: "Available",
                Notes: "",
                Suppliers: [{ name: "", cost: "", qty: "1", units: [{ imei: '', status: 'Available', dateAdded: new Date().toISOString() }] }]
            };
            const initialSpecs = { RAM: "", ROM: "", Other: "" };

            const [form, setForm] = useState(initialForm);
            const [specs, setSpecs] = useState(initialSpecs);
            const [isSaving, setIsSaving] = useState(false);

            const isAccessoryType = (value) => cleanText(value).toLowerCase() === 'accessory';
            // Accessory IDs are generated silently in this format: TN-45B95W3Q88.
            // The random 10-character body never uses A, I, L, P, O, X, E, 1, M, H, and never uses the old ASC prefix.
            const SAFE_ACCESSORY_ID_CHARS = '023456789BCDFGJKNQRSTUVWYZ';
            const ACCESSORY_ID_PREFIX = 'TN-';
            const makeRandomAccessoryId = (used = new Set()) => {
                const randomBody = () => {
                    const arr = new Uint32Array(10);
                    if (window.crypto && window.crypto.getRandomValues) {
                        window.crypto.getRandomValues(arr);
                        return Array.from(arr, x => SAFE_ACCESSORY_ID_CHARS[x % SAFE_ACCESSORY_ID_CHARS.length]).join('');
                    }
                    return Array.from({ length: 10 }, () => SAFE_ACCESSORY_ID_CHARS[Math.floor(Math.random() * SAFE_ACCESSORY_ID_CHARS.length)]).join('');
                };
                let id = '';
                do { id = `${ACCESSORY_ID_PREFIX}${randomBody()}`; } while (used.has(id));
                used.add(id);
                return id;
            };
            const fillAccessoryUnitIds = (sourceForm, forceRegenerate = false) => {
                if (!isAccessoryType(sourceForm.Type)) return sourceForm;
                const used = new Set();
                (sourceForm.Suppliers || []).forEach(sup => (sup.units || []).forEach(unit => {
                    const existing = cleanText(unit.imei);
                    if (existing && !forceRegenerate) used.add(existing);
                }));
                return {
                    ...sourceForm,
                    Suppliers: (sourceForm.Suppliers || []).map(sup => ({
                        ...sup,
                        units: (sup.units || []).map(unit => {
                            const keepExisting = cleanText(unit.imei) && !forceRegenerate;
                            return { ...unit, imei: keepExisting ? unit.imei : makeRandomAccessoryId(used) };
                        })
                    }))
                };
            };
            const countMissingAccessoryIds = (sourceForm) => (sourceForm.Suppliers || []).reduce((sum, sup) => sum + (sup.units || []).filter(unit => !cleanText(unit.imei)).length, 0);
            const autoFillAccessoryIds = (sourceForm, forceRegenerate = false) => {
                if (!isAccessoryType(sourceForm.Type)) return sourceForm;
                const missingUnits = countMissingAccessoryIds(sourceForm);
                if (missingUnits <= 0 && !forceRegenerate) return sourceForm;
                return fillAccessoryUnitIds(sourceForm, forceRegenerate);
            };
            const regenerateAccessoryIds = () => setForm(prev => autoFillAccessoryIds(prev, true));

            useEffect(() => {
                if (isOpen) {
                    setForm(initialForm);
                    setSpecs(initialSpecs);
                }
            }, [isOpen]);

            const handleChange = (e) => {
                const nextForm = { ...form, [e.target.name]: e.target.value };
                if (e.target.name === 'Type' && isAccessoryType(e.target.value) && !isAccessoryType(form.Type)) {
                    setForm(autoFillAccessoryIds(nextForm, false));
                    return;
                }
                setForm(nextForm);
            };

            const handleSpecChange = (e) => {
                setSpecs({ ...specs, [e.target.name]: e.target.value });
            };

            const handleSupplierChange = (index, field, value) => {
                const newSup = [...form.Suppliers];
                newSup[index][field] = value;
                
                if (field === 'qty') {
                    const num = parseInt(value) || 0;
                    const currentUnits = newSup[index].units || [];
                    let newUnits = [...currentUnits];
                    if (num > currentUnits.length) {
                        for(let i=currentUnits.length; i<num; i++) {
                            newUnits.push({ imei: '', status: 'Available', dateAdded: new Date().toISOString() });
                        }
                    } else {
                        newUnits = newUnits.slice(0, num);
                    }
                    newSup[index].units = newUnits;
                }
                
                let totalQty = 0;
                newSup.forEach(s => totalQty += (parseInt(s.qty) || 0));
                const nextForm = { ...form, Suppliers: newSup, Quantity: totalQty.toString(), Status: totalQty > 0 ? 'Available' : 'Sold' };
                setForm(isAccessoryType(nextForm.Type) && countMissingAccessoryIds(nextForm) > 0 ? autoFillAccessoryIds(nextForm, false) : nextForm);
            };

            const handleUnitImeiChange = (supIndex, unitIndex, value) => {
                const newSup = [...form.Suppliers];
                newSup[supIndex].units[unitIndex].imei = value;
                setForm({ ...form, Suppliers: newSup });
            };

            const addSupplierRow = () => {
                const nextForm = { ...form, Suppliers: [...form.Suppliers, { name: "", cost: "", qty: "1", units: [{ imei: '', status: 'Available', dateAdded: new Date().toISOString() }] }] };
                setForm(isAccessoryType(nextForm.Type) ? autoFillAccessoryIds(nextForm, false) : nextForm);
            };

            const removeSupplierRow = (index) => {
                const newSuppliers = form.Suppliers.filter((_, i) => i !== index);
                let totalQty = 0;
                newSuppliers.forEach(s => totalQty += (parseInt(s.qty) || 0));
                setForm({ ...form, Suppliers: newSuppliers, Quantity: totalQty.toString(), Status: totalQty > 0 ? 'Available' : 'Sold' });
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                let workingForm = form;
                if (isAccessoryType(workingForm.Type) && countMissingAccessoryIds(workingForm) > 0) {
                    workingForm = fillAccessoryUnitIds(workingForm, false);
                    setForm(workingForm);
                }
                if (!workingForm.IMEI || !workingForm.Brand || !workingForm.Model || !workingForm.Price) {
                    alert("Group SKU Code, Brand, Model, and Price are required.");
                    return;
                }

                let missingImei = false;
                workingForm.Suppliers.forEach(s => { s.units.forEach(u => { if (!u.imei) missingImei = true; }) });
                if (missingImei) {
                    alert("Please fill out all Individual Unit IMEIs.");
                    return;
                }

                setIsSaving(true);

                const specsObj = {};
                if (specs.RAM && specs.RAM.trim().toLowerCase() !== "none") specsObj.RAM = specs.RAM.trim();
                if (specs.ROM && specs.ROM.trim().toLowerCase() !== "none") specsObj.ROM = specs.ROM.trim();
                if (specs.Other && specs.Other.trim() !== "") specsObj.Other = specs.Other.trim();

                const unitsToSave = [];
                workingForm.Suppliers.forEach(sup => {
                    sup.units.forEach(u => {
                        unitsToSave.push({
                            imei: u.imei,
                            supplier: sup.name,
                            cost: parseFloat(sup.cost) || 0,
                            dateAdded: u.dateAdded || new Date().toISOString(),
                            status: u.status || 'Available'
                        });
                    });
                });

                const dataJsonObj = {
                    Brand: workingForm.Brand,
                    Model: workingForm.Model,
                    Category: workingForm.Category,
                    Color: workingForm.Color,
                    Price: workingForm.Price,
                    OfferPrice: workingForm.OfferPrice,
                    Specs: Object.keys(specsObj).length > 0 ? JSON.stringify(specsObj) : "",
                    Units: unitsToSave
                };

                const finalItem = {
                    "Select Phone or item": workingForm.Type,
                    "IMEI or Item Code": workingForm.IMEI,
                    "Status": workingForm.Status,
                    "Quantity": workingForm.Quantity,
                    "Notes": workingForm.Notes,
                    "DATA (JSON)": JSON.stringify(dataJsonObj)
                };

                try {
                    const success = await executeBackend({ action: 'add_item', item: finalItem });
                    if (success) {
                        alert("✅ Product Group Created Successfully!");
                        refreshLiveInventory();
                        onClose();
                    } else {
                        alert("❌ Failed to save item to database.");
                    }
                } catch (err) {
                    alert("❌ Network Error adding product group.");
                }
                setIsSaving(false);
            };

            if (!isOpen) return null;

            const triggerGroupSkuScan = () => {
                startPeerServer((data) => {
                    setForm(prev => ({ ...prev, IMEI: data }));
                });
            };

            const triggerBatchImeiScan = () => {
                startPeerServer((data) => {
                    setForm(prevForm => {
                        let updatedSuppliers = [...prevForm.Suppliers];
                        let filled = false;
                        for (let sIdx = 0; sIdx < updatedSuppliers.length; sIdx++) {
                            let sup = updatedSuppliers[sIdx];
                            for (let uIdx = 0; uIdx < sup.units.length; uIdx++) {
                                if (!sup.units[uIdx].imei && sup.units[uIdx].status !== 'Sold') {
                                    let newUnits = [...sup.units];
                                    newUnits[uIdx] = { ...newUnits[uIdx], imei: data };
                                    updatedSuppliers[sIdx] = { ...sup, units: newUnits };
                                    filled = true;
                                    break;
                                }
                            }
                            if (filled) break;
                        }
                        return { ...prevForm, Suppliers: updatedSuppliers };
                    });
                });
            };

            return (
                <div className="fixed inset-0 glass-overlay flex items-center justify-center p-4 z-[9990] fade-in overflow-y-auto">
                    <div className="bg-white w-full max-w-4xl rounded-[24px] shadow-2xl flex flex-col border border-gray-200 my-8 max-h-[90vh]">
                        <div className="px-6 py-5 border-b border-gray-100 flex justify-between items-center bg-gray-50 shrink-0">
                            <div>
                                <h3 className="font-bold text-lg text-gray-900 leading-tight">Add Product Group</h3>
                                <p className="text-[11px] text-gray-500 mt-0.5">Register a new catalog master and define individual physical serial stocks.</p>
                            </div>
                            <button type="button" onClick={onClose} className="w-8 h-8 rounded-full bg-gray-200 text-gray-600 flex items-center justify-center hover:bg-gray-300">✕</button>
                        </div>
                        <form onSubmit={handleSubmit} className="p-6 space-y-6 overflow-y-auto flex-1">
                            <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-4 pb-6 border-b border-gray-100">
                                <div className="lg:col-span-1">
                                    <label className="text-[10px] font-bold text-gray-500 uppercase block mb-1.5">Item Type</label>
                                    <AutocompleteInput name="Type" value={form.Type} onChange={handleChange} options={DATASETS.Types} placeholder="e.g. Phone" className="px-3 py-1.5 text-xs" />
                                </div>
                                <div className="lg:col-span-1">
                                    <label className="text-[10px] font-bold text-gray-500 uppercase block mb-1.5">Category</label>
                                    <AutocompleteInput name="Category" value={form.Category} onChange={handleChange} options={DATASETS.Categories} placeholder="e.g. Smartphones" className="px-3 py-1.5 text-xs" />
                                </div>
                                <div className="lg:col-span-1">
                                    <label className="text-[10px] font-bold text-gray-500 uppercase block mb-1.5">Brand *</label>
                                    <AutocompleteInput name="Brand" value={form.Brand} onChange={handleChange} required options={DATASETS.Brands} placeholder="e.g. Apple" className="px-3 py-1.5 text-xs font-semibold" />
                                </div>
                                <div className="lg:col-span-1">
                                    <label className="text-[10px] font-bold text-gray-500 uppercase block mb-1.5">Model *</label>
                                    <AutocompleteInput name="Model" value={form.Model} onChange={handleChange} required options={DATASETS.Models} placeholder="e.g. iPhone 15" className="px-3 py-1.5 text-xs font-semibold" />
                                </div>
                                <div className="lg:col-span-2">
                                    <label className="text-[10px] font-bold text-gray-500 uppercase block mb-1.5">SKU Group Code *</label>
                                    <div className="flex gap-1.5">
                                        <input name="IMEI" value={form.IMEI} onChange={handleChange} required placeholder="Unique SKU Group ID" className="pro-input px-3 py-1.5 font-mono text-xs border-gray-300" />
                                        <button type="button" onClick={triggerGroupSkuScan} className="w-8 h-8 bg-gray-100 hover:bg-gray-200 text-gray-800 rounded-lg flex items-center justify-center shrink-0 border border-gray-300" title="Use Mobile Scanner">
                                            <Icons.Scan />
                                        </button>
                                    </div>
                                </div>
                                <div className="lg:col-span-1">
                                    <label className="text-[10px] font-bold text-gray-500 uppercase block mb-1.5">Color</label>
                                    <AutocompleteInput name="Color" value={form.Color} onChange={handleChange} options={DATASETS.Colors} placeholder="e.g. Black" className="px-3 py-1.5 text-xs" />
                                </div>
                            </div>

                            <div className="flex flex-col lg:flex-row gap-6">
                                <div className="flex-[2] space-y-6">
                                    <div className="flex justify-between items-center">
                                        <div>
                                            <h4 className="text-xs font-black text-slate-800 uppercase tracking-wider">Suppliers and Stock Batches</h4>
                                        </div>
                                        <button type="button" onClick={addSupplierRow} className="text-[10px] font-bold text-white bg-[#007aff] hover:bg-[#005bb5] px-4 py-2 rounded-lg border-none shadow-sm transition-colors">
                                            + Add Supplier Batch
                                        </button>
                                    </div>
                                    <div className="space-y-4">
                                        {form.Suppliers.map((sup, index) => (
                                            <div key={index} className="bg-gray-50 p-4 rounded-xl border border-gray-200 relative flex flex-col gap-4">
                                                {form.Suppliers.length > 1 && (
                                                    <button type="button" onClick={() => removeSupplierRow(index)} className="absolute -top-2 -right-2 bg-red-100 text-red-600 hover:bg-red-500 hover:text-white p-1.5 rounded-full transition-colors shadow-sm z-10" title="Remove Batch">
                                                        <Icons.Trash />
                                                    </button>
                                                )}
                                                <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
                                                    <div>
                                                        <label className="text-[9px] font-bold text-gray-500 uppercase block mb-1">Supplier Name</label>
                                                        <input value={sup.name} onChange={(e) => handleSupplierChange(index, 'name', e.target.value)} placeholder="Supplier Batch ID" className="pro-input px-3 py-1.5 text-xs bg-white border-gray-300" />
                                                    </div>
                                                    <div>
                                                        <label className="text-[9px] font-bold text-gray-500 uppercase block mb-1">Unit Cost (Buying Price LKR)</label>
                                                        <input type="number" value={sup.cost} onChange={(e) => handleSupplierChange(index, 'cost', e.target.value)} placeholder="0" className="pro-input px-3 py-1.5 text-xs bg-white text-red-600 font-bold border-gray-300" />
                                                    </div>
                                                    <div>
                                                        <label className="text-[9px] font-bold text-gray-500 uppercase block mb-1">Total Qty</label>
                                                        <input type="number" value={sup.qty} onChange={(e) => handleSupplierChange(index, 'qty', e.target.value)} placeholder="Qty" className="pro-input px-3 py-1.5 text-xs bg-blue-50 text-blue-600 font-black text-center border-blue-200" />
                                                    </div>
                                                </div>

                                                {sup.units && sup.units.length > 0 && (
                                                    <div className="bg-white p-3 rounded-lg border border-gray-200 mt-2">
                                                        <div className="flex flex-wrap justify-between items-center gap-2 mb-2">
                                                            <div>
                                                                <label className="text-[10px] font-bold text-[#007aff] uppercase">Batch Unit IMEIs / IDs</label>
                                                                {isAccessoryType(form.Type) && <p className="text-[9px] text-emerald-600 font-bold mt-0.5">Accessory mode: IDs auto-fill silently as TN- + 10 safe random characters by Total Qty.</p>}
                                                            </div>
                                                            <div className="flex items-center gap-2">
                                                                {isAccessoryType(form.Type) && <button type="button" onClick={regenerateAccessoryIds} className="text-[9px] font-black text-emerald-700 bg-emerald-50 hover:bg-emerald-100 border border-emerald-200 rounded-lg px-2.5 py-1 transition-colors">Regenerate TN IDs</button>}
                                                                <button type="button" onClick={triggerBatchImeiScan} className="text-[9px] font-bold text-gray-500 hover:text-black flex items-center gap-1"><Icons.Scan /> Auto-Scan Mode</button>
                                                            </div>
                                                        </div>
                                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
                                                            {sup.units.map((u, ui) => (
                                                                <div key={ui} className="flex items-center gap-2">
                                                                    <div className="w-5 h-5 bg-gray-100 rounded-md text-[9px] font-bold text-gray-400 flex items-center justify-center shrink-0">#{ui+1}</div>
                                                                    <input
                                                                        placeholder={`Unit IMEI / ID...`}
                                                                        value={u.imei}
                                                                        onChange={e => handleUnitImeiChange(index, ui, e.target.value)}
                                                                        className="pro-input px-3 py-1.5 text-xs font-mono font-bold bg-gray-50 border-gray-200 focus:bg-white focus:border-blue-500"
                                                                    />
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                <div className="flex-1 bg-gray-50 p-5 rounded-2xl border border-gray-200 flex flex-col gap-4 self-start">
                                    <div className="bg-white p-4 rounded-xl border border-gray-100 flex flex-col justify-center items-center shadow-sm">
                                        <label className="text-[10px] font-bold text-gray-500 uppercase block mb-1">Total Group Stock</label>
                                        <div className="text-3xl font-black text-gray-900 tracking-tight">{form.Quantity}</div>
                                        <div className="text-[9px] font-bold uppercase text-[#007aff] mt-1.5 px-2 py-0.5 bg-blue-50 rounded-full">{form.Status}</div>
                                    </div>
                                    <div className="space-y-3">
                                        <div>
                                            <label className="text-[10px] font-bold text-gray-500 uppercase block mb-1">Selling Price (LKR) *</label>
                                            <input name="Price" type="number" required value={form.Price} onChange={handleChange} className="pro-input px-3 py-2 border-gray-300 bg-white font-bold text-gray-900" placeholder="0" />
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-bold text-gray-500 uppercase block mb-1">Offer Price</label>
                                            <input name="OfferPrice" type="number" value={form.OfferPrice} onChange={handleChange} className="pro-input px-3 py-2 border-green-200 bg-green-50/50 font-bold text-green-700" placeholder="Optional Discounted LKR" />
                                        </div>
                                    </div>
                                    <div className="border-t border-gray-200 pt-3 space-y-3">
                                        <label className="text-[11px] font-bold text-slate-800 uppercase block">Hardware Specs</label>
                                        <div className="grid grid-cols-2 gap-2">
                                            <div>
                                                <label className="text-[9px] font-bold text-gray-500 uppercase block mb-1">RAM</label>
                                                <AutocompleteInput name="RAM" value={specs.RAM} onChange={handleSpecChange} options={DATASETS.RAMs} placeholder="e.g. 8GB" className="px-2 py-1.5 text-xs" />
                                            </div>
                                            <div>
                                                <label className="text-[9px] font-bold text-gray-500 uppercase block mb-1">Storage</label>
                                                <AutocompleteInput name="ROM" value={specs.ROM} onChange={handleSpecChange} options={DATASETS.ROMs} placeholder="e.g. 256GB" className="px-2 py-1.5 text-xs" />
                                            </div>
                                        </div>
                                        <div>
                                            <label className="text-[9px] font-bold text-gray-500 uppercase block mb-1">Other Details</label>
                                            <input name="Other" value={specs.Other} onChange={handleSpecChange} placeholder="Any other hardware details..." className="pro-input px-3 py-1.5 text-xs" />
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div className="pt-4 border-t border-gray-100 flex justify-end gap-3 shrink-0">
                                <button type="button" onClick={onClose} className="pro-button secondary px-5 py-2 text-sm">Cancel</button>
                                <button type="submit" disabled={isSaving} className="pro-button primary bg-[#007aff] border-none text-white px-6 py-2">
                                    {isSaving ? "Saving..." : "Save Product Group"}
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [passwordInput, setPasswordInput] = useState("");
            const [loginAttempts, setLoginAttempts] = useState(0);
            const [loginLoading, setLoginLoading] = useState(false);
            const [lockoutTime, setLockoutTime] = useState(() => {
                const stored = localStorage.getItem('icon_lockout');
                return stored ? parseInt(stored) : null;
            });
            const [timeRemaining, setTimeRemaining] = useState(() => lockoutTime ? Math.max(0, Math.ceil((lockoutTime - Date.now()) / 1000)) : 0);

            const [currentView, setCurrentView] = useState('pos');
            const [inventory, setInventory] = useState([]);
            const [clients, setClients] = useState([]);
            const partnerProfiles = useMemo(() => buildPartnerProfiles(clients, inventory), [clients, inventory]);
            const customerLogs = useMemo(() => clients.filter(isRetailCustomerRecord), [clients]);
            const [syncMeta, setSyncMeta] = useState({ mode: "Idle", lastSync: "", revision: null, serverTime: "", inventoryCount: 0, customerCount: 0, partnerCount: 0, message: "Not synced yet" });
            const [loading, setLoading] = useState(false);
            const [actionLoading, setActionLoading] = useState(false);
            const [printData, setPrintData] = useState(null);

            // Detailed view popup state
            const [detailsModalItem, setDetailsModalItem] = useState(null);
            const [isAddGroupOpen, setIsAddGroupOpen] = useState(false);

            // Local Python WebSocket scanner state
            const [showQR, setShowQR] = useState(false);
            const [qrUrl, setQrUrl] = useState("");
            const [toastMsg, setToastMsg] = useState("");
            const scannerRef = useRef(null);
            const scanCallbackRef = useRef(null);
            const revisionRef = useRef(null);
            const silentRefreshTimerRef = useRef(null);
            const lastSilentRefreshRef = useRef(0);

            const showToast = (msg) => { setToastMsg(msg); setTimeout(() => setToastMsg(""), 3000); };

            const startPeerServer = (onScanCallback) => {
                if (onScanCallback) {
                    scanCallbackRef.current = onScanCallback;
                }
                if (scannerRef.current) {
                    setShowQR(true);
                    return;
                }
                const scanner = window.IconAPI.createScannerHost(
                    (data) => {
                        playSuccessBeep();
                        if (scanCallbackRef.current) scanCallbackRef.current(data);
                    },
                    () => { setShowQR(false); showToast("✅ Mobile Scanner Connected!"); }
                );
                setQrUrl(scanner.url);
                setShowQR(true);
                scannerRef.current = scanner;
            };

            const executePrint = () => {
                if (!printData) return;
                const originalTitle = document.title;
                const safeClientName = (printData.client.name || 'Customer').replace(/[^a-zA-Z0-9]/g, '_');
                const now = new Date();
                const dateStr = now.toISOString().split('T')[0];
                const timeStr = now.toTimeString().split(' ')[0].replace(/:/g, '-');
                document.title = `Invoice_${safeClientName}_${dateStr}_${timeStr}`;

                document.body.classList.add('printing');
                
                setTimeout(() => {
                    window.print();
                    document.title = originalTitle;
                    document.body.classList.remove('printing');
                }, 500);
            };

            const scheduleSilentRefresh = () => {
                if (!isLoggedIn || silentRefreshTimerRef.current) return;
                const elapsed = Date.now() - lastSilentRefreshRef.current;
                const wait = Math.max(100, 1000 - elapsed);
                silentRefreshTimerRef.current = setTimeout(async () => {
                    silentRefreshTimerRef.current = null;
                    lastSilentRefreshRef.current = Date.now();
                    await fetchData(true);
                }, wait);
            };

            useEffect(() => {
                revisionRef.current = syncMeta.revision;
            }, [syncMeta.revision]);

            useEffect(() => {
                const handleAuthRequired = () => {
                    setIsLoggedIn(false);
                    setPasswordInput("");
                    setSyncMeta(prev => ({ ...prev, mode: "Session Expired", message: "Please authenticate with the LAN server again" }));
                };
                window.addEventListener("icon:auth-required", handleAuthRequired);
                return () => window.removeEventListener("icon:auth-required", handleAuthRequired);
            }, []);

            useEffect(() => {
                if (isLoggedIn) fetchData();
            }, [isLoggedIn]);

            useEffect(() => {
                if (!isLoggedIn) return;
                let unsubscribe = null;
                try {
                    unsubscribe = window.IconAPI.subscribe((event = {}) => {
                        const eventRevision = typeof event === "object" ? (event.revision ?? event.data?.revision) : event;
                        if (eventRevision === undefined || eventRevision === null) return;
                        if (String(eventRevision) === String(revisionRef.current)) return;
                        scheduleSilentRefresh();
                    });
                } catch (error) {
                    console.warn("Live LAN update subscription could not start.", error);
                }
                return () => {
                    if (typeof unsubscribe === "function") unsubscribe();
                    else if (unsubscribe && typeof unsubscribe.unsubscribe === "function") unsubscribe.unsubscribe();
                };
            }, [isLoggedIn]);

            useEffect(() => {
                if (!isLoggedIn) return;
                const handleReconnect = () => scheduleSilentRefresh();
                window.addEventListener("online", handleReconnect);
                window.addEventListener("focus", handleReconnect);
                return () => {
                    window.removeEventListener("online", handleReconnect);
                    window.removeEventListener("focus", handleReconnect);
                    if (silentRefreshTimerRef.current) {
                        clearTimeout(silentRefreshTimerRef.current);
                        silentRefreshTimerRef.current = null;
                    }
                };
            }, [isLoggedIn]);

            useEffect(() => {
                if (printData) {
                    const autoPrintTimer = setTimeout(() => { executePrint(); }, 1500);
                    return () => { clearTimeout(autoPrintTimer); document.body.classList.remove('printing'); };
                }
            }, [printData]);

            useEffect(() => {
                if (lockoutTime) {
                    const interval = setInterval(() => {
                        const remaining = Math.ceil((lockoutTime - Date.now()) / 1000);
                        if (remaining <= 0) {
                            setLockoutTime(null);
                            setLoginAttempts(0);
                            localStorage.removeItem('icon_lockout');
                            setTimeRemaining(0);
                            clearInterval(interval);
                        } else {
                            setTimeRemaining(remaining);
                        }
                    }, 1000);
                    return () => clearInterval(interval);
                }
            }, [lockoutTime]);

            const handleLogin = async (e) => {
                e.preventDefault();
                if (lockoutTime && Date.now() < lockoutTime) return;
                if (!passwordInput || loginLoading) return;

                setLoginLoading(true);
                try {
                    const result = await window.IconAPI.login("pos", passwordInput);
                    if (result && result.success === false) {
                        const loginError = new Error(result.error || result.message || "Authentication failed.");
                        loginError.status = result.status || 401;
                        throw loginError;
                    }
                    setIsLoggedIn(true);
                    setLoginAttempts(0);
                    localStorage.removeItem('icon_lockout');
                } catch (error) {
                    const message = error?.message || "Authentication failed.";
                    const isCredentialError = error?.status === 401 || error?.status === 403 || /password|credential|unauthor|forbidden|authentication|invalid login|access denied/i.test(message);
                    if (!isCredentialError) {
                        alert(`Login service unavailable: ${message}`);
                    } else {
                        const newAttempts = loginAttempts + 1;
                        setLoginAttempts(newAttempts);
                        if (newAttempts >= 3) {
                            const lockUntil = Date.now() + 5 * 60 * 1000;
                            setLockoutTime(lockUntil);
                            setTimeRemaining(5 * 60);
                            localStorage.setItem('icon_lockout', lockUntil.toString());
                            alert("Too many failed attempts. Login is locked for 5 minutes.");
                        } else {
                            alert(`Incorrect password. ${3 - newAttempts} attempts remaining.`);
                        }
                    }
                } finally {
                    setPasswordInput("");
                    setLoginLoading(false);
                }
            };

            const handleLogout = async () => {
                const logoutRequest = window.IconAPI.logout().catch(error => {
                    console.warn("The LAN server could not confirm logout.", error);
                });
                setIsLoggedIn(false);
                setPasswordInput("");
                setInventory([]);
                setClients([]);
                setPrintData(null);
                setDetailsModalItem(null);
                setIsAddGroupOpen(false);
                setShowQR(false);
                if (scannerRef.current) scannerRef.current.destroy();
                scannerRef.current = null;
                setCurrentView('pos');
                setSyncMeta({ mode: "Idle", lastSync: "", revision: null, serverTime: "", inventoryCount: 0, customerCount: 0, partnerCount: 0, message: "Not synced yet" });
                revisionRef.current = null;
                await logoutRequest;
            };

            const formatSyncTime = (value) => {
                const parsed = value ? new Date(value) : new Date();
                const safeDate = Number.isNaN(parsed.getTime()) ? new Date() : parsed;
                return safeDate.toLocaleString('en-GB', { timeZone: 'Asia/Colombo' });
            };

            const applyApiSnapshot = (snapshot, modeLabel, options = {}) => {
                if (!snapshot || !Array.isArray(snapshot.inventory) || !Array.isArray(snapshot.transactions)) {
                    throw new Error("The LAN server returned an invalid database snapshot.");
                }
                const hydrated = hydrateApiData(snapshot.inventory, snapshot.transactions);
                const cachedMeta = options.cachedMeta || null;
                const revision = snapshot.revision ?? cachedMeta?.revision ?? null;
                const serverTime = snapshot.serverTime || cachedMeta?.serverTime || "";
                const meta = {
                    mode: modeLabel,
                    lastSync: modeLabel === "Offline Snapshot" && cachedMeta?.lastSync ? cachedMeta.lastSync : formatSyncTime(serverTime),
                    revision,
                    serverTime,
                    inventoryCount: hydrated.inventory.length,
                    customerCount: hydrated.customers.length,
                    partnerCount: hydrated.partners.length,
                    message: `${modeLabel} | ${hydrated.inventory.length} inventory | ${hydrated.customers.length} customers | ${hydrated.partners.length} partners`
                };
                setInventory(hydrated.inventory);
                setClients(hydrated.transactions);
                setSyncMeta(meta);
                revisionRef.current = revision;

                if (options.persist !== false) {
                    try {
                        localStorage.setItem(POS_DATA_CACHE_KEY, JSON.stringify({
                            snapshot: {
                                revision,
                                serverTime,
                                inventory: hydrated.inventory,
                                transactions: hydrated.transactions
                            },
                            meta,
                            savedAt: Date.now()
                        }));
                    } catch (storageError) {
                        console.warn("Could not cache the local database snapshot.", storageError);
                    }
                }
                return hydrated;
            };

            const loadOfflineSnapshot = () => {
                const cached = JSON.parse(localStorage.getItem(POS_DATA_CACHE_KEY) || "null");
                if (!cached || !cached.snapshot || !Array.isArray(cached.snapshot.inventory) || !Array.isArray(cached.snapshot.transactions)) {
                    throw new Error("No usable local SQLite snapshot is available on this device.");
                }
                applyApiSnapshot(cached.snapshot, "Offline Snapshot", { persist: false, cachedMeta: cached.meta || null });
                showToast("LAN server unavailable. Read-only offline snapshot loaded.");
                return "offline";
            };

            const fetchData = async (silent = false, allowOfflineFallback = true) => {
                if (!silent) setLoading(true);
                try {
                    const result = await window.IconAPI.getSnapshot();
                    if (!result || result.success !== true || !result.data) {
                        throw new Error(result?.error || result?.message || "The LAN server returned no database snapshot.");
                    }
                    applyApiSnapshot(result.data, "LAN Server");
                    return "live";
                } catch (error) {
                    console.warn("LAN database sync failed.", error);
                    if (!allowOfflineFallback) return false;
                    try {
                        return loadOfflineSnapshot();
                    } catch (cacheError) {
                        setSyncMeta(prev => ({ ...prev, mode: "Sync Failed", message: "Local SQLite / LAN sync failed" }));
                        if (!silent) {
                            alert(`Database sync failed: ${error?.message || cacheError?.message || "LAN server unavailable"}`);
                        }
                        return false;
                    }
                } finally {
                    setLoading(false);
                }
            };

            const executeBackendAction = async (payload) => {
                if (syncMeta.mode === "Offline Snapshot") {
                    const recoveredMode = await fetchData(true, false);
                    if (recoveredMode !== "live") {
                        alert("This device is showing a read-only offline snapshot. Reconnect to the ICON MOBILE LAN server before changing stock or completing a sale.");
                        return false;
                    }
                }

                setActionLoading(true);
                try {
                    const result = await window.IconAPI.action(payload);
                    if (!result || result.success !== true) {
                        throw new Error(result?.error || result?.message || "The local database rejected this operation.");
                    }

                    const refreshMode = await fetchData(true);
                    if (refreshMode === "live") {
                        showToast(result.message || "Saved to local SQLite and synced across the LAN.");
                    } else {
                        showToast("Saved on the LAN server. This screen will refresh when the connection returns.");
                    }
                    return true;
                } catch (error) {
                    console.error("Local database operation failed", error, payload);
                    alert("Operation was not saved: " + (error?.message || "LAN server unavailable"));
                    try { await fetchData(true); } catch (syncError) {}
                    return false;
                } finally {
                    setActionLoading(false);
                }
            };

            if (!isLoggedIn) {
                return (
                    <div className="min-h-screen bg-[#f5f5f7] flex items-center justify-center p-4">
                        <div className="bg-white p-10 rounded-3xl shadow-xl w-full max-w-sm border border-gray-100 text-center">
                            <div className="flex justify-center mb-6">
                                <img src="logo.png" alt="Logo" className="w-24 h-24 object-contain" />
                            </div>
                            <h2 className="text-2xl font-bold text-gray-900 mb-2">ICON MOBILE ERP</h2>
                            <p className="text-gray-500 text-sm mb-8">Enter your system password to continue.</p>
                            
                            {lockoutTime && timeRemaining > 0 ? (
                                <div className="bg-red-50 text-red-600 p-4 rounded-xl text-sm font-medium mb-4">
                                    Too many attempts. Locked for {Math.floor(timeRemaining / 60)}m {timeRemaining % 60}s.
                                </div>
                            ) : (
                                <form onSubmit={handleLogin}>
                                     <input 
                                         type="password" placeholder="Password" 
                                         className="pro-input px-4 py-3 mb-4 w-full text-center font-mono tracking-widest text-lg border border-gray-200 bg-gray-50 rounded-xl"
                                         value={passwordInput} onChange={e => setPasswordInput(e.target.value)} disabled={loginLoading} autoFocus
                                     />
                                     <button type="submit" disabled={loginLoading || !passwordInput} className="pro-button primary bg-[#007aff] hover:bg-[#005bb5] text-white w-full py-3.5 text-base">{loginLoading ? "Authenticating..." : "Unlock System"}</button>
                                 </form>
                            )}
                        </div>
                    </div>
                );
            }

            const openWholesalePortal = () => {
                const path = window.location.pathname;
                const dir = path.substring(0, path.lastIndexOf('/'));
                const url = `${window.location.origin}${dir}/wholesale.html`;
                window.location.href = url;
            };
            const openSettingsPortal = () => { window.location.href = '/settings.html'; };

            const viewTitles = { pos: 'Point of Sale', dashboard: 'Dashboard / Low Stock', inventory: 'Inventory', clients: 'Customer Log', partners: 'Partners / LAN Ledger' };

            return (
                <React.Fragment>
                    <div className="print-hide flex h-screen w-full bg-[var(--bg-base)] text-[var(--text-main)] relative">
                        <div className="w-64 bg-[#f5f5f7] border-r border-[#d2d2d7] flex flex-col z-20 shadow-[1px_0_0_0_rgba(0,0,0,0.05)]">
                            <div className="h-16 flex items-center px-6 mt-2">
                                <div className="flex items-center gap-3">
                                    <img src="logo.png" alt="Logo" className="w-9 h-9 object-contain rounded-lg" />
                                    <span className="font-semibold text-lg tracking-tight text-gray-900">ICON MOBILE ERP</span>
                                </div>
                            </div>
                            
                            <div className="p-4 flex flex-col gap-1.5 flex-1 mt-4">
                                <div className="text-[11px] font-semibold text-gray-400 tracking-wider mb-1 px-3 uppercase">Menu</div>
                                <SidebarItem active={currentView === 'dashboard'} onClick={() => setCurrentView('dashboard')} icon={<Icons.Dashboard />} text="Dashboard" />
                                <SidebarItem active={currentView === 'pos'} onClick={() => setCurrentView('pos')} icon={<Icons.POS />} text="Point of Sale" />
                                <SidebarItem active={currentView === 'inventory'} onClick={() => setCurrentView('inventory')} icon={<Icons.Inventory />} text="Inventory" />
                                <SidebarItem active={currentView === 'clients'} onClick={() => setCurrentView('clients')} icon={<Icons.Users />} text="Customer Log" />
                                <SidebarItem active={currentView === 'partners'} onClick={() => setCurrentView('partners')} icon={<Icons.Users />} text="Show Partners" />
                                <button type="button" onClick={openWholesalePortal} className="w-full flex items-center gap-3 px-3 py-2.5 rounded-[10px] text-sm font-semibold transition-all text-blue-700 bg-blue-50 hover:bg-blue-100 border border-blue-100 mt-3">
                                    <Icons.Link /> Wholesale Portal
                                </button>
                                <button type="button" onClick={openSettingsPortal} className="w-full flex items-center gap-3 px-3 py-2.5 rounded-[10px] text-sm font-semibold transition-all text-gray-700 bg-white hover:bg-gray-100 border border-gray-200 mt-1">
                                    <Icons.Dashboard /> Settings &amp; Backup
                                </button>
                            </div>

                            <div className="p-4 mb-2">
                                <div className="flex items-center gap-3 px-3 py-2 rounded-2xl bg-white shadow-sm border border-gray-100 cursor-pointer hover:bg-gray-50" onClick={handleLogout}>
                                    <div className="w-8 h-8 rounded-full bg-blue-50 text-[#007aff] flex items-center justify-center text-xs font-bold">AD</div>
                                    <div className="flex-1 min-w-0">
                                        <p className="text-sm font-semibold text-gray-900 truncate">Admin User</p>
                                        <p className="text-[11px] text-gray-500 truncate">Click to Logout</p>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div className="flex-1 flex flex-col relative overflow-hidden bg-white rounded-tl-2xl shadow-[-4px_0_24px_rgba(0,0,0,0.02)]">
                            <header className="h-16 glass-panel border-b border-[#d2d2d7] flex items-center justify-between px-8 z-10 sticky top-0">
                                <div>
                                    <h1 className="text-xl font-semibold text-gray-900 tracking-tight">{viewTitles[currentView]}</h1>
                                    <p className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mt-0.5">{syncMeta.lastSync ? `Last sync: ${syncMeta.lastSync}` : syncMeta.message}</p>
                                </div>
                                <div className="flex items-center gap-3">
                                    <div className="hidden xl:flex items-center gap-2 text-[10px] font-black uppercase tracking-widest">
                                        <span className="bg-white border border-gray-200 text-gray-500 px-3 py-1.5 rounded-full">Stock {syncMeta.inventoryCount}</span>
                                        <span className="bg-white border border-gray-200 text-gray-500 px-3 py-1.5 rounded-full">Customers {syncMeta.customerCount}</span>
                                        <span className="bg-white border border-gray-200 text-gray-500 px-3 py-1.5 rounded-full">Partners {syncMeta.partnerCount}</span>
                                    </div>
                                    <button type="button" onClick={() => fetchData(false)} disabled={loading || actionLoading} className="flex items-center justify-center w-8 h-8 rounded-full bg-white border border-gray-200 text-gray-600 hover:text-blue-600 hover:bg-blue-50 shadow-sm transition-all" title="Force Refresh Data from Server">
                                        <span className={loading ? "animate-spin text-[#007aff]" : ""}><Icons.Refresh /></span>
                                    </button>
                                    <div className={`flex items-center gap-2 text-xs font-medium px-3 py-1.5 rounded-full shadow-sm border ${loading ? 'bg-amber-50 text-amber-700 border-amber-200' : syncMeta.mode === 'Offline Snapshot' ? 'bg-orange-50 text-orange-700 border-orange-200' : syncMeta.mode === 'Sync Failed' ? 'bg-red-50 text-red-700 border-red-200' : 'bg-green-50 text-green-700 border-green-200'}`}>
                                        <div className={`w-2 h-2 rounded-full ${loading ? 'bg-amber-500 animate-pulse' : syncMeta.mode === 'Offline Snapshot' ? 'bg-orange-500' : syncMeta.mode === 'Sync Failed' ? 'bg-red-500' : 'bg-green-500'}`}></div>
                                        {loading ? 'Syncing...' : syncMeta.mode}
                                    </div>
                                </div>
                            </header>

                            {actionLoading && (
                                <div className="fixed inset-0 glass-overlay flex flex-col items-center justify-center fade-in" style={{ zIndex: 9999 }}>
                                    <div className="bg-white p-6 rounded-2xl shadow-2xl flex flex-col items-center border border-gray-100">
                                        <Icons.Loader />
                                        <span className="mt-4 text-sm font-bold text-gray-900 tracking-wide">Processing Data...</span>
                                    </div>
                                </div>
                            )}

                            {printData && (
                                <div className="absolute inset-0 glass-overlay z-50 flex items-center justify-center">
                                    <div className="bg-white p-10 rounded-3xl shadow-2xl max-w-sm w-full text-center border border-gray-200">
                                        <div className="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-4"><Icons.Check /></div>
                                        <h2 className="text-2xl font-bold text-gray-900 mb-2">Invoice Formatted</h2>
                                        <p className="text-gray-500 mb-6 text-sm leading-relaxed">The PDF print dialog should have opened. You can reprint or share the invoice digitally below.</p>
                                        <div className="flex flex-col gap-3">
                                            <button type="button" onClick={() => {
                                                let phone = printData.client.phone.replace(/[^0-9+]/g, '');
                                                if (phone.startsWith('0') && phone.length === 10) phone = '94' + phone.substring(1);
                                                else if (phone.startsWith('+')) phone = phone.substring(1);
                                                const link = getInvoiceLink(printData.invoiceId);
                                                const msg = `Hello ${printData.client.name},\n\nHere is your receipt!\nView your digital document here:\n${link}`;
                                                window.open(`https://api.whatsapp.com/send?phone=${phone}&text=${encodeURIComponent(msg)}`, '_blank');
                                            }} className="pro-button w-full py-3 bg-[#25D366] hover:bg-[#128C7E] text-white shadow-[0_4px_14px_rgba(37,211,102,0.3)] border-transparent">
                                                <Icons.WhatsApp /> Share via WhatsApp
                                            </button>
                                            <button type="button" onClick={executePrint} className="pro-button secondary w-full py-3">Reprint Document</button>
                                            <button type="button" onClick={() => setPrintData(null)} className="pro-button primary bg-[#007aff] hover:bg-[#005bb5] text-white w-full py-3">Start New Action</button>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {loading && !actionLoading && inventory.length === 0 ? (
                                <div className="flex-1 flex items-center justify-center bg-[#f5f5f7]"><Icons.Loader /></div>
                            ) : (
                                <main className="flex-1 overflow-hidden relative bg-[#f5f5f7]">
                                    {currentView === 'dashboard' && <DashboardView inventory={inventory} />}
                                    {currentView === 'pos' && (
                                        <POSView 
                                            inventory={inventory} 
                                            executeBackend={executeBackendAction} 
                                            onPrint={setPrintData} 
                                            refreshLiveInventory={() => fetchData(true)}
                                            setActionLoading={setActionLoading}
                                            startPeerServer={startPeerServer}
                                        />
                                    )}
                                    {currentView === 'inventory' && (
                                        <InventoryView 
                                            inventory={inventory} 
                                            onViewDetails={(item) => setDetailsModalItem(item)}
                                            onAddProductGroup={() => setIsAddGroupOpen(true)}
                                        />
                                    )}
                                    {currentView === 'clients' && <ClientsView clients={customerLogs} onShowPartners={() => setCurrentView('partners')} />}
                                    {currentView === 'partners' && <PartnersView partners={partnerProfiles} onOpenWholesale={openWholesalePortal} />}
                                </main>
                            )}
                        </div>
                    </div>

                    {/* Printable Invoice renderer */}
                    {printData && <PrintableInvoice data={printData} />}

                    {/* Detailed Units Modal Viewer */}
                    {detailsModalItem && (
                        <div className="fixed inset-0 glass-overlay z-[9999] flex items-center justify-center p-4">
                            <div className="bg-white rounded-3xl w-full max-w-3xl shadow-2xl flex flex-col max-h-[85vh] overflow-hidden border border-gray-200">
                                <div className="p-5 border-b border-gray-100 flex justify-between items-center bg-gray-50 shrink-0">
                                    <div>
                                        <h2 className="font-bold text-lg text-gray-900 leading-tight">{detailsModalItem.Brand} {detailsModalItem.Model}</h2>
                                        <p className="text-[11px] text-gray-500 font-mono mt-0.5">SKU/Code: {detailsModalItem["IMEI or Item Code"]}</p>
                                    </div>
                                    <button onClick={() => setDetailsModalItem(null)} className="w-8 h-8 rounded-full bg-gray-200 text-gray-600 flex items-center justify-center hover:bg-gray-300">✕</button>
                                </div>
                                <div className="p-5 overflow-auto flex-1 custom-scrollbar">
                                    <table className="w-full text-left text-sm border-collapse">
                                        <thead className="bg-gray-100 text-[10px] uppercase tracking-widest text-gray-500 font-bold">
                                            <tr>
                                                <th className="px-4 py-3 rounded-l-lg">Unit IMEI / ID</th>
                                                <th className="px-4 py-3">Supplier</th>
                                                <th className="px-4 py-3 text-right">Cost (LKR)</th>
                                                <th className="px-4 py-3 text-center">Status</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-gray-100">
                                            {detailsModalItem.Units?.map((u, i) => {
                                                const isPartner = String(u.status).startsWith('Partner');
                                                let badgeClass = 'bg-green-100 text-green-700';
                                                if (u.status === 'Sold') badgeClass = 'bg-red-100 text-red-700';
                                                else if (isPartner) badgeClass = 'bg-orange-100 text-orange-800';

                                                return (
                                                    <tr key={i} className="hover:bg-gray-50 transition-colors">
                                                        <td className="px-4 py-3 font-mono font-bold text-gray-800 text-xs">{u.imei || '-'}</td>
                                                        <td className="px-4 py-3 text-gray-600 text-xs font-medium">{u.supplier || '-'}</td>
                                                        <td className="px-4 py-3 text-right font-bold text-gray-900 text-xs">{u.cost ? parseFloat(u.cost).toLocaleString() : '-'}</td>
                                                        <td className="px-4 py-3 text-center">
                                                            <span className={`inline-block px-2 py-0.5 rounded text-[9px] uppercase font-bold tracking-wider ${badgeClass}`}>
                                                                {isPartner ? String(u.status).replace('Partner:', 'P:') : u.status}
                                                            </span>
                                                        </td>
                                                    </tr>
                                                );
                                            })}
                                            {(!detailsModalItem.Units || detailsModalItem.Units.length === 0) && (
                                                <tr><td colSpan="4" className="p-8 text-center text-gray-500 italic">No detailed unit data available.</td></tr>
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Add Product Group Modal Window */}
                    <AddGroupModal 
                        isOpen={isAddGroupOpen} 
                        onClose={() => setIsAddGroupOpen(false)} 
                        executeBackend={executeBackendAction} 
                        refreshLiveInventory={() => fetchData(true)}
                        startPeerServer={startPeerServer}
                    />

                    {/* Global QR Mobile Scanner Modal */}
                    {showQR && (
                        <div className="fixed inset-0 glass-overlay flex items-center justify-center p-4" style={{ zIndex: 9999 }}>
                            <div className="bg-white w-full max-w-sm rounded-[24px] shadow-[0_20px_50px_rgba(0,0,0,0.1)] flex flex-col overflow-hidden border border-gray-200 text-center">
                                <div className="px-6 py-5 border-b border-gray-100 flex justify-between items-center bg-gray-50 shrink-0">
                                    <h3 className="font-bold text-sm text-gray-900">Mobile Scanner</h3>
                                    <button type="button" onClick={() => setShowQR(false)} className="w-8 h-8 rounded-full bg-gray-200 text-gray-600 flex items-center justify-center hover:bg-gray-300 transition-colors">✕</button>
                                </div>
                                <div className="p-8 flex flex-col items-center">
                                    <p className="text-sm text-gray-500 mb-4 font-medium">Scan this QR code with your mobile phone to use it as a wireless barcode scanner.</p>
                                    {qrUrl ? (
                                        <img src={`/api/v1/qr?size=200&data=${encodeURIComponent(qrUrl)}`} alt="QR Code" className="w-48 h-48 mb-4 border border-gray-200 rounded-xl p-2 bg-white" />
                                    ) : (
                                        <div className="w-48 h-48 flex items-center justify-center mb-4"><Icons.Loader /></div>
                                    )}
                                    <div className="text-xs font-bold text-blue-600 bg-blue-50 px-3 py-1.5 rounded-full animate-pulse border border-blue-100">Waiting for connection...</div>
                                </div>
                            </div>
                        </div>
                    )}

                </React.Fragment>
            );
        };

        const mountNode = document.getElementById('root');
        if (!mountNode) throw new Error('Root element #root was not found.');
        if (ReactDOM.createRoot) {
            ReactDOM.createRoot(mountNode).render(<ErrorBoundary><App /></ErrorBoundary>);
        } else {
            ReactDOM.render(<ErrorBoundary><App /></ErrorBoundary>, mountNode);
        }
        document.body.classList.add('app-mounted');
    
} catch (err) {
  if (window.__ICON_BOOT_ERROR__) window.__ICON_BOOT_ERROR__(err && (err.stack || err.message) || err);
  else throw err;
}
</script>
</body>
</html>
